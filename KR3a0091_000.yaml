body:
  text: 二程子抄釋儒家類提要臣等謹案二程子抄釋十卷明吕柟編前有自序稱初得二程全書于崔銑以其中解說六經四書之語與門弟子問答行事之言統為一書浩大繁博初學難于觀覽因鈔出心所好者集為八卷凡二十九篇而卷首所列程子門人姓氏後有嘉靖辛卯柟門人休寧程爵重刋跋乃稱涇野先生鈔釋程氏書凡十卷此本為嘉靖丙申柟門人鄧浩所刋卷數與爵跋相合豈柟作序時其書尚止八卷後或有所增益分晰而序文則未改歟其書不分門類亦不叙先後仍以二程遺書原載門人某某所記分編每條之末皆一二語標其大意昔朱子編遺書嘗病其真贋相雜柟是書削駁留醇頗為不茍蓋柟之學源于河津最為篤實故去取皆有所見惟其文原出李夢陽全集率詰屈不可讀故每條下所釋詞㫖往往晦澀非初學所能洞曉云乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀二程子抄釋原序二程夫子明斯道於宋室盛時其言行多發孔孟之藴人若有良心未死者讀之未嘗不忘寢食也柟年十七八時嘗夢明道及呂東萊立涇野草堂之上而柟升階質疑聆其語論雖夢中亦豁然以為東萊遠不及也以後動靜起居時復思見但愧恨末學實未有所得耳既舉後得全書於安陽崔子鍾氏每諷誦之益不能釋手但解說六經四書之語與門弟子問答行事之言統為一書則浩大繁博初學觀覽不無難焉暇嘗抄出心所好者集為八卷凡二十九篇稍釋其下以備遺亡而於詩文亦抄出數篇以為外卷後巡按潜江初公見之命刻諸解梁書院而以其贖罪金紙作工食費則斯抄釋其是也柟何敢隱其非也柟又何敢以掩哉始學之士儻因是而求二夫子之志以遡孔孟之道則亦其有小補乎其傳是書之門人姓氏名地亦叙列諸後嘉靖五年三月辛丑後學高陵呂柟序
