body:
  text: 二程子抄釋卷十明吕柟編五七言詩律第二十五釋律詩於和風甘雨中求之則得仙掌遠相招縈紆渡石橋暝雲生澗底寒雨下山腰樹色千層亂天形一鏬遙吏紛難久駐回首羡漁樵逰紫閣山人生百年永光景我逾半中間幾悲歡况復多聚散青陽變晚春弱條成老幹不為時節驚把酒欲誰勸晚春雲靜好風微清光溢四垂金行方盛日隂魄正中時髣佛窺瑶闕分明露桂枝遴英同醉賞誰復嘆官羇中秋月得意即為適種花非貴多一區才丈席滿目自雲蘿靜聽禽聲樂閒招月色過期公在康濟終奈此情何和花庵治劇君能佚居閒我愛慵自惟降藻麗不解繼春容寡和知高唱深情見古風靜吟梁甫意真似卧隆中庭下竹青青盆荷水靣平誰言無遠趣自覺有餘清影倒假山翠波光朝日明漣漪尤緑淨涼吹夜來生盆荷盛集蘭亭舊風流洛社今坐中無俗客水曲有清音香篆來還去花枝泛復沈未須愁日暮天際是輕陰陳公廙園修褉事轟雷疊鼓響前峯來自彤雲翠靄中洞壑積隂成氣象鬼神憑暗弄威風噴崖雨露千尋濕落石珠璣萬顆紅縱有虬龍難駐足還應不是旱時功高觀谷長嘯巖東古寺前三峯相倚勢相連偶逢雲靜得見日若有路通須近天隂吹響雷生谷底老松如箸見崖顛結根不得居平地猶與蓮花遠比肩凌霄三峯仙人紺髮粉紅腮近自武陵源上來此花近嵗方有不比常花羞晚發故將春色待秋開存留金蘂天偏與漏泄春香衆始猜兼得佳名共堅節曉霜還獨對樓臺桃花鞠一夜威霜特地嚴朝來寒氣入書簾乍須火暖親爐獸初覺氷澌結硯蟾敗葉卷風輕䔩䔩遠峯經燒靜尖尖出門未要貂狐燠且著輕裘次第添早寒青帝方成萬物春如何淫雨害芳晨乞求共指雲間日悔恨輕嫌陌上塵消盡風威猶料峭放閒春色已嶙峋燕遊莫道王孫樂亦有羲皇更上人新晴野步潩水橋邉鴨子陂樓臺只在郡城西烟波乍見心先快島嶼將尋路欲迷盡日無風橫舴艋有時經雨飲虹霓如何咫尺塵埃地能使遊人意不齊西湖城居不見萬山重因起高亭破遠空虛曠直疑天宇外周旋如在畫屏中凝風散靄層層出削玉排青靣靣同暫得登臨已忘去四時佳致屬賢公環翠亭大都博奕皆戲劇象戲翻能學用兵車馬尚存周戰法偏裨兼備漢官名中軍八靣將軍重河外尖斜步卒輕却憑紋楸聊自笑雄如劉項亦閒爭象戲滿地清霜結曉寒平明飛霰灑柴關乍憑酒力溫肌骨陡覺風威著靣顔閭里相呼泥北戶牛羊收牧下前山急須趂日藏薪炭凍後高枝不易攀和家君早寒之什漸覺東皇意思勻陳根初動夜來新忽驚平地有輕緑已蓋六街無舊塵莫為枯榮吟野草且憐愁醉祝香輪詩人空怨王孫遠極目萋萋又一春和詠草打乖非是要安身道大方能混世塵陋巷一生顔氏樂清風千古伯夷貧客求墨妙多攜卷天為詩豪剩借春儘把笑歡親俗子德容猶足慰鄉人和邵堯夫打乖吟聖賢事業本經綸肯為巢由繼後塵三幣未回伊尹志萬鍾難換子輿貧且因經世藏千古已占西軒度十春時止時行皆有命先生不是打乖人先生非是愛吟詩為要形容至樂時醉裏乾坤都寓物閒來風月更輸誰死生有命人何與消長隨時我不悲直到希夷無事處先生非是愛吟詩和堯夫首尾吟先生相與賞西街小子親持几杖來行次每容參極論坐隅還許侍餘杯檻前流水心同樂林外青山眼重開時泰身閒兩難得直須乘興數追陪和堯夫西街之什先生高蹈隱西街風月猶牽賦詠才暫到鄰家賞池館便將佳句寫瓊瑰仕圖已讓心先快劇韻仍降字占闕只有一條誇大甚水邊曽未兩三杯月陂堤上肆徘徊北有中天百尺臺萬物已隨秋氣改一樽聊為晚凉開水心雲影閒相照林下泉聲靜自來世事無端何足計但逢佳日約重陪亦和堯夫遊月陂寥寥天氣已高秋更倚凌虛百尺樓世上利名羣蠛蠓古來興廢幾浮漚退居陋巷顔回樂不見長安李白愁兩事到頭須有得我心處處自優游秋日偶成閒來無事不從容睡覺東窗日已紅萬物靜觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不淫貧賤樂男兒到此是豪雄閒坊西曲奉常家景物天然占一窳恰似庾園基址小全勝浥澗路途賖知他陋巷心猶樂比我僑居事已誇且喜杖藜相過易隔牆無用少游車和王安之芳原緑野恣行時春入遙山碧四圍興逐亂紅穿柳巷困臨溪水坐苔磯莫辭盞酒十分醉秪恐風花一片飛况是清明好天氣不妨游衍莫忘歸郊行即事新蒲嫩柳滿汀洲春入漁舟一棹浮雲幕倒遮天外日風帘輕揚竹間樓望窮遠岫微茫見興逐歸槎汗漫遊不畏蛟螭起波浪却憐清泚向東流春日江上驟經微雨過芳郊轉覺長河氣象豪歸騎已登吳坂峻飛雲猶認華山高門前岐路通西國城上樓臺壓巨濤欲問甘棠舊風化主人􅌽客醉香醪下白徑嶺先寄孔周翰郎中衡茅岑寂掩柴關庭下蕭疏竹數竿狹地難容大池沼淺盆聊作小波瀾澄澄皓月供宵影瑟瑟涼風動曉寒不校蹄涔與滄海未知清興有誰安盆荷歎息斯文約共修如何夫子便長休東山無復蒼生望西土誰供後學求千古聲名聯棣萼二年零落去山邱寢門慟哭知何限豈獨交親念舊游哭張子厚先生隂曀消除六幕寬嬉遊何事我心閒鳥聲人意融和候草色花芳杳藹間水底斷霞光出岸雲頭斜日影銜山緣情若論詩家興却恐騷人合厚顔新晴野望詩絶句第二十六釋絶句於清風明月下求之即飄然也雲淡風輕近午天傍花隨柳過前川時人不識豫心樂將謂偷閒學少年偶成吏身拘絆同疏屬俗眼塵昏甚瞽矇辜負終南好泉石一年一度到山中白雲道中身勞無補公家事心冗空令學業衰世路嶮巇功業遠未能歸去不男兒馬上偶成參差臺殿緑雲中四靣篔簹一徑通曽讀華陽真誥上神仙居在碧琳宫草堂車倦人煩渴思長巖中氷片玉成方老仙笑我塵勞久乞與雲膏洗俗腸長行暑中得氷以石敲餐甚佳久厭塵籠萬慮昏喜尋泉石暫清神目勞足倦深山裏猶勝低眉對俗人游重雲南藥東邊白閣西登臨身共白雲齊上方頂上朝來望陡覺羣峯四靣低雲際山襟裾三日絶塵埃欲上籃輿首重回不是吾儒本經濟等閒爭肯出山來下山偶成中春時節百花明何必繁絃列管聲借問近郊行樂地潢溪山水照人清心門不為管絃樂道勝豈因名利榮莫謂冗官難自適暇時還得肆遊行功名不是關心事富貴由來自有天任是𣙜酤虧課利不過抽得俸中錢有生得遇唐虞聖為政仍逢守令賢縱得無能閒主簿嬉遊不負艷陽天獄訟已聞寃滯雪田農還喜土膏勻只應野叟猶相笑不與溪山作主人以上亦逰山作得小松黃楊四本植公署詩呈張寺丞興宗須知春色醲於酒醉得逰人意自狂直使華顛老公子看花爭入少年場貪花自是少年事泥酒定嫌醒者非顧我疏慵老山野却騎歸馬背斜暉下馬問老僕言公賞花去只在近園中叢深不知處桃李飄零杏子青滿城車馬響春霆就中得意張公子十日花前醉不醒以上九日訪張子直承出看花不遇戲書學舍妖言莫信傳張惡虛氣休將碎唾壺借問間窗靜孤背何如爭勝擊珊瑚贈王求甫鐵如意曉日都門颭斾旌曉風鐃吹入三城知公再為蒼生起不是尋常刺史行送吕晦叔赴河陽二龍間卧洛波清今日都門獨餞行願得賢人均出處始知深意在蒼生贈司馬君實曽是去年賞春日春光過了只逡巡却是去年春自去我心依舊去年春戲題南去北來休便休白蘋吹盡楚江秋道人不是悲秋客一任晚山相對愁題淮南寺誰憐大地多竒景自愛貧家有古風㑹向紅塵生野思始知泉石在胸中野軒强潔猶來真有為好高安得是無心汙亭妙旨君須㑹物我何爭事莫侵汙亭囊中數味應千種砌下栽苗過百名好是無風入庭戶清香交送滿檐楹藥軒亭下花光春正好亭頭山色晚尤佳欲知剩占春風處思順街東第一家晚暉亭急須乘興賞春英莫待空枝謾寄聲淑景暖風前日事淡雲微雨此時情和諸公梅臺常勸嬉遊須及辰莫辭巾屨染埃塵秪應風雨梅臺上已減前時一半春後一日再和鞭羸百里遠來遊數日隂雲暝不收遮斷好山教不去如何天意異人謀伊川遊嵩山下首同至誠通聖藥通神遠寄衰翁濟病身我亦有丹君信否用時還解壽斯民謝王佺期寄藥二程子抄釋卷十
