body:
  text: 二程子抄釋卷三明呂柟編劉絢録第九天則不言而信神則不怒而威釋學力當建諸天地質諸鬼神學要信與熟釋惟信則可熟敬勝百邪釋敬最難識識敬後百邪自退欲當大任須是篤實釋為質而有光輝方大人賢不肖國家治亂不可以言命釋治身治世皆在立志求賢大抵學不言而自得者乃自得也有安排布置者皆非自得也釋自得者立坐處皆可見人心莫不有知惟蔽於人欲則忘天德一作理也釋理欲不並行皆實理也人知而信者為難孔子曰朝聞道夕死可矣死生亦大矣非誠知道則豈以夕死為可乎釋須知至於死重於生時樂天知命通上下之言也聖人樂天則不須言知命而信之者爾不知命無以為君子是矣命者所以輔義一循於義則何庸斷之以命哉夫聖人之知天命則異如此釋天與命並行樂天即知命孝悌也者其為仁之本與言為仁之本非仁之本也釋為猶行也言天之自然者謂之天道言天之付與萬物者謂之天命釋道命一理治道在於立志責任求賢釋三者以立志為先求賢為要顔子不動聲氣孟子則動聲氣矣釋其究一也學者須識聖賢之體聖人化工也賢人巧工也釋化工天造巧工人為有有德之言孟子言已志者有德之言也言聖人之事造道之言也釋言出心見學至於樂則成矣篤信好學未如自得之為樂造道者也好之者如遊他人園圃樂之者則已物爾然人只能信道亦是人之難能也釋學至樂處便是孔顔學之興起莫先於詩詩有美刺歌誦之以知善惡治亂廢興禮者所以立也不學禮無以立樂者所以成德樂則生矣生則惡可已也惡可已則不知手之舞之足之蹈之也若夫樂則安安則久久則天天則神天則不言而信神則不怒而威至於如此則又非手舞足蹈之事也釋不知舞蹈處方是熟有實則有名名實一物也若夫好名者則徇名為虛矣如君子疾沒世而名不稱謂無善可稱耳非徇名也釋學者止宜物實實便能名人須學顔子有顔子之德則孟子之事功自有一作立孟子者禹稷之事功也釋聖賢體用本同太玄中首中陽氣潛萌於黃宮無不在乎中陽首一藏心于淵美厥靈根測曰藏心于淵神不外也揚子雲之學蓋嘗至此地位也釋子雲見至此耳行恐未至也視聽思慮動作皆天也人但於其中要識得真與妄爾釋真處便見踐形豶豕之牙吉不去其牙而豶其勢則自善矣治民者不止其爭而教之護之類是也釋明性以制氣觀理以窒欲尚義以抑利勸善以沮惡立教養以息盜皆豶豕之牙也易要玩索齋戒以神明其德夫釋至此方是盡學只要鞭辟一作約近裏著已而已故切問而近思則仁在其中矣言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前在輿則見其倚於衡夫然後行只此是學質美者明得盡查滓便渾化却與天地同體其次惟莊敬持養及其至則一也釋切已處便是誠誠便能通也人最可畏者是便做要在燭理一本以下云子路有聞未之能行唯恐有聞釋此孔子無不知而作之者也知至則便意誠若有知而不誠者皆知未至爾知至而至之者知至而往至之乃幾之先見故曰可與幾也知終而終之則可與存義也知至至之主始知終終之主終為政須要有綱紀文章先有司鄉官讀法平價謹權量皆不可闕也人各親其親然後能不獨親其親仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見仲弓與聖人用心之大小推此義則一心可以喪邦一心可以興邦只在公私之間爾釋告仲弓者乃為政之本綱紀文章其推也右師訓純亦不已天德也造次必於是顚沛必於是三月不違仁之氣象也又其次則日月至焉者也釋功夫只在無間楊子出處使人難説孟子必不肯為楊子事釋楊子造其極則老子耳孔子與點蓋與聖人之志同便是堯舜氣象也誠異三子者之撰特行有不掩焉者真所謂狂矣子路等所見者小子路只為不達為國以禮道理所以為夫子笑若達為國以禮之道便却是這氣象也釋若達則甲兵賦稅童冠歌遊其義一也人之學當以大人為標垜然上面更有化爾人當學顔子之學釋顔子近乎化子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也子貢蓋於是始有所得而嘆之以子貢之才從夫子如此之久方嘆不可得而聞亦可謂之純矣觀其孔子沒築室於場六年然後歸則子貢之志亦可見矣他人如子貢之才六年中待作多少事豈肯如此凡人才學便須知著力處既學便須知得力處釋知著力處定向也知得力處安慮也右戊巳冬見伯淳洛中所聞楊墨之害甚於申韓佛老一無老字之害甚於楊墨楊氏為我疑於仁墨氏兼愛疑於義申韓則淺陋易見故孟子則闢楊墨為其惑世之甚也佛老一作氏字其言近理又非楊墨之比此所以害尤甚楊墨之害亦經孟子闢之所以廓如也釋程氏闢佛老與孟氏闢楊墨同功禮云惟祭天地社稷為越紼而行事似亦太早雖不以卑廢尊若既葬而行之宜亦可也蓋未葬時哀戚甚人有所不能祭爾釋此議的當矣艮其止止其所也八元有善而舉之四凶有罪而誅之各止其所也釋氏只曰止安知止乎吳本罪作惡誅作去釋此惟至明至健者能然曽子易簀之意心是理理是心聲為律身為度也釋曽子可與立命矣右於洛中所聞絢問先生相别去求所以教曰人之相愛者相告戒必曰凡事當善處然只在仗忠信只不忠信便是不善處也釋此當參前倚衡有人治園圃役知力甚勞先生曰蠱之象君子以振民育德君子之事惟有此二者餘無他為二者為已為人之道也為已為人吳本作治已治人釋此大學之道在明德新民佛言前後際斷純亦不已是也彼安知此哉子在川上曰逝者如斯夫不舍晝夜自漢以來儒學皆不識此義此見聖人之心純亦不已也詩曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已此乃天德也有天德便可語王道其要只在愼獨釋獨處易能間斷愼之則不已人之學不進只是不勇釋有志者方可教右過汝所聞志氣之帥不可小觀敬即便是禮無已可克安有識得易後不知退藏於密密是甚處釋密是用古之學者優柔厭飫有先後次序今之學者却只做一場話説務高而已常愛杜元凱語若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也今之學者往往以遊夏為小不足學然遊夏一言一事却總是實如子路公西赤言志如此聖人許之亦以此自是實事後之學者好高如人遊心於千里之外然自身却只在此釋人惟實方有立處方有行處人皆稱柳下惠為聖人只是因循前人之語非自見假如人言孔子為聖人也須直待已實見聖處方可信釋此便是論世曽子傳聖人學其德後來不可測安知其不至聖人如言吾得正而斃且休理會文字只看他氣象極好被他所見處大後人雖有好言語只被氣象卑終不類道釋此之謂有德之言養心莫善於寡欲不欲則不惑所欲不必沉溺只有所向便是欲釋有所向便不合天理人情人惡多事或人憫一作欲簡之世事雖多盡是人事人事不教人做更責誰何釋人事是學問要息思慮便是不思慮釋只看如何思慮若安而能慮亦自妙也人茍有朝聞道夕死可矣之志則不肯一日安於所不安也何止一日須臾不能如曽子易簀須要如此乃安人不能若此者只為不見實理實理者實見得是實見得非凡實理得之於心自别若耳聞口道者心實不見若見得必不肯安於所不安人之一身儘有所不肯為及至他事又不然若士者雖殺一作教之使為穿窬必不為其他事未必然至如執卷者莫不知説禮義又如王公大人皆能言軒冕外物及其臨利害則不知就義理却就富貴如此者只是説得不實見及其蹈水火則人皆避之是實見得須是有見不善如探湯之心則自然别昔曽經傷於虎者他人語虎則雖三尺童子皆知虎之可畏終不似曽經傷者神色懾懼至誠畏之是實見得也得之於心是謂有德不待勉強然學者則須勉強古人有捐軀隕命者若不實見得則烏能如此須是實見得生不重於義一作義重於生生不安於死也故有殺身成仁者只是成就一箇是而已釋天下事果能實見則何畏水與火古與今學者患心慮紛亂不能寧靜此則天下公病學者只要立箇心此上頭儘有商量釋不知你心慮紛擾甚事語高則言遠言約則義微大率六經之言涵蓄無有精粗欲言精微多則愈粗凡物有本末不可分本末為兩假事灑掃應對是其然必有所以然釋由下學即上達若謂既返之氣復將為方伸之氣必資於此則殊與天地之化不相似天地之化自然生生不窮更何復資於既斃之形已返之氣以為造化近取諸身其開闔往來見之鼻息然不必須一本無此四字有豈字假吸復入以為呼氣則自然生人氣之生生一作人之無於真元天之氣亦自然生生不窮至如海水因陽盛而涸及隂盛而生亦不是將一作必是已涸之氣却生水自然能生往來屈伸只是理也盛則必有衰晝則必有夜往則便有來天地中如洪爐何物不銷鑠了釋此亦可解輪廽之説天子七廟亦恐只是一日行禮考之古則戊辰同祀文武考之今則宗廟之祀亦是一日釋詩有祭文王詩祭成王詩恐因事舉也厯象之法大抵主於日日一事正則其他皆推洛下閎作厯言數百年後當差一日其差理必然何承天以差遂立歲差法其法以所差分數攤在所厯之年著一歲差著幾分其差後亦不定獨邵堯夫立法冠絶古今却於日月交感之際以隂陽虧盈求之遂不差大抵隂常虧陽常盈故只於這一作張裏差了厯上若是通理所通為多堯夫之學大抵似揚雄然亦不盡如之常窮味有二萬八千六百此非人所合和是自然也色二萬八千六百又非人所染畫得亦是自然也獨聲之數只得一半數不行盡聲只是於日出地上數得到日入地下遂數不行此皆有理譬之有形斯有影不可謂却收以為來日之影據皇極經世色味皆一萬七千二百十四疑此記者之誤釋堯夫厯活修養之所以引年國祚之所以祈天永命常人之至於聖賢皆工夫到這裏則有此應釋學可變氣質顔孟之於聖人其知之深淺同只是顔子尤溫淳淵懿於道得之更淵一作深粹近聖人氣象釋亦資之美率氣者在志養志者在直內釋內直則充塞天地老子言甚雜如隂符經却不雜然皆窺測天道之未盡者也釋老子小其天而學聖人之道更無精粗從灑掃應對至精義入神通貫只一理雖灑掃應對只看所以然者如何釋下學便是上達切要之道無如敬以直內釋能此則心有主可以方外原始反終故知死生之説但窮得自知死生之説不須將死生便作一箇道理求釋凡論通晝夜之道質鬼神無疑亦然仁之道要之只消道一公只是仁之理不可將公便喚做仁一本有將公而以人體之故為仁只為公則物我兼照故仁所以能恕所以能愛恕則仁之施愛則仁之用也釋公而以人體之便有生意矣學者為氣所勝習所奪只可責志釋志可帥三軍釋氏之説若欲窮其説而去取之則其説未能窮固已化而為佛矣只於迹上考之其設教如是則其心果如何固難為取其迹有是心則有是迹王通言心迹之判便是胡説不若且於迹上斷定不與聖人合其言有合處則吾道固已有有不合者固所不取如是立定却省易一作力偏釋見中正後别邪甚易儒者其卒必一作多入異教其志非願也其勢自然如此蓋智窮力屈欲休又知得未安穩休不得故見人有一道理其勢須從之譬之行大道坦然無阻則更不由徑只為前面逢著山逢著水行不得有窒礙則見一邪徑欣然從之儒者之所以必有窒礙者何也只為不致知知至至之則自無事可奪今夫有人處於異鄉元無安處則言某處安某處不安須就安處若有家人言他人為安已必不肯就彼故儒者而卒歸異教者只為於已道實無所得雖曰聞道終不曽實有之釋中無主百感皆至有謂因苦學而至失心者學本是治心豈有反為心害某氣本不盛然而能不病無倦怠者只是一箇愼生不恣意其於外事思慮悠悠釋治心而失心者未治心夢説之事是傳説之感高宗高宗感傅説只思得聖賢之人方始應其感若傅説非聖賢自不相感如今卜筮蓍在手事在未來吉凶在書策其卒三者必合矣使書策之言不合於理則自不驗釋雖則傅説亦未嘗忘天下醫者不諳理則處方論藥不盡其性只知逐物所知不治合和之後其性又如何假如訶子黃白礬白合之而成黑黑見則黃白皆亡又如一二合而為三三見則一二亡離而為一二則三亡既成三又求一與二既成黑又求黃與白則是不知物性一作理古之人窮盡物理則食其味嗅其臭辨其色知其某物合某則成何性天有五氣故凡生物莫不具有五性居其一而有其四至如草木也其黃者得土之性多其白者得金之性多釋此便見五臟生尅之意宗子法廢後世譜牒尚有遺風譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄釋宗法存亡係國家之盛衰五祀恐非先王之典皆後世巫祝之一作誣祀無之字誣又作淫言報則遺其重者井人所重行寧廊也其功幾何釋五祀之設但主有家而言故屬大夫雖庶人必祭及高祖比至天子諸侯止有疏數耳釋禮注適士一廟止祭父是亡祖也故豫嘗謂一廟祭五世凡物之散其氣遂盡况既無復歸本原之理天地間如洪爐雖生物銷鑠亦盡况既散之氣豈有復在天地造化又焉用此既散之氣其造化者自是生氣至如海水潮日出則水涸是潮退也其涸者已無也月出則潮水生也非却是將已涸之水為潮此是氣之終始開闔便是易一闔一闢謂之變釋只生生之謂易其明仁春秋傳為案經為斷釋左氏傳也治道亦有從本而言亦有從事而言從本而言惟從格君心之非正心以正朝廷正朝廷以正百官若從事而言不救則已若須救之必須變大變則大益小變則小益釋縱從事亦不能外乎本學者好語高正如貧人説金説黃色説堅軟道他不是又不可只是好笑不曽見富人説金如此釋有金者多不言仲尼於論語中未嘗説神字只於易中不得已言數處而已釋論語易之用其行處也律厯之法今亦粗存但人用之小耳律之遺則如三命是也其法只用五行支幹納音之類厯之遺則是星算人生數一作處然有此理茍無此却推不行釋厯之學近在指掌近取諸身百理皆具屈伸往來之義只於鼻息之間見之屈伸往來只是理不必將既屈之氣復為方伸之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必返其理須如此有生便有死有始便有終釋損益盈虛皆自然之理不得已而然也説書必非古意轉使人薄學者須是潛心積慮優遊涵養使之自得今一説盡只是教得薄至如漢時説下帷講誦猶未説書釋説意優於説書學者先務固在心志有謂欲屏去聞見知思則是絶聖棄智有欲屏去思慮患其紛亂則是須坐禪入定如明鑑在此萬物畢照是鑑之常難為使之不照人心不能不交感萬物亦難為使之不思慮若欲免此一本無此四字唯是心一作在心有主如何為主敬而已矣有主則虛虛謂邪不能入無主則實實謂物來奪之今夫瓶罌有水實內則雖江海之浸無所能入安得不虛無水於內則停注之水不可勝注安得不實大凡人心不可二用用於一事則他事更不能入者事為之主也事為之主尚無思慮紛擾之患若主於敬又焉有此患乎所謂敬者主一之謂敬所謂一者無適之謂一且欲涵泳主一之義一則無二三矣一作不一則二三矣言敬無如聖人之言一本無聖人之言四字易所謂敬以直內義以方外須是直內乃是主一之義至於不敢慢尚不愧於屋漏皆是敬之事也但存此涵養久之自然天理明釋敬有甚樣子只是主一主一甚活動不泥也間邪存誠間邪則誠自存如人有室垣墻不修不能防寇寇從東來逐之則復有自西入逐得一人一人復至不如修其垣墻則自不至故欲間邪也釋如疾㵼便是補也學禪者嘗謂天下之忙者無如市井之人答以市井之人雖日營利然猶有休息之時至忙者無如禪客何以言之禪之行住坐卧無不在道存無不在道之心此便是常忙釋此數珠念也不如主一法嚴威儼恪非敬之道但致敬須自此入釋外不肅則心放墨子之書未至有兼愛之意及孟子之時其流浸遠乃至若是之差楊子為我亦是義墨子兼愛則是仁雖差之毫釐繆以千里直至無父無君如此之甚釋兼愛為我初亦不甚差後至無父無君况初差者乎與叔季明以思知聞見為患某甚喜此論邂逅却正語及至要處世之學者大敝正在此若他折難堅叩方能終其説直須要明辨釋有辨難方是學問右入關語録伊川語趙景平問子罕言利與命與仁所謂利者何利曰不獨財利之利凡有利心便不可如作一事須尋自家穩便處皆利心聖人以義為利義安處便為利如釋氏之學皆本於利右己巳冬所聞伊川語説易第十伊川語不知何人録先生嘗説某於易傳今却已自成書但逐旋修改期以七十其書可傳韓退之稱聰明不及於前時道德日負於初心然某於易傳後所改者無已不知如何故且更期之以十年之功看如何春秋之書待劉絢文字到却用功亦不多也今人解詩無意思此却待出些文字中庸書却已成今農夫祁寒暑雨深耕易耨播種五榖吾得而食之今百工技藝作為器用吾得而用之甲胄之士被堅執鋭以守土宇吾得而安之却如此間過了日月即是天地間一蠧也功澤又不及民别事又做不得惟有補輯聖人遺書庶幾有補爾陳長方見尹子於姑蘇問中庸解尹子云先生自以為不滿意焚之矣釋此伊川道不行之嘆致知在格物格物之理不若察之於身尤切釋此方是一是皆以修身為本之意常見伯淳所在臨政便上下響應到了人衆後便成風成風則有所鼓動天地間只是一箇風以動之也釋明則動傳經為難如聖人之後才百年傳之已差聖人之學若非子思孟子則幾乎息矣道何嘗息只是人不由之道非亡也幽厲不由也人或勸先生以加禮近貴先生曰何不見責以盡禮而責之以加禮禮盡則已豈有加也釋盡禮便是孔子聖人之語因人而變化語雖有淺近處即却無包含不盡處如樊遲於聖門最是學之淺者及其問仁曰愛人問知曰知人且看此語有甚包含不盡處他人之語語近則遺遠語遠則不知近惟聖人之言則遠近皆盡釋聖人言如化工今之為學者如登山麓方其迤邐莫不闊步及到峻處便逡巡一本無便止二字云或以峻而遂止或以難而稍緩茍能遇難而益堅聞過則改何遠弗至也先代帝王陵寢不多有間田推其後每處只消與田十頃與一間官世守之至如唐狄仁傑顔杲卿之後朝廷與官一人死則却絶不若亦如此處之亦與田五七頃後世骨肉之間多至仇怒忿爭其實為爭財使之均布立之宗法官為法則無所爭釋此興滅繼絶之意後世人理全廢小失則入於夷狄大失則入於禽獸人理一作禮大凡禮必須有意禮之所尊尊其義也失其義陳其數祝史之事也釋禮後乎人或以禮官為間官某謂禮官之責最大朝廷一有違禮皆禮官任其責豈得為間官釋禮官得人庶官可省責陳平雖不知道亦知學如對文帝以宰相之職非知學安能如此釋平有遠識曹參去齊以獄市為託後之為政者留意於獄者則有之矣未聞有治市者釋市平則獄平學者所貴聞道執經而問但廣聞見而已然求學者不必在同人中非同人又却無學者釋同處為力易見效或問如何學可謂之有得曰大凡學問聞之知之皆不為得得者須默識心通學者欲有所得須是篤志誠意燭理上知則頴悟自别其次須以義理涵養而得之釋誠便明古者家有孰黨有庠故人未有不入學者三老坐於里門出入察其長幼揖讓之序如今所傳之詩人人諷誦莫非止於禮義之言今人雖白首未嘗知有詩至於里俗之言盡不可聞皆繫其習也以古所習安得不善以今所習安得不惡釋師道甚重唐太宗後人只知是英主元不曽有人識其惡至如殺兄取位若以功業言不過只做得箇功臣豈可奪元良之位至如肅宗即位靈武分明是篡也釋此桓文功扁二程子抄釋卷三
