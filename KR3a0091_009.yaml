body:
  text: 二程子抄釋卷九明吕柟編論王伯之辨第一明道文下同臣伏謂得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者霸者之事也王道如砥本乎人情出乎禮義若履大路而行無所回曲霸者﨑嶇反側於曲徑之中而卒不可與入堯舜之道故誠心而王則王矣假之而霸則霸矣二者其道不同則在擇審其初而已易所謂差若毫釐謬以千里者其初不可不審也故治天下者必先立其志王志先立則邪説不能移異端不能惑故力進於道而莫之禦也茍以霸者之心而求王道之成是衒石以為玉也故仲尼之徒無道桓文之事而曽西恥比管仲者義所不由也况下於霸者哉陛下躬堯舜之資處堯舜之位必以堯舜之心自任然後為能充其道漢唐之君有可稱者論其人則非先王之學考其時則皆駁雜之政乃以一曲之見幸致小康其創法垂統非可繼於後世者皆不足為也然行仁政而不素講其具使其道大明而後行則或出或入終莫有所至也夫事有大小有先後察其小忽其大先其所後後其所先皆不可以適治且志不可慢時不可失惟陛下稽先聖之言察人事之理知堯舜之道備於己反身而誠之推之以及四海擇同心一德之臣與之共成天下之務書所謂尹躬暨湯咸有一德又曰一哉王心言致一而後可以有為也古者三公不必備惟其人誠以謂不得其人而居之則不若闕之之愈也蓋小人之事君子所不能同豈聖賢之事而庸人可參之哉欲為聖賢之事而使庸人參之則其命亂矣既任君子之謀而又入小人之議則聰明不專而志意惑矣今將救千古深錮之弊為生民長久之計非夫聽覽之明盡正邪之辨致一而不二能勝之乎或謂人君舉動不可不謹易於更張則為害大矣臣獨以為不然所謂更張者顧理所當耳其動皆稽古質義而行則為謹莫大焉豈若因循茍簡卒致敗亂者自古以來何常有師聖人之言法先王之治將大有為而反成禍患者乎願陛下奮天錫之勇智體乾剛而獨斷沛然不疑則萬世幸甚熙寧二年時為監察御史裏行釋論王伯之分甚明白矣則行王道甚簡易矣論遣張載按獄第二臣伏聞著作佐郎張載往明州推勘苗振公事竊謂載經術德義久為士人師法近侍之臣以其學行論薦故得召對蒙陛下親加延問屢形天奬中外翕然知陛下崇尚儒學優禮賢俊為善之人孰不知勸今朝廷必欲究觀其學業詳試其器能則事固有繫教化之本原干政治之大體者儻使之講求議論則足以盡其所至夫推按詔獄非謂儒者之不當為臣今所論者朝廷待士之道爾蓋試之以治獄雖足以見其鈎深練核之能攻摘斷擊之用正可試諸能吏非所以盡儒者之事業徒使四方之人謂朝廷以儒術賢業進之以獄吏之事試之則抱道修潔之士益難自進矣於朝廷尊賢取士之體將有所失伏乞朝廷別賜選差貴全事體熙寧二年閏十一月上時為監察御史裏行朝釋按獄狀非獨為張載實為廷也論君道第三臣伏謂君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趣道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心誠意擇善而固執之也夫義理不先盡則多聽而易惑志意不先定則守善而或移惟在以聖人之訓為必當從先王之治為必可法不為後世駁雜之政所牽制一作滯不為流俗因循之論所遷惑自知極於明信道極於篤任賢勿二去邪勿疑必期致世如三代之隆而後已也然天下之事患常生於忽微而志亦戒乎漸習是故古之人君雖出入從容間燕必有誦訓針諫之臣左右前後無非正人所以成其德業伏願陛下禮命老成儒賢不必榮以職事俾日親便座講論道義以輔聖德又擇天下賢俊使得陪侍法從朝夕延見開陳善道講磨治體以廣聞聽如是則聖智益明王猷允塞矣今四海靡靡日入偷薄末俗嘵嘵無復廉恥蓋亦朝廷尊德樂道一作義之風未孚而篤誠忠厚之教尚鬱也惟陛下稽聖人之訓法先王之治一一作正心誠意體剛健而力行之則天下幸甚釋君志定便可通天下之志論十事第四臣竊謂聖人創法皆本諸人情極乎物理雖二帝三王不無隨時因革踵事增損之制然至乎為治之大原牧民之要道則前聖後聖豈不同條而共貫哉蓋無古今無治亂如生民之理有窮則聖王之法可改後世能盡其道則大治或用其偏則小康此歷代彰灼著明之效也茍或徒知泥古而不能施之於今姑欲修名而遂廢其實此則陋儒之見何足以論治道哉然儻謂今人之情皆已異於古先王之迹不可復於今趨便目前不務高遠則亦恐非大有為之論而未足以濟當今之極弊也謂如衣服飲食宫室器用之類茍便於今而有法度者豈亦遽當改革哉惟其天理之不可易人所賴以生非有古今之異聖人之所必為者固可槩舉然行之有先後用之有緩速若夫裁成運動周旋曲當則在朝廷講求設施如何耳古者自天子達於庶人必須師友以成就其德業故舜禹文武之聖亦皆有所從學令師傅之職不修友臣之義未著所以尊德樂善之風未成於天下此非有古今之異者也王者必奉天建官故天地四時之職歷二帝三王未之或改所以百度修而萬化理也至唐猶僅存其略當其治時尚得紀綱小正今官秩淆亂職業廢弛太平之治所以未至亦非有古今之異也天生蒸民立之君使司牧之必制其常産使之厚生則經界不可不正井地不可不均此為治之大本也唐尚能有口分授田之制今則蕩然無法富者跨州縣而莫之止貧者流離餓殍而莫之恤幸民雖多而衣食不足者蓋無紀極生齒日益繁而不為之制則衣食日蹙轉死日多此乃治亂之機也豈可不漸圖其制之之道哉此亦非有古今之異者也古者政教始乎鄉里其法起於比閭族黨州鄉鄼遂以相聨屬統治民相安而親睦刑法鮮犯亷恥易格此亦人情之所自然行之則效亦非有古今之異也庠序之教先王所以明人倫化成天下今師學廢而道德不一鄉射亡而禮義不興貢士不本於鄉里而行實不修秀民不養於學校而人材多廢此較然之事亦非有古今之異者也古者府史胥徒受祿公上而兵農未始判也今驕兵耗匱國力亦已竭極矣臣謂禁衛之外不漸歸之於農則將貽深慮府史胥徒之役毒遍天下不更其制則未免大患此亦至明之理非有古今之異者也古者民必有九年之食無三年之食者以為國非其國臣觀天下耕之者少食之者衆地力不盡人功不勤雖富室強宗鮮有餘積况其貧弱者乎或一州一縣有年嵗之凶即盜賊縱橫飢羸滿路如不幸有方三二千里之災或連年之歉則未知朝廷以何道處之則其患不可勝言矣豈可曰昔何以不至是因以幸為可恃也哉固宜漸從古制均田務農公私交為儲粟之法以為之備此亦無古今之異者也古者四民各有常職而農者十居八九故衣食易給而民無所苦困今京師浮民數逾百萬遊手不可資度觀其窮蹙辛苦孤貧疾病變詐巧偽以自求生而常不足以生日益嵗滋久將若何事已窮極非聖人能變而通之則無以免患豈可謂無可奈何而已哉此在酌古變今均多恤寡漸為之業以救之耳此亦非有古今之異者也聖人奉天理物之道在乎六府六府之任治於五官山虞澤衡各有常禁故萬物阜豐而財用不乏今五官不修六府不治用之無節取之不時豈惟物失其性林木所資天下皆已童赭斧斤焚蕩尚且侵尋不禁而川澤漁獵之繁暴殄天物亦已耗竭則將若之何此乃窮弊之極矣惟修虞衡之職使將養之則有變通長久之勢此亦非有古今之異者也古者冠婚喪祭車服器用等差分别莫敢踰僭故財用易給而民有常心今禮制未修奢靡相尚卿大夫之家莫能中禮而商販之類或踰王公禮制不足以檢飭人情名數不足以旌别貴賤既無定分則姦詐攘奪人人求厭其欲而後已豈有止息者哉此爭亂之道也則先王之法豈得不講求而損益哉此亦非有古今之異者也此十者特其端緒耳臣特論其大端以為三代之法有必可施行之驗如其綱條度數施為注措之道則審行之必也稽之經訓而合施之人情而宜此曉然之定理豈徒若迂疏無用之説哉惟聖明裁擇釋此十事豈止在宋無古今之異乎論養賢劄子第五臣竊以議當代者皆知得賢則天下治而未知所以致賢之道也是雖衆論紛然未極其要朝廷亦以行之為艱而不為也三代養賢必本於學而德化行焉治道出焉本朝踵循唐舊而館閣清選止為文字之職名實未正欲招賢養材以輔時贊化將何從而致之也臣厯觀古先哲王所以虛己求治何嘗不盡天下之才以成己之德也故曰大舜有大焉善與人同樂取于人以為善今天下之大豈為乏賢而朝廷無養賢之地以容徐察其器識高下而進退之也臣今欲乞朝廷設延英院以待四方之賢凡公論推薦及巖穴之賢必招致優禮視品給俸而不可遽進以官止以應詔命召凡有政治則委之詳定凡有典禮則使之討論經畫得以奏陳而治亂得以講究也俾羣居切磨日盡其材行其志使政府及近侍之臣互與相接陛下時賜召對詔以治道可觀其識才器能也察以纍歲人品益分然後使賢者就位能者任職或委付郡縣或師表士儒其德業尤異漸進以師臣職司之任為輔弼為公卿無施之不稱也若是則引彚並進野無遺賢陛下尊賢待士之心可謂無負於天下矣取進止釋只將已有之賢肯用之其治亦過半矣况養乎答橫渠先生定性書第六承教諭以定性未能不動猶纍於外物此賢者慮之熟矣尚何俟小子之言然嘗思之矣敢貢其説於左右所謂定者動亦定靜亦定無將迎無內外茍以外物為外牽已而從之是以己性為有內外也且以性為隨物於外則當其在外時何者為在內是有意於絶外誘而不知性之無內外也既以內外為二本則又烏可遽語定哉夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應易曰貞吉悔亡憧憧往來朋從爾思茍規規於外誘之除將見滅於東而生於西也非惟日亦不足顧其端無窮不可得而除也人之心各有所蔽故不能適道大率患在於自私而用智自私則不能以有為為應接用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人孟子亦曰所惡於智者為其鑿也與其非外而是內不若內外之兩忘也兩忘則澄然無事矣無事則定定則明明則睿何應物之為纍哉聖人之喜以物之當喜聖人之怒以物之當怒是聖人之喜怒不繫於心而繫於物也是則聖人豈不應於物哉烏得以從外者為非而更求在內者為是也今以自私用智之喜怒而視聖人之喜怒之正為何如哉夫人之情易發而難制者惟怒為甚第能於怒時遽亡其怒而觀理之是非亦可以見外誘之不足惡而於道亦思過半矣心之精微口不能宣加之素拙於文辭又吏事匆匆未能精慮當否佇報然舉大要亦當近之矣道近求遠古人所非惟聰明裁之釋定性書生熟只是一義晉城縣令書名第七古者諸侯之國各有史故其善惡皆見乎後世自秦罷侯置守令則史亦從而廢其後自非有功德者或記之循吏與夫凶殘之極者以酷見傳其餘則泯然無聞矣如漢唐之有天下皆數百年其間郡縣之政可書宜亦多矣其見書者率才十數人使賢者之政不幸而無傳其不肖者復幸得以蓋其惡與古史之意異矣夫圖治於長久者雖聖賢為之且不能倉卒茍簡而就蓋必本之人情而為之法度然後可使去惡而從善則紀綱條教必審定而後下其民之服循漸漬亦必待久乃淳固而不變今之為吏三嵗而代者固已遲之矣使皆知禮義者自其始至即皇皇然圖所設施則亦教令未熟民情未孚而更書已至矣儻後之人所志不同復有甚者欲新已之政而盡去其舊則其迹固已無餘而况因循不職者乎噫以易息之政而又無以託其傳則宜其去皆未幾而善惡無聞焉故欲聞古史之善而不可得則因謂今有題前政之名氏以為記者尚為近古而斯邑無之乃考之案牒訪之吏民才得自李君而降二十一人第其嵗月先後而記之俾民觀其名而不忘其政後之人得從而質其是非以為師戒云耳來者請嗣書其次釋縣令書名記其以天下後世懼人乎以天下後世懼人而古史尚未復者何也經筵劄子第一伊川文下同臣伏觀自古人君守成而致盛治者莫如周成王成王之所以成德由周公之輔養昔者周公輔一作傅成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士大夫家善教子弟者亦必延名德端方之士與之居處使之薰染成性故曰少成若天性習慣如自然伏以皇帝陛下春秋之富雖睿聖之資得於天稟而輔養之道不可不至所謂輔養之道非謂告詔以言過而後諫也在涵養薰陶而已大率一日之中親賢士大夫之時多親寺人宫女之時少則自然氣質變化德器成就欲乞朝廷慎選賢德之士以侍勸講講讀既罷常留二人直日夜則一人直宿以備訪問皇帝習讀之暇遊息之間時於內殿召見從容宴語不獨漸磨道義至於人情物態稼穡艱難積久自然通達比之常在深宫之中為益豈不甚大竊聞間日一開經筵講讀數行羣官列侍儼然而退情意略不相接如此而責輔養之功不亦難乎今主上沖幼太皇太后慈愛亦未敢便乞頻出但時見講官久則自然接熟大抵與近習處久熟則生褻慢與賢士大夫處久熟則生愛敬此所以養成聖德為宗社生靈之福天下之事無急於此取進止釋以為天下之事無急於此正後世所謂迂也有志古道者其究心焉經筵劄子第二臣聞三代之時人君必有師傅保之官師道之教訓傅傅其德義保保其身體後世作事無本知求治而不知正君知規過而不知養德傅德義之道固已疏矣保身體之法復無聞焉伏惟太皇太后陛下聰明睿哲超越前古皇帝陛下春秋之富輔養之道當法先王臣以為傅德義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜存畏慎之心臣欲乞皇帝左右扶侍祗應宫人內臣並選年四十五已上厚重小心之人服用器玩皆須質朴一應華巧奢麗之物不得至於上前要在侈靡之物不接於目淺俗之言不入於耳及乞擇內臣十人充經筵祗應以伺候皇帝起居凡動息必使經筵官知之有翦桐之戲則隨事針規違持養之方則應時諫止調護聖躬莫過於此取進止釋為天下生靈計須得如此周密慎經筵劄子第三臣竊以人主居崇高之位持威福之柄百官畏慎莫敢仰視萬方承奉所欲隨得茍非知道畏義所養如此其惑可知中常之君無不驕肆英明之主自然滿假此自古同患治亂所繫也故周公告成王稱前王之德以寅畏祗懼為首從古以來未有不尊賢畏相而能成其聖者也皇帝陛下未親庶政方專問學臣以為輔養聖德莫先寅恭動容周旋當主於此嵗月積習自成聖性臣竊聞經筵臣竂侍者皆坐而講者獨立於禮為悖欲乞今後特令坐講不惟義理為順所以養主上尊儒重道之心取進止釋必如此然後能大有為又曰如此便是大有為上太皇太后疏第四臣頤傾竭愚誠冒聞天聽狂妄之誅非所敢避伏念臣草萊賤士蒙陛下拔擢置之勸講之列夙夜畢精竭慮思所以補報萬一昨於去年六月中嘗有奏陳言輔導人主之事已踰半年不蒙施行一事臣愚竊思所言甚多如皆不可用其狂妄亦甚矣雖朝廷寬大不欲以言罪人然主上春秋方富宜親有德之士豈可以狂妄之人置之左右臣倣徨疑慮不能自已况臣所言非出己意皆先王之法祖宗之舊不應無一事合聖心者竊疑文字煩多陛下不能詳覽或雖蒙覽而未察愚意臣不敢一一再言止取一事最切者復為陛下陳之臣前上言乞於延和殿講讀太皇太后每遇政事稀簡聖體康和時至簾下觀講官進説亦省察主上進業於陛下聖聰未必無補兼講官輔導之間事意不少有當奏稟便得上聞臣今思之太皇太后雙日垂簾聽政隻日若更親臨講讀亦恐煩勞聖躬欲乞只就垂簾日聽政罷聖體不倦時召當日講官至簾前問當日主上進業次第講説所至如何開益使天下知陛下於輔養人主之道用意如此延對儒臣自古以為美事陛下試從臣言後當知其不謬此一時之事且非定制如其無益罷之何晚自來經筵賜坐啜茶蓋人主崇儒重道之體今太皇太后省察主上進業雖或使之講説亦無此禮臣所以再言此一事者蓋輔道之間有當奏知之事無由上達若得時至簾前可以陳説所係甚大陛下必謂主上幼沖間日讀講足矣更無他事此甚不然蓋從前不曽有為陛下極陳輔養少主之道者故陛下未深思爾願陛下聖明不以臣之微賤而忽其言察臣區區之心豈有他哉惟欲有補於人主爾臣披瀝肝膽言盡於此伏望聖慈采納天下幸甚釋雖於女主猶如此委曲進悟况於長君明主哉其志忠且仁矣開樂御宴奏狀第五臣伏覩有司排備開樂御宴臣備員勸講職在以經義輔導人主事有害義不敢不言夫居喪用喪禮除喪用吉禮因事而行乃常道也今若為開樂張宴則是特為一喜慶之事失禮意害人情無大於此雖曰故事祖宗亦不盡行或以故而罷或因事而行臣愚竊恐祖宗之意亦疑未安故也自古太平日久則禮樂純備蓋講求損益而漸至爾雖祖宗故事固有不可改者有當隨事損益者若以為皆不可改則是昔所未遑今不得復作前所未安後不得復正朝廷之事更無損益之理得為是乎况先朝美事亦何嘗必行臣前日所言殿上講説是也故事未安則守而不改臣前日所言冬至受表賀是也臣前後纍進狂言未嘗得蒙采用而言之不已者蓋職之所當不敢曠廢伏望聖慈特賜聽納自中降旨罷開樂宴直候因事而用於義為安冒瀆天威臣無任釋此便見有斟酌三代禮樂之意顔子所好何學論第六聖人之門其徒三千獨稱顔子為好學夫詩書六藝三千子非不習而通也然則顔子所獨好者何學也學以至聖人之道也聖人可學而至歟曰然學之道如何曰天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀樂愛惡欲情既熾而益蕩其性鑿矣是故覺者約其情使合於中正其心養其性故曰性其情愚者則不知制之縱其情而至於邪僻梏其性而亡之故曰情其性凡學之道正其心養其性而已中正而誠則聖矣君子之學必先明諸心知所養一作往然後力行以求至所謂自明而誠也故學必盡其心盡其心則知其性知其性反而誠之聖人也故洪範曰思曰睿睿作聖誠之之道在乎信道篤信道篤則行之果行之果則守之固仁義忠信不離乎心造次必於是顛沛必於是出處語默必於是久而弗失則居之安動容周旋中禮而邪僻之心無自生矣故顔子所事則曰非禮勿視非禮勿聽非禮勿言非禮勿動仲尼稱之則曰得一善則拳拳服膺而弗失之矣又曰不遷怒不二過有不善未嘗不知知之未嘗復行也此其好之篤學之之道也視聽言動皆禮矣所異於聖人者蓋聖人則不思而得不勉而中從容中道顔子則思而後得必勉而後中故曰顔子之與聖人相去一息孟子曰充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神顔子之德可謂充實而有光輝矣所未至者守之也非化之也以其好學之心假之以年則不日而化矣故仲尼曰不幸短命死矣蓋傷其不得至聖人也所謂化之者入於神而自然不思而得不勉而中之謂也孔子曰七十而從心所欲不踰矩是也或曰聖人生而知之者也今謂可學而至其有稽乎曰然孟子曰堯舜性之也湯武反之也性之者生而知之者也反之者學而知之也又曰孔子則主而知者也孟子則學而知者也後人不達以謂聖本生知非學可至而為學之道遂失不求諸己而求諸外以博文強記巧文麗辭為工榮華其言鮮有至於道者則今之學與顔子所好異矣釋不遷怒不二過之學分明不遠不為却他處枉日月自老朽賑濟論第七不制民之産無儲蓄之備飢而後發廩以食之廩有竭而飢者不可勝濟也今不暇論其本救目前之死亡惟有節則所及者廣常見今時州縣濟飢之法或給之米豆或食之粥飯來者與之不復有辨中雖欲辨之亦不能也穀貴之時何人不願得食倉廩既竭則殍死者在前無以救矣數年前一親戚為郡守愛恤之心可謂至矣雞鳴而起親視俵散官吏後至者必責怒之於是流民歌詠至者日衆未幾穀盡殍者滿道愚嘗憐其用心而嗤其不善處事救飢者使之免死而已非欲其豐肥也當擇寬廣之處宿戒使晨入至已則闔門不納午而後與之食申而出之給米者午即出日得一食則不死矣其力自能營一食者皆不來矣比之不擇而與當活數倍之多也凡濟飢當分兩處擇羸弱者作稀粥早晚兩給勿使至飽俟氣稍完然後一給第一先營寬廣居處切不得令相枕藉如作粥須官員親嘗恐生及入石灰不給浮浪無此理也平日當禁遊惰至其飢餓哀矜之一也釋賑濟論仁博而智周其王政乎褉飲詩序第八上巳褉飲風流遠矣而蘭亭之會最為後人所稱慕者何哉蓋其遊多豪逸之才而右軍之書復為好事者所重耳事之顯晦未嘗不在人也潁川陳公廙始居洛則引流回環為泛觴之所元豐己未首撰褉事公廙好古重道所命皆儒學之士既樂嘉賔形于歌詠有不愧山陰之句諸君屬而和者皆有高致野人程頤不能賦詩因論今昔之異而為之評曰以我好賢方逐樂之心禮義為疏曠之比道藝當筆劄之工誠不懼矣安知後日之視今日不若今人之慕昔人也哉釋審若此褉飲豈止並芳於蘭亭乎遺金間志第九元豐庚申嵗豫行至雍華間關西學者相從者六七人豫以千錢挂馬鞍比就舍則亡矣僕夫曰非晨裝而亡之則涉水而墜之矣豫不覺嗟曰千錢可惜坐中二人者應曰千錢失去甚可惜也次一人曰千錢微物何足為意後一人曰水中囊中可以一視人亡人得又何嘆乎豫曰人得之乃非亡也吾嘆乎有用之物若沈水中則不復為用矣至雍以語與叔曰人之器識固不同自上聖至於下愚不知有幾等同行者數人耳其不同如此也與叔曰夫數子者之言如何豫曰最後者善與叔曰誠善矣然觀先生之言則見其有體而無用也豫因書而志之後十五年紹聖乙亥秋九月因閲故編偶見之思與叔之不幸早死為之涕下釋先生初嘆其意亦覺未盡蜀守記第十成都人稱近時鎮蜀之善者莫如田元鈞文潞公語不善必曰蔣堂程戡故謡言曰彥博虧田况程戡勝蔣堂虧猶言不如也最善之中言田更優不善之中程猶差勝也豫訪之士大夫以至閭里間察其善不善之迹所謂善者得民心之悅固有可善焉所謂最不善者乃可謂最善者也至今人言及蔣公時事必有不樂之言問其所不樂者衆口所同惟三事而已減損遨樂毁后土廟及諸淫祀伐江瀆廟木修府舍也其尤失人心者節遨樂也前蔣堂十年為政後集當釋欲知官之賢否視何等人稱養魚記第十一書齋之前有石盆池家人買魚子食貓見其煦沫也不忍因擇可生者得百餘養其中大者如指細者如箸支頥而觀之竟日始舍之洋洋然魚之得其所也終觀之戚戚焉吾之感於中也吾讀古聖人書觀古聖人之政禁數罟不入汚池魚尾不盈尺不中取市不得鬻人不得食聖人之仁養物而不傷也如是魚之於是時其有是困耶推是魚孰不可見耶魚乎魚乎細鈎密網吾不得禁之於彼炮燔咀嚼吾免爾於此吾知江海之大足使爾遂其性思量爾於彼而未得其路徒能以斗斛之水生爾之命生爾誠吾心爾得生已多萬類天地中吾心將奈何魚乎魚乎感吾心之戚戚者豈止魚而已乎至和甲午季夏釋養魚記與窗前草驢鳴意同皆可觀仁矣謝吕晦叔待制相見書第十二竊以古之時公卿大夫求於士故士雖自守窮閭名必聞才必用今之時士求於公卿大夫故干進者顯榮守道者沈晦頥處乎今之世才微學寡不敢枉道妄動雖親戚鄉閭間鮮克知其所存者矧敢期知於公卿大夫乎伏承閣下屈近侍之尊下顧愚陋仰荷厚禮愧不足以當之噫公卿不下士久矣頥晦於賤貧世莫之顧而公獨降禮以就之非好賢樂善之深孰能如是乎幸甚幸甚願閣下持是好賢之心廣求之之方盡待之之道異日登廟堂翊明天子治以之自輔以福天下豈不厚與鄙朴之人不善文詞姑竭其區區少致懇釋此書豈惟見先生之自任又以教晦叔之錫類也答橫渠先生書第十三纍書所論病倦不能詳説試以鄙見道其略幸不責其妄易觀吾叔之見至正而謹嚴如虛無即氣則虛無之語深探遠賾豈後世學者所嘗慮及也然此語未能無過餘所論以大槩氣象言之則有苦心極力之象而無寬裕溫厚一作和之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之明所照者如目所覩纖微盡識之矣考索至者如揣料於物約見倣佛爾能無差乎更願完養思慮涵泳義理他日自當條暢何日得拜見當以來書為據句句而論字字而議庶及精微牽勉病軀不能周悉釋此書亦禮恭言直上富鄭公書第十四伊川程頥齋心裁書再拜獻于致政司空相公閣下頥鄙野之人未嘗請謁有位故不獲從鄉里士子趨進門下今者來自山中聞太皇太后厭代心誠有所迫切無路上達敢以聞於左右蓋非公無可告者非公無肯為者頥頃嵗見治昭陵制度規畫一出匠者之拙謀中人之私意宰執而下受成而已莫復置思以巨木架石為之屋計不百年必當損墜既又觀陵中之物見所謂鐵罩者鐵幾萬斤以木為骨大不及三寸其相穿叩之處厚才寸餘遠不過三二十年決須摧朽壓于梓宫于時私心惶駭不能自已使人聞於魏公魏公不以為意以魏公之忠孝於仁皇非不盡心惟其蔽於衆論昧於遠慮以天下之力葬一人於至危之地可不痛哉陵土既復固知無可奈何然每一念之心悸魄喪或終夕不寐今鄉鄰之間有如是事可為謀而不以告人必謂之不仁况仁皇天下父母乎今也不幸太皇太后奄棄宫闈因此事會可為之謀夫合葬之禮周公已來未之有改近取諸唐帝后亦或同穴至如乾陵乃是再啓太祖皇帝神謀遠慮超越萬古昭憲太后亦合安陵稽典禮則得尊親之道徇俗法則皆享福之永此為可行無足疑者伏願公忠誠奮發為朝廷極論其事請奉太皇太后合祔昭陵因得徹去鐵罩用厚陵石槨之制仍更別加裁處使異日雖木壞石墜不能為害救仁皇必至之禍成主上莫大之孝任此事者非公孰能誠能為之天祐忠孝必俾公熾昌壽臧子孫保無疆之休竊惟公事仁宗皇帝三十餘年位極人臣恩遇無比料公之心茍能使仁皇聖體保其安全雖陷一作蹈禍患所不避也况一言之易肯顧慮而不發乎事理至明顧主上素未知爾以公言之重竭誠致懇再三陳之不憂朝廷之不悟獨繫公為不為爾哀誠憤激語辭鄙直內省狂易戰灼無地不宣釋伊川忠愛生於天性如此富猶不及上河東帥書第十五頥荷德既深思報宜異輒以狂言凂聞台聽公到鎮之初必多詢訪衆人對公之語頥能料之當曰虜既再冦河外必不復來公可高枕矣是常言也未知竒勝之道兵法曰攻必取者攻其所不守也謂其不來乃其所以來也又曰彼興大衆豈徒然哉河外空矣復來何利是大不然誠使彼得出不意破蕩數壘足以勞弊一道為利大矣何必負載而歸然後為利也竊恐謀士悅於寬憂計司幸於緩責衆論既一公雖未信而上下之心已懈矣是可慮也寧捐力於不用毋惜功而致悔莫若使彼聞嚴備而絶意則疆埸安矣豈獨使敵人知有備而不來當使內地之人信可恃而願往則一二年間便可致完實長久之策也自古乘塞禦敵必用驍猛招徠撫安多在儒將今日之事則異矣願公念之釋籌邉無遺策矣答人示奏草書第十六辱示奏藁足以見仁人君子愛民之心深切如此欽服欽服子弟當勉公以速且堅何可已也然於愚意有未安者敢布左右觀公之意專以畏亂為主頥欲公以愛民為先力言百姓飢且死丐朝廷哀憐因懼將為冦亂可也不惟告君之體當如是事勢亦宜爾公方求財以活人祈之以仁愛則當輕財而重民懼之以利害則將恃財以自保古之時得丘民則得天下財散則人聚後世茍私利於目前以兵制民以財聚衆聚財者能守保民者為迂秦漢而下莫不然也竊慮廟堂諸賢未能免此惟當以誠意感動覬其有不忍之心而已淺見無取惟公裁之釋謀人之忠告君之體可兼觀答朱長文書第十七相去之遠未知何日復為會合人事自難前期也中前奉書以足下心虛氣損奉勸勿多作詩文而見答之辭乃曰為學上能探古先之陳迹綜羣言之是非欲其心通而默識之固未能也又曰使後人見之猶庶幾曰不忘乎善也茍不能如是誠懼沒而無聞焉此為學之末宜兄之見責也使吾日聞夫子之道而忘乎此豈不善哉恐不記書中之言故却録去此疑未得為至當之言也某於朋友間其問不切者未嘗敢語也以足下處疾罕與人接渴聞議論之益故因此可論而為吾弟盡其説庶幾有小補也向之云無多為文與詩者非止為傷心氣也直以不當輕作爾聖賢之言不得已也蓋有是言則是理明無是言則天下之理有闕焉如彼耒耜陶冶之器一不制則生人之道有不足矣聖賢之言雖欲己得乎然其包涵盡天下之理亦甚約也後之人始執卷則以文章為先平生所為動多於聖人然有之無所補無之靡所闕乃無用之贅言也不止贅而已既不得其要則離真失正反害於道必矣詩之盛莫如唐唐人善論文莫如韓愈愈之所稱獨高李杜二子之詩存者千篇皆吾弟所見也可考而知矣茍足下所作皆合於道足以輔翼聖人為教於後乃聖賢事業何得為學之末乎某何敢以此奉責又言欲使後人見其不忘乎善人能為合道之文者知道者也在知道者所以為文之心乃非區區懼其無聞于後欲使後人見其不忘乎善而已此乃世人之私心也夫子疾沒世而名不稱焉者疾沒身無善可稱云爾非謂疾無名也名者可以厲中人君子所存非所汲汲又云上能探古先之陳迹綜羣言之是非欲其心通默識固未能也夫心通乎道然後能辨是非如持權衡以較輕重孟子所謂知言是也揆之以道則是非了然不待精思而後見也學者當以道為本心不通於道而較古人之是非猶不持權衡而酌輕重竭其目力勞其心志雖使時中亦古人所謂億則屢中君子不貴也臨紙遽書不復思繹故言無次序多注改勿訝辭過煩矣理或未安却請示下足以代靣話釋讀此書而尤馳心空辭者非志士也答吕大臨書第十八先生曰中即道也若謂道出於中則道在中內別為一物矣所謂論其所同不容更有二名別而言之亦不可混為一事此語固無病若謂性與天道大本與達道可混而為一即未安在天曰命在人曰性循性曰道性也命也道也各有所當大本言其體達道言其用體用自殊安得不為二乎答楊時論西銘書第十九前所寄史論十篇其意甚正才一觀便為人借去俟更子細看西銘之論則未然橫渠立言誠有過者乃在正蒙西銘之為書推理以存義擴前聖所未發與孟子性善養氣之論同功二者亦前聖所未發豈墨氏之比哉西銘明理一而分殊墨氏則二本而無分老幼及人理一也愛無差等本二也分殊之蔽私勝而失仁無分之罪兼愛而無義分立而推理一以止私勝之流仁之方也無別而迷兼愛至於無父之極義之賊也子比而同之過矣若謂言體而不及用彼欲使人推而行之本為用也反謂不及不亦異乎釋據此則龜山似以體用為二尚在文字上泥乎答張閎中書第二十易傳未傳自量精力未衰尚覬有少進爾然亦不必直待身後覺耄則傳矣書雖未出學未嘗不傳也第患無受之者爾來書云易之義本起於數謂義起於數則非也有理而後有象有象而後有數易因象以明理由象而知數得其義則象數在其中矣必欲窮象之隱微盡數之毫忽乃尋流逐末術家之所尚非儒者之所務也管輅郭璞之徒是已釋易是人事在粗顯處求便易得葬説第二十一卜其宅兆卜其地之美惡也非隂陽家所謂禍福者也地之美者則其神靈安其子孫盛若培壅其根而枝葉茂理固然矣地之惡者則反是然則曷謂地之美者土色之光潤一作澤草木之茂盛乃其驗也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者惑以擇地之方位決日之吉凶不亦泥乎甚者不以奉先為計而專以利後為慮尤非孝子安厝之用心也惟五患者不得不慎須使異日不為道路不為城郭不為溝池不為貴勢所奪不為耕犂所及一本所謂五患者溝渠道名避村落遠井窑五患既慎則又鑿地必至四五丈遇石必更穿之防水潤也既葬則以松脂塗棺槨石灰封墓門此其大略也若夫精書則又在審思慮矣其火葬一作焚者出不得已後不可遷就同葬一作焚矣至於年祀寖遠曽高不辨亦在盡誠各具棺槨葬之不須假夢寐蓍龜而決也葬之穴尊者居中左昭右穆而次後則或東或西亦左右相對而啓穴也出母不合葬亦不合祭棄女還家以殤穴葬之釋此葬事之凖繩規矩祭禮第二十二凡祭灑掃廳事設几案於階下設盥盆帨手巾祭前一日視滌濯五更起安排如法具時果並菜三飣或五飣盞盤匙筯訖次設香卓次設盥盆茅縮更祭服焚香請曰孝孫某今以仲春之祭共請太祖某官高祖某官曽祖某官祖某官考某官降赴神位奠酒焚香跪執事者過酒左手把盤右手以酒澆酹於灌盆茅縮處俯伏再拜興左避位遂行獻執事者注酒下食二味或一味隨人家貧富頃之再拜亞獻如前三獻如前事畢焚香曰祭祀已畢揖執事徹饌祭祖妣亦如前式釋此禮近人情雖庶人可通行與方元寀手帖第二十三聖人之道坦如大路學者病不得其門耳得其門無遠之不可到也求入其門不由于經乎今之治經者亦衆矣然而買櫝還珠之弊人人皆是經所以載道也誦其言辭解其訓詁而不及道乃無用之糟粕耳覬足下由經以求道勉之又勉異日見卓爾有立於前然後不知手之舞足之蹈不加勉而不能自止矣按朱子跋此帖有二其一有應舉耕田之語又嘗得先生年二十五時帖惜皆不可見姑記朱説云釋只要人實學耳伊川論傳聞續記第二十四釋續紀數事亦自關切神宗欲用溫公召知許州令過闕上殿方下詔謂監察御史裏行程皓曰朕召司馬光卿度來否皓對曰陛下能用其言光必來不能用其言光必不來帝曰未論用其言如光者常在左右人主自可無過公果辭召命同上陳左司瓘曰范公淳夫嘗論顔子不遷怒不二過惟伯淳能之豫問公曰伯淳誰也公默然久之曰不知有程伯淳耶豫謝曰生長東南實未知也豫常以寡陋自愧了翁之子正由云了翁自是每得明道先生之文必冠帶然後讀之范太史遺事曹彬攻金陵垂克忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所愈惟須諸公共發誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香為誓明日稍愈及克金陵城中皆安堵如故曹翰克江州忿其久不下屠戮無遺彬之子孫貴盛至今不絶翰卒不三十年子孫有乞丐於海上者矣程頥云洓水記聞或問伊川量可學否曰可學進則識進識進則量進曰如魏公可學否曰魏公是間氣胡本傳家録伊川又同張子堅來方春時先君率同逰天門街看花伊川辭曰平生未嘗看花先君曰庸何傷乎物物皆有至理吾儕看花異於常人自可以觀造化之妙伊川曰如是則願從先生遊同上先君病且革伊川曰先生至此他人無以致力願先生自主張先君曰平生學道固如此矣然亦無可主張伊川猶且問難不已先君戲之曰正叔可謂生薑樹頭生必是生薑樹頭死也伊川曰從此與先生永訣矣更有可以見告者乎先君聲氣已微舉張兩手以示之伊川曰何謂也先君曰靣前路徑須常令寬路徑窄則自無著身處况能使人行也同上二程子抄釋卷九
