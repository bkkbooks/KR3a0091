body:
  text: 二程子抄釋卷二明呂柟編謝良佐記第三鳶飛戾天魚躍于淵言其上下察也此一叚子思喫緊爲人處與必有事焉而勿正心之意同活潑潑地會得時活潑潑地不㑹得時只是弄精神釋此意須是自已眼見切脉最可體仁鄭轂云常見顯道先生問此語云是某與明道切脉時坐間有此語釋仁意存乎脉中一斷即不生矣觀鷄雛此可觀仁釋相煦煦處也問鬼神有無曰待說與賢道没時古人却因甚如此道待說與賢道有時又却恐賢問某尋釋須自已親見處時信詩可以興某自再見茂叔後吟風弄月以歸有吾與㸃也之意釋聖賢於氣象間便見自舜發於􅅵畆之中至孫叔敖舉於海若要熟也須從這裏過釋雖生知者亦要躬歴以記誦博識爲玩物喪志時以經語録作一策鄭轂云嘗見顯道先生云某從洛中學時録古人善行别作一册洛中見之云是玩物䘮志盖言心中不宜容絲髮事只主一張子厚邵堯夫善自開大者也釋只是肯學耳周茂叔窓前草不除去問之云與自家意思一般子厚觀驢鳴亦謂如此皆釋善學者即物新張子厚聞生皇子喜甚見餓莩者食便不美釋仁義根於心者自别耳某冩字時甚敬非是要字好只此是學釋豈惟冩字時要敬乎口將言而囁嚅若合開口時要佗頭也須開口如荆軻於樊於期須是聽其言也厲釋引荆軻非與善人處壞了人須是與不善人處方成就得人佗山之石可以攻玉善下一有柔字是釋善下有柔字又言不哭底孩兒誰抱不得釋變異患難亦要經歴須是就事上學蠱振民育德然有所知後方能知此何必讀書然後爲學釋行處方見知不知一行豈所以名聖人至於聖則自不可見何嘗道聖人孝聖人亷釋聖道大不可名也泰山爲高矣然泰山頂上已不屬泰山雖堯舜之事亦只是太虛中一㸃浮雲孟子知言正如人在堂上方能辯堂下人曲直下去堂下則却辯不得釋要極高明學者要學得不錯須是學顔子釋學要眞切始得郉恕日三㸃檢亦可哀也何時不㸃檢明道語未釋模三省而誠切耳李覯謂若教管仲身長在宮内何妨更六人此語不然管仲時桓公之心特未蠧也若已蠧雖管仲可奈何未有心蠧尚能用管仲之理釋大人惟在格君心仁道難名惟公近之非以公便是爲仁釋公而有生意則仁語學者以所見未到之理不惟所聞不深徹乆將理低看了釋此不可語上之意莊生形容道體之語儘有好處老氏谷神不死一章最佳釋老莊亦見其大而無止禪家出世之說如閉目不見鼻然鼻自在釋鼻與日俱在方有聞見聖人不記事所以常記得今人忘事以其記事不能記事處事不精皆出於養之不完固釋養之在寡欲人之禀賦有無可奈何者聖人所以戒忿疾于頑釋此下愚不移之意未有不能體道而能無思者故坐忘即是坐馳有志之心乃無思也釋不思則忘許渤與其子隔一窻而寢乃不聞其子讀書與不讀書先生謂此人持敬如此釋太滯泥矣伯淳在澶州日修橋少一長梁曽博求之民間後因出入見林木之佳者必起計度之心因語以戒學者心不可有一事釋當有之事亦不害其爲有閱機事之乆機心必生葢方其閱時心必喜既喜則如種下種子釋只識破便好見一學者忙廹先生問其故曰欲了幾處人事曰某非不欲周旋人事者曷似賢急廹釋事有處自泰然忘物與累物之弊等釋只在主一疑病者未有事至時先有疑端在心周羅事者先有周事之端在心皆病也一隂一陽之謂道道非隂陽也所以一隂一陽道也如一闔一闢謂之變伊川語然釋道本自許渤初起問人天氣寒溫加减衣服定即終日不換釋亦須有節次子路亦百世之師人告之以有過則喜明道語日釋只此其心便可對青天白漢儒近似者三人董仲舒大毛公揚雄伊川語尤釋三人仲舒近似毛公次之雄何足道孔子曰天之將喪斯文也後死者不得與於斯文也天之未䘮斯文也匡人其如予何於天之將䘮斯文下便言後死者不得與於斯文則是文之興䘮在孔子與天爲一矣葢聖人德盛與天爲一出此等語自不覺耳孟子地位未能到此故曰天未欲平治天下也如欲平治天下當今之世舎我其誰聽天所命未能合一明道云釋模倣爲言者自與聖人言不同或問明道先生如何斯可謂之恕先生曰充擴得去則恕心如何是充擴得去底氣象曰天地變化草木蕃充擴不去時如何曰天地閉賢人隱釋此可以觀程子胸次矣敢問何謂浩然之氣孟子曰難言也明道先生云只他道箇難言也便知這漢肚裏有爾許大事若是不理㑹得底便撑拄胡說將去釋觀程子言亦可謂有浩然者横渠嘗言吾十五年學箇恭而安不成明道曰可知是學不成有多少病在釋熟後爲安纔學便是强也明道嘗曰吾學雖有所受天理二字却是自家體貼出來釋原在人欲上做工夫出來陜西曽有議欲罷鑄銅錢者以謂官中費一貫爲無利伊川曰此便是公家之利利多費省利鑄者衆費多利薄盗鑄者息權歸公上非利而何又曽有議解鹽鈔欲高其價者増六千爲八千伊川曰若増鈔價賣數須减鹽出既衆􅊠價易之人人食鹽鹽不停積歲入必敷已而増鈔價歲額果虧减之而歲入溢溫公初起時欲用伊川伊川曰帶累人去裏使韓富在時吾猶可以成事後來溫公欲變法伊川使人語之曰切未可動著役法動著即三五年不能得定疊去未幾變之果紛紛不能定釋觀此伊川不可謂不優於政韓富不可謂不長於道溫公作中庸解不曉處闕之或語明道明道曰闕甚處曰如强哉矯之類明道笑曰由自得裏將謂從天命之謂性處便闕却釋此程馬所見大小不同處明道先生善言詩他又渾不曽章解句釋但優游玩味吟哦上下便使人有得處瞻彼日月悠悠我思道之云遠曷云能來思之切矣終曰百爾君子不知德行不忮不求何用不臧歸於正也釋詩如此釋便得作者之意孟子曰養心莫善於寡欲此一句如何謝子曰吾昔亦曽問伊川先生曰此一句淺近不如理義之恱我心猶芻豢之恱我口最親切有滋味然雖是體察得理義之恱我心眞箇猶芻豢始得明道先生曰操則存舎則亡出入無時非聖人之言也心安得有出入乎釋出入即是存亡須求真恱便存問莊周與佛如何伊川曰周安得比他佛佛說直有高妙處莊周氣象大故淺近如人睡初覺時乍見上下東西指天說地怎消得恁地只是家常茶飯誇逞箇甚底釋佛高處近孔周精處近佛但周佛太矜則氣象已卑矣吾曽歴舉佛說與吾儒同處問伊川先生曰恁地同處雖多只是本領不是一齊差却釋差在公私之間耳謝子與伊川别一年徃見之伊川曰相别又一年做得甚工夫謝曰也只去箇矜字曰何故曰子細檢㸃得來病痛盡在這裏若按伏得這箇罪過方有向進處伊川㸃頭因語在坐同志者曰此人爲學切問近思者也釋矜非小失去此則何事不爲已何時不爲道謝子曰吾嘗習忘以養生明道曰施之養生則可於道則有害習忘可以養生者以其不留情也學道則異於是必有事焉而勿正何謂乎且出入起居寜無事者正心持之則先事而迎忘則渉乎去念助則近於留情故聖人心如鑑孟子所以異於釋氏此也釋此心之動聖狂攸分而况於儒釋乎苗履見伊川語及一武帥苗曰此人舊日宣力至多今官髙而自愛不肯向前伊川曰何自待之輕乎位愈高則當愈思所以報國者飢則爲用飽則揚去是以鷹犬自期也釋觀此可以勵忠臣矣二十年前徃見伊川一本作伯淳伊川曰近日事如何某對曰天下何思何慮伊川曰是則是有此理賢却發得大早在伊川直是㑹鍜錬得人說了又恰道恰好着工夫也釋謝子初言只是見到非行到也明道初見謝語人曰此秀才展拓得開將來可望釋展拓在逐事上諳練推廣昔伯淳教誨只管着他言語伯淳曰與賢說話却如扶醉漢救得一邊倒了一邊只怕人執着一邊釋學不先立乎其大終難救也明道先生坐如泥塑人接人則渾是一團和氣釋此便見動静交相爲用學者先學文鮮有能至道至如博觀泛覽亦自爲害故明道先生教余嘗曰賢讀書愼不要尋行數墨釋纔展卷見字便向躬行考求可也謝子見河南夫子辭而歸尹子送焉問曰何以教我謝子曰吾徒朝夕從先生見行則學聞言則識譬如有人服烏頭者方其服也顔色悅澤筋力强盛一旦烏頭力去將如之何尹子反以告夫子夫子曰可謂益友矣釋筋力要人自養不可將藥昔録五經語作一冊伯淳見謂曰玩物䘮志釋作一册爲稽行亦可明道見謝子記問甚博曰賢却記得許多謝子不覺身汗面赤先生曰只此便是惻隱之心惻然有隱於心隱釋以羞惡爲惻者發其本也伯淳謂正叔曰異日能尊師道是二哥若接引後學隨人才成就之則不敢讓釋此豈惟見明道自許亦以諷正叔耳伯淳嘗談詩並不下一字訓詁有時只轉却一兩字㸃平聲綴他念過便教人省悟又曰古人所以貴親炙之也釋轉却㸃綴諷詠處其誠意便入人骨邢七云一日三㸃檢伯淳曰可哀也哉其餘時多會甚事葢做三省之說錯了可見不曽用功又多逐人面上說一般話伯淳責之邢曰無可說伯淳曰無可說便不得說釋邢恕只不爲已便拒人言張横渠著正䝉時處處置筆硯得意即書伯淳云子厚却如此不熟釋熟後無釋言矣或舉伯淳語云人有四百四病皆不由自家則自心須教由自家釋心病不在外醫伊川與君實語無一句相合明道與語直是道得下釋此便見二兄弟之通泥堯夫易數甚精自來推長歴者至乆必差惟堯夫不然指一二近事當面可驗明道云待要傳與某兄弟某兄弟那得工夫要學須是二十年工夫明道聞說甚熟一曰因監試無事以其說推􅄸之皆合出謂堯夫曰堯夫之數只是加一倍法以此知太𤣥都不濟事堯夫驚撫其背曰大哥你恁聰明伊川謂堯夫知易數爲知天知易理爲知天堯夫云須還知易理爲知天因說今年雷起甚處伊川云堯夫怎知某便知又問甚處起伊川云起處起堯夫愕然他日伊川問明道曰加倍之數如何曰都忘之矣因歎其心無偏繫如此釋理在數先明道語云病卧於床委之庸醫比於不慈不孝事親者亦不可不知醫釋醫不可與卜筮同科范夷叟欲同二程去看劚地黄明道率先生先生以前軰爲辭明道云又何妨一般是人釋此可觀二先生之和介游酢録第四善治天下者不患法度之不立而患人材之不成善修身一作善言人材者不患器質之不美而患師學之不明人材不成雖有良法美意孰與行之師學不明雖有受道之質孰與成之釋人材者治世之具師學成身之本行之失莫甚於惡則亦改之而已矣事之失莫甚於亂則亦治之而已矣茍非自暴自棄者孰不可與爲君子釋惡亂且可改而况於過與危乎人有習佗經既而舎之習戴記問其故曰决科之利也先生曰汝之是心已不可入於堯舜之道矣夫子貢之高識曷嘗規規於貨利哉特於豐約之間不能無留情耳且貧富有命彼乃留情於其間多見其不信道也故聖人謂之不受命有志於道者要當去此心而後可語也一本云明道知扶溝縣事伊川侍行謝顯道將歸應舉伊川曰何不止試於大學顯道對曰蔡人甚習禮記决科之利也先生云云顯道乃止是歲登第注云尹子言其詳如此釋信此則不必論利害計窮達漢儒之中吾必以揚子爲賢然於出處之際不能無過也其言曰明􅈒煌煌旁燭無疆孫於不虞以保天命孫於不虞則有之旁燭無疆則未也光武之興使雄不死能免誅乎觀於朱泚之事可見矣古之所謂言遜者迫不得已如劇秦美新之類非得已者乎釋子雲之言其亦自大乎天下之習皆縁世變秦以棄儒術而亡不旋踵故漢興頗知尊顯經術而天下厭之故有東普之放曠釋此亦縁人情而興人有語導氣者問先生曰君亦有術乎曰吾嘗夏葛而冬裘飢食而渴飲節嗜欲定心氣如斯而已矣釋其爲導氣莫過焉世有以讀書爲文爲藝者曰爲文謂之藝猶之可也讀書謂之藝則求諸書者淺矣釋爲文恐亦不可謂之藝易曰修辭立其誠萬物本乎天人本乎祖故冬至祭天而祖配之以冬至者氣至之始故也萬物成形於地而人成形於父故以季秋者物成之時故也釋孝子享先與聖人享天同義世之信道篤而不惑異端者洛之堯夫秦之子厚而已釋邵張見出佛老之上故不惑或謂佛之理比孔子爲徑曰天下果有徑理則仲尼豈欲使學者迂遠而難至乎故外仲尼之道而由徑則是冐險阻犯荆棘而已侍講佛釋大路莫如孔氏誠邪徑也盟可用也要之則不可故孔子與蒲人盟而適衛者特行其本情耳葢與之盟與未嘗盟同故孔子適衛無疑使要盟而可用與賣國背君亦可要矣釋盟在我者要在外者故不可古者鄉田同井而民之出入相友故無爭鬬之獄今之郡邑之訟徃徃出於愚民以戾氣相搆善爲政者勿聽焉可也又時取强暴而好議侮者痛懲之則柔良者安闘訟可息矣昭逺本連上二叚安定之門人往徃知稽古愛民於爲政也何有釋此便是有仁心及有仁政者矣君子之遇事無巨細一於敬而已簡細故以自崇非敬也飾私智以爲竒非敬也要之無敢慢而已語曰居處㳟執事敬雖之夷狄不可棄也然則執事敬者固爲仁之端也推是心而成之則篤㳟而天下平矣釋心常存則事不茍馮道更相數主皆其讐也安定以爲五代之季生民不至於肝腦塗地者道有力焉雖事讐無傷也荀彧佐曹操誅伐而卒死於操君實以爲東漢之衰彧與攸視天下無足與安劉氏者惟操爲可依故俯首從之方是時未知操有他志也君子曰在道爲不忠在彧爲不智如以爲事固有輕重之權吾方以天下爲心未暇恤人議已也則枉己者未有能直人者也釋無馮道而後無五代之亂無荀彧而後無曹操之篡世之議子雲者多疑其投閤之事以法言觀之葢未必有天祿閤世傳以爲高百尺宜不可投然子雲之罪特不在此黽勉於莽賢之間畏死而不敢去是安得爲大丈夫哉釋子雲求知不求行爲身不爲道法言皆末也公山弗擾以費叛不以召畔人逆黨而召孔子則其志欲遷善悔過而未知其術耳使孔子而不欲徃是沮人爲善也何足以爲孔子釋不必回䕶孔子正欲止亂門人有曰吾與人居視其有過而不告則於心有所不安告之而不受則奈何曰與之處而不告其過非忠也要使誠意之交通在於未言之前則言出而人信矣釋誠在言前豈患不能告他人過也哉剛毅木訥質之近乎仁也力行學之近乎仁也若夫至仁則天地爲一身而天地之間品物萬形爲四肢百體夫人豈有視四肢百體而不愛者哉聖人仁之至也獨能體是心而已曷嘗支離多端而求之自外乎故能近取譬者仲尼所以示子貢以爲仁之方也醫書有以手足風頑謂之四體不仁爲疾痛不以累其心故也夫手足在我而疾痛不與知焉非不仁而何世之忍無恩者其自棄亦若是而已釋以四體疾病論仁與百姓甚切責善之道要使誠有餘而言不足則於人有益而在我者無辱矣釋說誠有餘何須待言仲尼第五不知爲何人録仲尼元氣也顔子春生也孟子幷秋殺盡見仲尼無所不包顔子示不違如愚之學於後世有自然之和氣不言而化者也孟子則露其才葢亦時然一作焉而已仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也觀其言皆可以見之矣仲尼無迹顔子微有迹釋孔顔孟只爭化大之間孔子言語句句是自然孟子言語句句是實事釋纔是實事亦自然但有迹耳論學便要明理論治便須一作要識體釋體者理之具也責上責下而中自恕己豈可任職分一本無任字職分兩字側注釋君子不怨尤人者此也孔子請討田恒當時得行便有舉義爲周之意釋孔子此舉當時天下賊臣聞之皆寒心矣雖公天下事若用私意爲之便是私釋私事若公亦是公不能動人只是誠不至於事厭倦皆是無誠處釋誠則不息可以透金石質鬼神孔子爲宰則爲宰爲陪臣則爲陪臣皆能發明大道孟子必得賔師之位然後能明其道猶之有許大形象然後爲泰山許多水然後爲海以此未及孔子乎釋亦誠有未至質夫第六不知何人録質夫沛然擇之茫然未知所得季明安釋三子所造不同惟善變通便是聖人釋初學不可習變通節嗜慾定心氣即是天氣下降地氣上騰便和無疾釋觀此便與天地同用看一部華嚴經不如看一艮卦經只言一止觀力釋艮不消人費人自孩提聖人之質已完只先於偏勝處發或仁或義或孝或弟處釋須於偏勝克治而學自㓜子常視無誑以上便是教以聖人事釋到聖人只是至誠怒驚皆是主心不定不遷怒怒釋果見性命驚免去氣偏處發便是致曲去性上修便是直養然同歸於誠此一章連人自孩提章下爲一章釋此克己復禮之義曽子疾病只爲以正不慮死武王殺一不辜行一不義得天下爲同心釋㑹此不論窮通止一道百官萬物金革百萬之衆飲水曲肱樂在其中萬變皆在人其實無一事釋只要心安理順卜筮在精誠疑則不應一本注云疑心㣲生便是不應楊子江依慿事是此理釋至誠如神懈意一生便是自棄自暴釋心亡也天下之說不可極惟朋友講習雖過無害兊澤有滋益處一本注云兊澤有自相滋益之意凝然不動便是聖人釋如此方能泛應曲當多驚多怒多憂只去一事所偏處自克克得一件其餘自正一作止之釋此致曲道人少長須激昻自進中年已後自至成德者事釋四五十無聞不足畏靜後見萬物自然皆有春意釋只是無欲八十四聲清者極吹盡清濁者盡吹極濁就其中以中聲上生下生以一作考損釋此便是三分益明善在明守善在誠釋其功一也管攝天下人心收宗族厚俗使人不忘本須是明譜系世族與立宗子法一本有一年功夫制釋此有古聖王之忿欲忍與不忍便見有德無德釋德欲不並行正叔一生不曽看莊列非禮勿動勿視出於天與從㓜小有如是才識釋聖賢自有性生者夷惠其道隘與不㳟乃心無罪無一作何也釋其心聖孔子所遇而安無所擇自子路觀孔子孔子爲不㳟自孔子觀吾軰吾軰便隘惟其與萬物同流便能與天地同流釋孔子大且化也去健羡毋意義之與比親於其身為不善直是不分入重主道也士大夫得有一作設重應當有主既埋重不可一日無主故設苴及其已作主即不用苴釋重古道也俗用紙牌葬後代用主技擊不足以當節制節制不足以當仁義使人人有子弟衛父兄之心則制挺以撻秦楚之兵矣釋勇在人心孔子之時事雖有不可爲孔子任道豈有不可爲魯君齊君孔孟豈不知其不足與有爲釋孔孟只是仁便肯任誠則自然無累不誠便有累釋凡有累者皆私也根本須是先培壅然後可立趨向也趨向既正一作立所造有淺深則由勉與不勉也正信釋根本是忠趨向是道中說有後人綴緝之者釋其中粹處近論語比擬者非也楊子之學實韓子之學華華則渉道淺釋楊亦非眞有實者子産語子太叔因其才而教之釋子産得學之用讀論語孟子而不知道所謂雖多亦奚以爲釋文辭是事則與求爲力行者大不同矣湯既勝夏欲遷其社不可聖人所欲不踰矩既欲遷社而又以爲不可欲遷是則不可爲非矣不可是則欲遷爲非矣然則聖人亦有過乎曰非也聖人無過夫亡國之社遷之禮也湯存之以爲後世戒故曰欲遷則不可也記曰喪國之社屋之不受天陽也又曰由亳社北牖使隂明也春秋書亳社災然則皆自湯之不遷始也釋聖人雖所欲不踰矩然斟酌度量亦所不免不然則堯之文思舜之問察皆何爲也學者皆謂聖人生知無待於學遂自畫自棄則亦不智之甚矣四兇之才皆可用堯之時聖人在上皆以其才任大位而不敢露其不善之心堯非不知其不善也伏則聖人亦不得而誅之及堯舉舜於匹夫之中而禪之位則是四人者始懷憤怨不平之心而顯其惡故舜得以因其迹而誅竄之也釋惡人雖可誅然必待其時而後行人無父母生日當倍悲痛更安忍置酒張樂以爲樂若具慶者可矣釋老亦可今人以影祭或畫工所傳一髭髪不當則所祭已是别人大不便釋正可立主方今有古之所無者二兵與釋老也釋古亦有兵但不似後世多言而不行是欺也君子欺乎哉不欺也釋行處便是言聖人於憂勞中其心則安靜安靜中却有至憂聖人之言遠如天賢者小如地釋天包乎地居是邦也不非其大夫此理最好釋不止要正已詩序必是同時一作國史所作然亦有後人添者如白華只是刺幽王其下更解不行綿蠻序不肯飲食教載之只見書中云飲之食之教之誨之命彼後車謂之載之便云教載絶不成言語也又如高子曰靈星之尸也分明是高子言更何疑釋自有詩便有序一時並行耳中庸首先言本人之情性次言學次便言三王酌損成王道餘外更無意三王下到今更無聖人若有時須當作四王王者制作時用先代之宜世者今也法當用周禮自漢已來用釋道法兼三王而後偹耳色難行下面有事服勞而言服勞更淺若謂諭父母於道能養志使父母說却與此辭不相合然推其極時養志如曽子大舜可也曽元是曽子之子尚不能釋色難即䕫䕫齊慄之意今之學者岐而爲三能文者謂之文士談經者泥爲講師惟知道者乃儒學也釋知道者深夫内之得有淺深外之來有輕重内重則可以勝外之輕得深則可以見誘之小獵自謂第七不知何人録獵自謂今無此好周茂叔曰何言之易也但此心潜隱未發一日萌動復如前矣後十二年因見果知未一本注云明道年十六七時好田獵十二年暮歸在田野間見田獵者不覺有喜心釋根心之病難除周公不作膳夫庖人匠事只㑹兼衆有司之所能釋此不可小知而可大受之意禪學只到止處無用處無禮義釋寂而無感静而不動堯舜知他幾千年其心至今在釋心與天同心要在腔子裏釋在腔子裏而千里其思猶未在也堯夫道雖偏駁然卷舒作用極熟又一作可能謹細行釋堯夫近人情虛而不屈動而愈出釋有體則有用只外面有些隙罅便走了釋心宻者身安只學顔子不貳過釋此是眞正學問但患人不勇頻復至迷後耳邵堯夫猶空中樓閣釋亦是無欲兵法遠交近攻須是審行此道知崇禮卑之意只是論得規矩凖繩巧則在人釋黙識難莊子有大底意思無禮無本釋狂矣人當審已如何不必恤浮議志在浮議則心不在内不可私一本無私字别有應卒應事四字釋若聞過則可靜坐獨處不難居應天下爲難釋亦須於靜坐獨處中得兵須不失家計游兵夾持孔子弟子少有㑹問者只顔子能問又却終日如愚釋善問亦難亦必有所見洒掃應對與佛黙然處合釋此恐與佛小異玩心神明上下同流不學便老而衰釋心死故也雍置師内郡養耕外郡禦守釋雍地自古近邉兵能聚散爲上釋此竒正法韓信多多益辦只是分數明釋有綂領法兵陣須先立家計然後以遊騎旋旋量力分外面與敵人合此便是合内外之道若游騎大遠則却歸不得至如聽金皷聲亦不忘却自家如何如苻堅養民一敗便不可支持無本故也釋岳家軍如撼山爲有本坐井觀天非天小只被自家入井中被井筒拘束了然井何罪亦何可廢但出井中便見天如此大不爲井所拘却入井中也不害釋若能㑹見天雖在井中亦可晋書謂吾家書籍當盡與之豈止與之當再拜而獻之病昏不爲他物所奪只有正氣然猶有力知識遠過於人况吾合天地之道安有不可釋正自勝邪蘇昞録第八子厚謂程卿夙興幹事良由人氣清則勤閑不得正叔謂不可若此則是爲氣所使子厚謂此則自然也伯淳言難然且欲凡事皆不恤以恬養則好子厚謂此則在學者也釋學可勝氣伯淳謂天下之士亦有其志在朝廷而才不足才可以爲而誠不足今日正須才與至誠合一方有濟子厚謂才與誠須二物只是一物伯淳言才而不誠猶不足也若非至誠雖有忠義功業亦出於事爲浮氣幾何時而不盡也一本無只是一物四字釋誠者才之本伯淳道君實之語自謂如人參甘草病未甚時可用也病甚則非所能及觀其自處必是有救人之術釋王道養民在先而教即次之非若伯術之急効於一時正叔謂某接人治經論道者亦甚多肯言及治體者誠未有如子厚釋子厚能誠能禮二程謂地形不必謂寛平可以畫方只可用筭法折計地畆授民子厚謂必先經界經界不正則法終不定地有坳垤處不管只觀四摽竿中間地雖不平饒與民無害就一夫之間所爭亦不多又側峻處田亦不甚美又經界必須正南北假使地形有寛狹尖斜經界則不避山河之曲其田則就得井處爲井不能就成處或五七或三四或一夫其實田數則在又或就不成一夫處亦可計百畆之數而授之無不可行者如此則經界隨山隨河皆不害於畫之也茍如此畫定雖便使暴君汙吏亦數百年壞不得經界之壞亦非專在秦時其來亦遠漸有壞矣正叔云至如魯二吾猶不足如何得至十一也子厚言百畆而徹言徹取之徹則無義是透徹之徹透徹而耕則功力均且相驅率無一家得惰者及已收穫則計畆數衮分之以衮分之數取十一之數亦可或謂井議不可輕示人恐致笑及有議論子厚謂有笑有議論則方有益也若有人聞說取之以爲已功先生云如有能者則已願受一㕓而爲氓亦幸也伯淳言井今取民使貧富均則願者衆不願者寡正叔言亦未可言民情怨怒止論可不可爾須使上下都無此怨怒方可行正叔言議法既大備在所以行之之道子厚言豈敢某止欲成書庶有取之者正叔言不得行於當時行於後世一也子厚曰徒善不足以爲政徒法不能以自行須是有行之之道又雖有仁心仁聞而政不行者不由先王之道也須是先王正叔言孟子於此善爲言只極目力焉能盡方圓平直須是要規矩釋法待人而舉法不善皆因仍茍簡以適於亂井田法雖百世可行故張子注意焉正叔說堯夫對上之詞言陛下富國强兵後待做甚以爲非此言安足諭人主如周禮豈不是富國之術存焉子厚言堯夫抑上富强之說正猶爲漢武帝言神仙之學長年不足惜言豈可入聖賢之曉人不如此之拙如梁惠王問何以利國則說利不可言之理極言之以至不奪不饜釋行仁存乎智正叔言人志於王道是天下之公議反以爲私說何也子厚言只爲心不大心大則做得大正叔言只是做一喜好之事爲之不知只事合做釋此亦動轉人心法伯淳言邵堯夫病革且言試與觀化一遭子厚言觀化他人便觀得自家又如何觀得化嘗觀堯夫詩意纔做得識道理却於儒術未見所得釋觀化亦堯夫極言正叔言今責罪官吏殊無養士君子亷恥之道必斷言徒流杖數贖之以銅便非養士君子之意如古人責其罪皆不深指斥其惡如責不亷則曰爼豆不修釋待士厚者待民必不薄正叔言禮院者天下之事無不聞此但得其人則儘可以考古立法茍非其人只是從俗而已釋禮院正兵馬刑罰皆可省正叔言昏禮結髮無義欲去乆矣不能言結髮爲夫婦者只是指其少小也如言結髮事君李廣言結髮事匈奴只言初上頭也豈謂合髻子子厚云絶非禮義便當去古人凡禮講修已定家家行之皆得如此今無定制毎家各定此所謂家殊俗也至如朝廷之禮皆不中節釋禮有誤傳可體經正之正叔論安南事當初邊上不便令逐近㸃集應急救援其時雖將帥革兵冐渉炎瘴朝廷以赤子爲憂亦有所不恤也其時不救應放令縱恣戰殺至數萬今既後時又不候至秋涼迄冬一直趨宼亦可以前食嶺北食積於嶺南般運今乃正於七月過嶺以瘴死者自數分及過境又粮不繼深至賊巢以栰渡五百人過江且焚破其竹寨幾重不能得復棹其空栰續以救兵反爲賊兵㑹合禽殺吾衆無救或死或逃遂不成功所爭者二十五里耳欲往又無舟可渡無粮以戌此謬筭未有也猶得賊辭差順遂得有詞且承了若使其言猶未順如何處之運粮者死八萬戰兵瘴死十一萬餘得二萬八千人生還尚多病者又先爲賊戮萬數都不下三十萬口其昏謬無謀如此甚也釋不仁則不智正叔言郭逵新貴時衆論喧然未知其人如何後聞人言欲買韓王宅更不問可知也如韓王者當代功臣一宅已敗而欲有之大煞不識好惡子厚言昔年有人欲爲范希文買綠野堂希文不肯識道理自不然在唐如晋公者是可尊也一旦取其物而有之如何得安在他人猶可如王維莊之類獨有晋公則不可寧使耕壞其他有力者致之已則不可取釋甘棠且勿剪而况宅乎正叔言管轄人亦須有法徒嚴不濟事今帥千人能使千人依時及節得飯喫亦能有幾人嘗謂軍中夜驚亞夫堅卧不起不起善矣然猶夜驚何也亦是未盡善釋其要止在用人正叔謂今唱名何不使伊儒冠徐歩進見何用二人把見趨走得不使殿上大臣有愧色子厚言只先出榜使之見其先後何用旋開卷呼名正叔言某見居位者百事不理㑹只恁箇大肚皮於子厚却願奈煩處之釋此理㑹難子厚言關中學者用禮漸成俗正叔言自是關中人剛勁敢爲子厚言亦是自家規矩太寛釋在人鼔舞伯淳謂才與誠一物則周天下之治子厚因謂此何事於仁必也聖乎釋才者誠之用呂進伯老而好學理㑹直是到底正叔謂老喜學者尤可愛人少壯則自當勉至於老矣志力須倦又慮學之不能及又年數之不多不曰朝聞道夕死可矣乎學不多年數之不足不猶愈於終不聞乎釋士有此志便死不肯罷子厚言十詩之作止是欲騐天心於語黙間耳正叔謂若有他言語又烏得已也子厚言十篇次序固自有先後釋詩言之粹者其次序今不可考二程解窮理盡性以至於命只窮理便是至於命子厚謂亦是失於大快此義儘有次序須是窮理便能盡得已之性則推類又盡人之性既盡得人之性須是幷萬物之性一齊盡得如此然後至於道也其間煞有事豈有當下理㑹了學者須是窮理爲先如此則方有學今言知命與至於命儘有近遠豈可以知便謂之至也釋程張看窮字至字不同正叔謂洛俗恐難化於秦人子厚謂秦俗之化亦先自和叔有力焉亦是士人敦厚東方亦恐難有向風釋地固皆同振俗或異子厚謂昔嘗謂伯淳優於正叔今見之果然其救世之志甚誠切亦於今日天下之事儘記得熟釋如此論二程優劣亦見子厚所至子厚言今日之徃來俱無益不如閒居與學者講論資養後生却成得事正叔言何必然義當來則來當徃則徃爾釋正叔直造二程子抄釋卷二
