body:
  text: 二程子抄釋卷六明吕柟編唐棣編第十五伊川語棣初見先生問初學如何曰入德之門無如大學今之學者賴有此一篇書存其他莫如論孟釋讀大學知格物其下七者皆不難矣先生曰古人有聲音以養其耳采色以養其目舞蹈以養其血脉威儀以養其四體今之人只有理義養心又不知求釋如知義理養心則耳目四體亦可兼先生語子良曰納拜之禮不可容易非己所尊敬有德義服人者不可余平生只拜二人其一吕申公其一張景觀奉議也昔有數人同坐說一人短其間有二人不說問其故其一曰某曽拜他其一曰某曽受他拜王拱辰君貺初見周茂叔為與茂叔世契便受拜及坐上風起說大畜卦一作說風天小畜卦君貺乃起曰某適來不知受却公拜今某却當納拜茂叔走避君貺此一事亦過人謝用休問當受拜不當受拜曰分已定不受乃是謝天申字用休溫州人重釋古人一拜如此安肯諂佞伯溫問學者如何可以有所得曰但將聖人言語玩味久則自有所得當深求於論語將諸弟子問處便作己問將聖人答處便作今日耳聞自然有得孔孟復生不過以此教人耳若能於論孟中深求玩味將來涵養成甚生氣質釋讀書不在貪多又問顔子如何學孔子到此深邃曰顔子所以大過人者只是得一善則拳拳服膺與能屢空耳棣問去驕吝可以為屢空曰然驕吝最是不善之總名驕只為有己吝如不能改過亦是吝釋求得顔子不改其樂處則驕吝自化棣問㸔春秋如何㸔先生曰某年二十時㸔春秋黃贅隅問某如何㸔答曰以傳考經之事迹以經别傳之真偽釋非傳無以考經非經無以辨傳先生將傷寒藥與兵士因曰在墓墳所與莊上常合藥與人有時自笑以此濟人何其狹也然只做得這箇事釋此擊磬之心也思叔告先生曰前見教授夏侯旄甚歎服曰前日來相見問後極說與他既問却不問他好惡須與盡說與之學之久染習深不是盡說力抵介甫無緣得他覺悟亦曽說介甫不知事君道理觀他意思只是要樂子之無知如上表言秋水既至因知海若之無窮大明既升豈有爝火之不熄皆是意常要己在人主上自古主聖臣賢乃常理何至如此又觀其說魯用天子禮樂云周公有人所不能為之功故得用人臣所不得之禮樂此乃大叚不知事君大凡人臣身上豈有過分之事凡有所為皆是臣職所當為之事也介甫平居事親最孝觀其言如此其事親之際想亦洋洋自得以為孝有餘也臣子身上皆無過分事惟是孟子知之其說曽子只言事親若曽子可矣不言有餘只言可矣唐子方作一事後無聞焉亦自以為報君足矣當時所為葢不誠意嘉仲曰陳瓘亦可謂難得矣先生曰陳瓘却未見其已夏侯旄字節文孫釋此說足盡臣子之道故碩膚之歴山之泣其心皆可想也又問伯夷叔齊逃是否曰讓不立則可何必逃父邪叔齊承父命尤不可逃也又問中子之立是否曰安得是只合招叔一作夷齊歸立則善伯溫曰孔子稱之曰仁何也曰如讓國亦是清節故稱之曰仁如與季札是也札讓不立又不為立賢而去卒有殺僚之亂故聖人於其來聘書曰呉子使札來聘去其公子言其不得公子也釋春秋書札進呉人也呉夷而其使得錄名耳札事亦近叔齊用休問溫故而知新如何可以為師曰不然只此一事可師如此等處學者極要理㑹得若只指認溫故知新便可為人師則窄狹却氣象也凡㸔文字非只是要理㑹語言要識得氣象如孔子曰盍各言爾志而由曰願車馬衣輕裘與朋友共敝之而無憾顔子曰願無伐善無施勞孔子曰老者安之朋友信之少者懐之觀此數句便見聖賢氣象大叚不同若讀此不得見聖賢氣象他處也難見學者須要理㑹得聖賢氣象釋須高明㸔聖賢氣象出在講筵時曽說與溫公云范純夫在筵中尤好溫公彼時一言亦失却道他見修史自有門路某應之曰不問有無門路但筵中須得他溫公問何故某曰自度少温潤之氣純夫色溫而氣和尤可以開陳是非道人主之意後遂除侍講釋如此擇講官便有大效用休問井田今可行否曰豈有古可行而今不可行者或謂今人多地少不然譬諸草木山上著得許多天地生物常相稱豈有人多地少之理釋漢限田唐口分世業法亦古意嘉仲問封建可行否曰封建之法本出於不得已桞子厚有論亦窺測得分數秦法固不善亦有不可變者罷侯置守是也釋法緣人情及世變而立但當仿古則無弊陳貴一問人之壽數可以力移否曰葢有之棣問如今人有養形者是否曰然但甚難世間有三件事至難可以奪造化之力為國而至於祈天永命養形而至於長生學而至於聖人此三事功夫一般分明人力可以勝造化自是人不為耳故闗朗有周能過厯秦止二世之說誠有此理釋此三事人間之至大者其他可知矣問喪止於三年何義曰嵗一周則天道一變人心亦隨以變惟人子孝於親至此猶未忘故必至於再變猶未忘又繼之以一時釋古者繼之以一月却太近耳富公嘗語先生曰先生最天下閑人曰某做不得閑人相公將誰作天下最忙人曰先生試為我言之曰禪伯是也曰禪伯行住坐卧無不在道何謂忙曰相公所言乃忙也今市井賈販人至夜亦息若禪伯之心何時休息釋禪伯閑中忙先生嘗與一官員一僧同㑹一官員說條貫既退先生問僧曰曉之否邪僧曰吾釋子不知條貫曰賢將竟一作作三界外事邪天下豈有二理釋此乃覺悟僧也公山弗擾佛肸召子欲往者聖人以天下無不可與有為之人亦無不可改過之人故往然終不往者知其必不能故也子路遂引親於其身為不善為問孔子以堅白匏瓜為對繫而不食者匏𤓰繫而不為用之物不食不用之義也匏𤓰亦不食之物故因此取義也釋此豈匏𤓰義最可觀范公甫將赴河清尉問到官三日例須謁廟如何曰正者謁之如社稷及先聖是也其他古先賢哲亦當謁之又問城隍當謁否城隍不典土地之神社稷而已何得更有土地邪又問只恐駭衆爾曰唐狄仁傑廢江浙間淫祠千七百處所存惟呉太伯伍子胥二廟爾今人做不得以謂時不同是誠不然只是無狄仁傑耳當時子胥廟存之亦無謂釋社稷為土地之神統言之也城隍據城池而言古人祭門行而况此乎凡㸔文字先須曉其文義然後可求其意未有文義不曉而見意者也學者㸔一部論語見聖人所以與弟子許多議論而無所得是不易得也讀書雖多亦奚以為釋意隨文曉解周伯溫見先生先生曰從來覺有所得否學者要自得六經浩𦕈乍來難盡曉且見得路逕後各自立得一箇門庭歸而求之可矣伯溫問如何可以自得曰思思曰􅌖􅌖作聖須是於思慮間得之大抵只是一箇明理棣問學者見得這道理後篤信力行時亦有見否曰見亦不一果有所見後和信也不要矣又問莫是既見道理皆是當然否曰然凡理之所在東便是東西便是西何待信凡言信只是為彼不信故見此是信爾孟子於四端不言信亦可見矣釋信有二義未得之先者須信也既得之後者能信也先生指庭下羣雀示諸弟子曰地上原有物則羣雀集而食之人故與之則不即來食須是久乃集盖人有意在爾若負粟者適遺下則便集而食矣釋萬物皆有覺故務徳行者在不言而信問孀婦於理似不可取如何曰然凡取以配身也若取失節者以配身是已失節也又問或有孤孀貧窮無託者可再嫁否曰只是後世怕寒餓死故有是說然餓死事極小失節事極大釋若守節便未必死守節而死不死矣宣仁山陵時㑹吕汲公於陵下公曰國家養兵乃良策凡四方有警百姓皆不知先生曰相公豈不見景徳中事邪驅良民刺靣以至及士人葢有限之兵忽損三五千人將何自而補要知兵須是出於民可也釋雖武王歸馬放牛亦太早故武庚叛霍光廢昌邑其始乃光之罪當時不合立之只彼見是武帝孫擔當不過須立之也此又與伊尹立太甲不同也伊尹知太甲必能思庸故放之桐三年當時湯既崩太丁未立而死外丙方二嵗仲壬方四嵗故須立太甲也太甲又有思庸之資若無是質伊尹亦不立也史記以孟子二年四年之言遂言湯崩六年之後太甲方立不知年只是嵗字頃吕望之曽問及此亦曽說與他後來又㸔禮見正廵狩問百年者益知書傳亦稱嵗為年二年之說縱別無可證理亦必然且㸔尚書分明說成湯既没太甲元年又㸔王徂桐宫居憂三年終能思庸伊尹以冕服奉嗣王可知凡文字理是後不必引證釋年作嵗是學者不可不通世務天下事譬如一家非我爲則彼為非甲為則乙為釋此在已鮑若雨錄第十六伊川語今語小人曰不違道則曰不違道然卒違道語君子曰不違道則曰不違道終不肯違道譬如牲牢之味君子曽嘗之說與君子須増愛說與小人小人非不道好只是無増愛心其實只是未知味守死善道人非不知終不肯為者只是知之淺信之未篤釋篤信者好學志不可不篤亦不可助長志不篤則忘廢助長於文義上也但有益若於道理上助長反不得杜預云優而柔之使自求之厭而飫之使自趨之若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也此數句煞好釋要在不言而行問孔子對冉求曰其事也非政政與事何異曰閔子騫不肯為大夫曾晳不肯為陪臣皆知得此道理若子路冉求未能知此夫政出於國君冉求為季氏家臣只是家事安得為政當時季氏專政孔子因以明之或問季路冉求稍聞聖人之道何不知此曰當時陪臣執國命目見耳聞習熟為常都不知有君此言不足怪季氏問季路冉求可謂大臣與孔子曰所謂大臣者以道事君不可則止今由與求也可謂具臣矣然則從之者與曰弑父與君亦不從也除却弑父與君皆為之釋當時由求亦大難先生前日教某思君子和而不同某思之數日便覺胷次廣闊其意味有不可以言述竊有一喻願畱嚴聽今有人焉久寓遠方一日歸故鄉至中途適遇族兄者俱抵旅舍異居而食相視如途人彼豈知為族弟此亦豈知為族兄邪或告曰彼之子公之族兄某人也彼之子公之族弟某人也既而懽然相從無有二心向之心與今之心豈或異哉知與不知而已今學者茍知大本則視天下猶一家亦自然之理也先生曰此乃善喻也釋性本同善要人指㸃便親切鄒柄本第十七伊川語詩大序孔子所為其文似繫辭其義非子夏所能言也小序國史所為非後世所能知也釋此序屢言之可知其難改也孔明有王佐之心道則未盡王者如天地之無私心焉行一不義而得天下不為孔明必求其成而取劉璋聖人寧無成耳此不可為也若劉表子琮將為曹公所并取而興劉氏可也釋當時劉璋亦有道義可處處而不從取之可也孔明營五丈原宣王言無能為此偽言安一軍耳兵自高地來可勝宣王嘗自觀五丈原非非一作曰言此地不可據英雄欺人不可盡信釋兵家言多視不勝猶勝荀爽從董卓辟遜迹避禍君子亦有之然聖人明哲保身亦不至轉身不得處如楊子投閤失之也荀爽自度其材能興漢室乎起而圖之可也知不是而强圖之非也釋爽豈天民西漢儒者有風度惟董仲舒毛萇揚雄萇解經未必皆當然味其言大槩然矣釋毛詩多依大小序故得多東漢趙苞為邉郡守虜奪其母招以城降苞遽戰而殺其母非也以君城降而求生其母固不可然亦當求生其母之方奈何遽戰乎不得已身降之可也王陵母在楚而使漢楚質以招陵陵降可也徐庶得之矣釋庶見㡬於其先故難及先生云吾四十歲以前誦讀五十以前研究其義六十以前反覆紬繹六十以後著書釋此却與志學次第異矣人思如湧泉浚之愈新釋心體無窮也先生在經筵時上服藥即日就醫官問動止天子方幼建言選宫人四十以上者侍左右所以遠紛華養心性釋經筵不止口說容觀必如正叔志可韓文不可漫觀晩年所見尤高釋心在於文久亦精深雜念去也四端不言信者既有誠心為四端則信在其中矣釋四端以信而行聖人無優劣有則非聖人也釋孔子伊惠亦有不同楊大隠本第十八伊川語君子之學在於意必固我既亡之後而復於喜怒哀樂未發之前則學之至也釋此言不極太速乎有學不至而言至者循其言亦可以入道荀子曰真積力久則入杜預曰優而柔之使自求之厭而飫之使自趨之管子曰思之思之又重思之思之而不通鬼神將通之非鬼神之力也精神之極也此三者循其言皆可以入道而荀子管子杜預初不能及此釋三子各就其所見處通也聞見之知非徳性之知物交物則知之非内也今之所謂博物多能者是也德性之知不假見聞釋徳性之知亦或假見聞但不恃焉耳能盡飲食言語之道則可以盡去就之道能盡去就之道則可以盡死生之道飲食言語去就死生小大之勢一也故君子之學自微而顯自小而彰易曰閑邪存其誠閑邪則誠自存而閑其邪者乃在於言語飲食進退與人交接之際而已矣釋下學即上達洒掃應對便是窮神知化多權者害誠好功者害義取名者賊心釋權與功名皆在外者故有害君貴明不貴察臣貴正不貴權釋君臣各有體孔子曰棖也慾焉得剛甚矣慾之害人也人之為不善欲誘之也誘之而弗知則至於天理滅而不知反故目則欲色耳則欲聲以至鼻則欲香口則欲味體則欲安此皆有以使之也然則何以窒欲曰思而已矣學莫貴於思唯思為能窒欲曽子之省窒欲之道也釋學問根源只在窒欲學也者使人求於内也不求於内而求於外非聖人之學也何謂不求於内而求於外以文為主者是也學也者使人求於本也不求於本而求於末非聖人之學也何謂不求於本而求於末考詳畧採同異者是也是二者皆無益於身君子弗學釋内本之學其有所見者乎墨子之徳至矣而君子弗學也以其舍正道而之他也相如太史遷之才至矣而君子弗貴也以所謂學者非學也釋君子之學貴貞而徳君子不欲才過徳不欲名過實不欲文過質才過徳者不祥名過實者有殃文過質者莫之與長釋實勝善也或問顔子在陋巷而不改其樂與貧賤而在陋巷者何以異乎曰貧賤而在陋巷者處富貴則失乎本心顔子在陋巷猶是處富貴猶是釋顔子惟一耳學不貴博貴於正而已矣言不貴多貴於當而已矣政不貴詳貴於順而已矣釋窮理為難意必固我既亡之後必有事焉此學者所宜盡心也夜氣之所存良知也良能也茍擴而充之化旦晝之所害為夜氣之所存然後可以至於聖人釋清明在躬即有事學者當以論語孟子為本論語孟子既知則六經可不治而明矣讀書者當觀聖人所以作經之意與聖人所以用心與聖人所以至聖人而吾之所以未至者所以未得者句句而求之誦而味之中夜而思之平其心易其氣闕其疑則聖人之意見矣釋如此求索則聖人在目前矣人之生也小則好馳騁弋獵犬則好建立功名此皆血氣之盛使之然故耳其衰也則有不足之色其病也則有可憐之言夫人之性至大矣而為形氣之所役使而不自知哀哉釋役使亦係習吾未見嗇於財而能為善者也吾未見不誠而能為善者也釋善不過義與實耳有求為聖人之志然後可與共學學而善思然後可與適道思而有所得則可與立立而化之則可與權釋漸進則漸妙無好學之志則雖有聖人復出亦無益矣然聖人在上而民多善者以涵泳其教化深且遠也習聞之久也釋中人被化則多從耳學者必求其師記問文章不足以為人師以所學者外也故求師不可不慎所謂師者何也曰理也義也釋得師不信亦難徳盛者言傳文盛者言亦傳釋傳一也但不同耳名數之學君子學之而不以為本也言語有序君子知之而不以為始也釋外者非内也後者非先也學以知為本取友次之行次之言次之釋此中庸思知人知天之序信不足以盡誠猶愛不足以盡仁釋仁誠至矣古之學者為己其終至於成物今之學者為人其終至於喪己釋此大小之效也自夸者近刑自喜者不進自大者去道遠釋未之思耳使人有道不疑而已使夫人有心害我邪雖疑不足以化其心使夫人無心害我邪疑則己德内損人怨外生故不疑則兩得之矣疑則兩失之矣而未有多疑能為君子者也釋疑人者疑己也二程子抄釋卷六
