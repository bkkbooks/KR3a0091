body:
  text: 二程子抄釋卷七明吕柟編朱光庭錄第十九性靜者可以爲學釋性動者習靜亦可學學在知其所有又養其所有淳必釋能知者能飬得意則可以忘言然無言又不見其意正為釋此有而發心得之然後可以爲己物淳須釋心得自驗黙而識之吾不得而見之矣得見善問者斯可矣釋黙識亦深程子看大淺學始於不欺闇室釋過此坦然行矣學者多蔽於解釋注疏不須用功深釋始學亦難免解釋既喻矣即當超然也大率把捉不定皆是不仁釋不定亦係未勇神也者妙萬物而爲言若上竿弄瓶至於斵輪誠至則不可得而知上竿初習數尺而後至於百尺習化其高矧聖人誠至之事豈可得而知淳自釋習熟化士大夫必建家廟廟必東向其位取地潔不喧處設席坐位皆如事生以太祖靣東左昭右穆而已男女異位蓋姑婦生無共坐也姑婦之位亦同太祖之設其主皆刻木牌取生前行第或衘位而已婦各從夫每月告朔茶酒四時春以寒食夏以端午秋以重陽冬以長至此時祭也每祭訖則藏主於北壁夾室拜墳則十月一日拜之感霜露也寒食則又從常禮祭之飲食則稱家有無祭器坐席皆不可雜用廟門非祭則嚴扃之童孩奴妾皆不可使䙝而近也釋此禮甚近人情與卜吉冬至祭始祖等說又異凡說婚姻男女多言東東取生育之意人君多言南凶喪多言北又有各就其國所有而言者如周詩多言南釋音出隂陽自然之義彼之事是則吾當師之彼之事非是則吾又何校焉是以君子未嘗校也伯淳可釋是非皆不尤人知性善以忠信爲本此先立其大者伯淳信釋惟此忠為難荀子曰養心莫善於誠周茂叔謂荀子元不識誠伯淳曰既誠矣心焉用養故荀子不知誠釋誠有二用荀言亦可取故大學言誠意中庸言誠身陳淵拾遺第二十孔子生而知之者自十五以下事皆學而知之者所以教人也三十有所立四十能不惑五十知天命而未至命六十聞一以知百耳順心通也凡人聞一言則滯於一言一事則滯於一事不能貫通耳順者聞言則喻無所不通七十從心然後至於命釋孔子實如此用功來非但爲教人也孔子之見南子禮當見之也南子之欲見孔子亦其善心也聖人豈得而拒之子路不悅故夫子陳之曰予所否者天厭之言使我至此者天命也釋矢作陳解是李叅錄第二十一漢之儒者所以從學者數百人非惟風俗亦皆篤行君子也晉人高尚不足道矣釋惟篤實能格人心質夫曰盡心知性佛亦有至此者存心養性佛本不至此先生曰盡心知性不假存養其惟聖人乎釋佛之盡心知性與吾儒異耳馮理拾遺第二十二春秋書灾異葢非偶然不云霜隕而云隕霜不云夷伯之廟震而云震夷伯之廟分明是有意於人也天人之理自有相合人事勝則天不爲灾人事不勝則天爲灾人事常隨天理天變非應人事如祁寒暑雨天之常理然人氣壯則不爲疾氣羸弱則必有疾非天固欲爲害人事德不勝也如漢儒之學皆牽合附㑹不可信釋漢儒亦有大義在但指應太過致人不信今時人看易皆不識得易是何物只就上穿鑿若念得不熟與就上添一德亦不覺多就上减一德亦不覺少譬如不識此兀子若减一隻脚亦不知是少添一隻脚亦不知是多若識則自添減不得也釋後儒於易上或作𤣥或添卦者則於易之義恐未得也月令儘是一部好書未易破他桞子厚破得他不是若春行賞秋行刑只是舉大綱如此如云湯執中文王視民如傷武王不泄邇不忘遠不成聖人各只有一事可稱也且據一處言之耳又如冬日則飲湯夏日則飲水不成冬日不得飲水夏日不得飲湯也釋看月令如看易卦隨事立文耳儒者只合言人事不合言有數直到不得已處然後歸之於命可也釋人事盡處命可立羅從彦拾遺第二十三論語曾子有子弟子論譔所以知者唯曾子有子不名伊川釋恐論語亦曽有二子所記而其門人筆之耳灌以降神禘之始也既灌而往者自始以至終皆無足觀言魯祭之非禮也不知者葢爲魯諱如自此事而正之其於天下如指掌之易伊川明釋此解實胡安國家本第二十四明道曰維天之命於穆不已不其忠乎天地變化草木蕃不其恕乎釋欲學者照如此學忠恕匹夫悍卒見難而能死者有之矣惟情慾之牽妻孥之愛斷而不惑者鮮矣釋窒欲甚難耳思慮不得至於苦釋苦則不能自得人之多聞識却似藥物須要博識是所切用也釋有切用處雖博識何寄然須種種辯別得聲色臭味方可爲天下安可求近効才計較著利害便不是釋除是有仁智心者方能為程子與侯仲良語及牛李事因言溫公在朝欲盡去元豐間人程子曰作新人才難變化人才易今諸人之才皆可用且人豈肯甘爲小人在君相變化如何耳若宰相用之爲君子孰不爲君子此等事教他們自做未必不勝如吾曹仲良曰若然則無紹聖間事也尹子親注云此段可疑移釋此必有機括轉恐未可疑也伊川在經筵已聞上盥潄噴水避蟻他日先生進曰願陛下推此心以及天下釋此與孟子意同程子葬父使周恭叔主客客欲酒恭叔以告先生曰勿陷人於惡釋此須有作用感化者可風竹便是感應無心如人怒我勿畱胷中須如風動竹釋風動竹者自然也或謂伊川曰先生於上前委曲己甚不亦過乎曰不於此致力盡心而於何所釋一致力盡心便仁性無不善其所以不善者才也受於天之謂性稟於氣之謂才才之善不善由氣之有偏正也乃若其情則無不善矣今夫木之曲直其性也或以為車或可以爲輪其才也然而才之不善亦可以變之在養其氣以復其善爾故能持其志養其氣亦可以爲善故孟子曰人皆可以爲堯舜惟自棄自暴則不可與為善釋性才皆出於天其氣同也鮮于侁問伊川曰顔子何以能不改其樂正叔曰顔子所樂者何事侁對曰樂道而已伊川曰使顔子而樂道不爲顔子矣侁未達以告鄒浩浩曰夫人所造如是之深吾今日始識伊川靣釋樂最難尋若到得後方有所樂耳胡文定公集記此事云安國嘗見鄒至完論近世人物因問程明道如何至完曰此人得志使萬物各得其所又問伊川如何曰却不得比明道又問何以不得比曰爲有不通處又問侍郎先生言伊川不通處必有言行可證願聞之至完色動徐曰有一二事恐門人或失其傳後來在長沙再論河南二先生學術至完却曰伊川見處極高因問何以言之曰昔鮮于侁曽問顔子在陋巷不改其樂不知所樂者何伊川却問曰尋常說顔子所樂者何侁曰不過是說顔子所樂者道伊川曰若說有道可樂便不是顔子以此見伊川見處極高又曰浩昔在頴昌有趙均國自洛中來浩問曾見先生有何語均國曰先生語學者曰除却神祠廟宇人始知爲善古人觀象作服便是為善之具又震澤語錄云伊川問學者顔子所樂者何事或曰樂道伊川曰若說顔子樂道辜負顔子鄒至完曰吾雖未識伊川靣已識伊川心何其所造之深也釋樂便是道而人未之識伊川先生將屬纊時顧謂端中曰立子葢指其適子端彦也語絶而没既除喪明道之長孫昻自以當立侯師聖不可昻曰明道不得入廟耶師聖曰我不敢容私明道先太中而卒繼太中主祭者伊川也今繼伊川非端彦而何議始定或為師聖曰明道既死其長子不當立乎曰立廟自伊川始又明道長子死已久况古者有諸侯奪宗庶姓奪嫡之說可以義起矣况立廟自伊川始乎尹子親注云此一段差語亦釋此差必矣雖伊川繼太中主祭未必然明道見神宗論人材上曰朕未之見也明道曰陛下奈何輕天下士上聳然曰朕不敢朕不敢此段見行狀無上曰朕未之見也一句能釋有本者之言自感動君上子曰㳺酢得西銘誦之即渙然不逆於心曰此中庸之理也能求於語言之外者也此一條已見於大全集然頗有缺誤故復出此釋定夫之解明白崇寧黨禁方嚴子徙居龍門之南止南方學者曰茍能尊所聞力行所知則可矣不必及門也釋此亦向晦宴息之意或問范祖禹曰或謂夫子有言曰人有篤志力行而不知道者信乎祖禹曰吾嘗聞之夫子有所指而言之也釋道未易聞聞之雖夕死可矣篤志力行恐未盡耳㳺酢拾遺第二十五問文中子圓者動方者靜先生曰此正倒說了靜體圓動體方釋王以用言程以體言初見先生次日先生復禮因是安下飯食穩便囘謂君子食無求飽居無求安顔子簞瓢陋巷不改其樂簞瓢陋巷何足樂葢別有所樂以勝之耳伊川貴釋別有所樂富換不得也問佛戒殺生之說如何曰儒者有兩說一說天生禽獸本爲人食此說不是豈有人爲蟣虱而生邪一說禽獸待人而生殺之則不仁此說亦不然大抵力能勝之者皆可食但君子有不忍之心爾故曰見其生不忍見其死聞其聲不忍食其肉是以君子遠庖厨也舊先兄嘗見一蝎不忍殺放去頌中有二句云殺之則傷仁放之則害義伊川語釋力能勝之恐誤𫝊敬以直内義以方外與徳不孤一也爲善者以類應有朋自遠方來充之至於塞乎天地皆不孤也釋所謂不孤不必比黨只天下歸仁便是王蘋春秋錄第二十六詩書易言聖人之道備矣何以復作春秋葢春秋聖人之用也詩書易如律春秋如斷案詩書易如藥方春秋如治法釋詩書易皆前聖言春秋夫子自作即詩書易之用也始隱周之衰也終麟感之始也世衰道不行有述作之意舊矣但因麟而發耳麟不出春秋亦須作也釋春秋以獲麟絶筆豈得無意或言絶筆後王者可革命大非也孔子時唯可尊周孟子時方可革命時變然也前一日不可後一日不可釋革命在人心上看建陽大全集拾遺第二十七聖人未嘗無喜也象喜亦喜聖人未嘗無怒也一怒而安天下之民聖人未嘗無哀也哀此㷀獨聖人未嘗無懼也臨事而懼聖人未嘗無愛也仁民而愛物聖人未嘗無欲我欲仁斯仁至矣但中其節則謂之和釋此便是七情之正荀卿才高學陋以禮爲偽以性爲惡不見聖賢雖曰尊子弓然而時相去甚遠聖人之道至卿不傳楊子雲仕莽賊謂之旁燭無疆可乎隱可也仕不可也釋荀失於言楊失於行其過均乎楊子之學甚支離只立名做法言便不是了釋此言足以革作文者之弊游酢於西銘讀之已能不逆於心言語之外別立得這箇義理便道中庸矣道一作到悟釋此是穎向日與向火意思別火只是一箇酷烈底性日則自然一般生底氣便與人氣接釋冬向日夜向月知向火水矣子夏易雖非卜商作必非子夏所能爲必得於師傳也釋恐子夏亦不可小㸔易因爻象論變化因變化論神因神論人因人論徳行大體通論易而終於黙而成之不言而信存乎徳行釋易皆為徳行而發周禮不全是周公之禮法亦有後世隨時添入者亦有漢儒撰入者如吕刑文侯之命通謂之周書釋洪綱大目非周公不能定學者有所得不必在談經論道間當於行事動容周旋中禮得之釋據此可以修己可以觀人學者不學聖人則己欲學之須是熟玩聖人氣象不可止於名上理㑹如是只是講論文字釋纔玩氣象便於自已動靜上用功矣易學後來曾子子夏學煞到上靣也釋二子通悟君實近年病漸較煞放得下也釋止是能用人言天下寧無魏公之忠亮而不可無忠臣之義昔事建成而今事太宗可乎釋此大義急薛公言黥布出上策則關東非漢有非也使出上策亦敗釋薛公據當時事勢言趙襄子姊為代國夫人襄子既殺代王將奪其國夫人距戰是也身為代國夫人社稷無主獨當其任義不可棄社稷以與弟則戰而殺之非姊殺弟也代國夫人殺賊也釋有婦如是烈陳寔見張讓是故舊見之可也不然則非矣此所謂大丘道廣釋寔志遠矣唐之有天下數百年自是無綱紀太宗肅宗皆簒也更有甚君臣父子其妻則取之不正又妻殺其夫簒其位無不至也若太宗言以功取天下此尤不可最啟僭奪之端其惡大是殺兄簒位又取元吉之妻後世以為聖明之主不可㑹也太宗與建成史所書却是也肅宗則分明是乘危而簒若是則今後父有事安得使其子釋道重大綱不然皆茍而已觀太學諸生數千人今日之學要之亦無有自信者如㳺酢楊時二三人游其間諸人遂為之警動敬而遠之釋此見宋治不及於漢先生自少時未嘗乘轎項在蜀與二使者遊二峽使者相强乘轎不可詰其故語之曰某不忍乘分明以人代畜若疾病及泥濘則不得已也二使者亦將不乘某語之曰使者安可不乘既至畱題壁間先生曰毋書某名詰其故曰以使者與一閑人遊若錚客當不竟不乘轎亦不畱名釋錚字未曉村酒肆要之蠧米麥聚閑人妨農工致辭訟藏賊盗州縣極有害釋此亦極有驗汝之多癭以地氣壅滯嘗有人以器雜貯州中諸處水例皆重濁至有水脚如膠者食之安得無癭治之術於中開鑿數道溝渠洩地之氣然後少可也釋少字下疑有脫字酒是麴蘖為之以亂其氣人茍持其志則不到於亂乃知飲食須徳持之未有害也志之為力極可怪釋只酒後把持便驗得志能帥氣今人家買乳婢亦多有不得已者或不能自乳須著使人然食己子而殺人之子不是道理必不得已用二乳而食二子我之子又足備他虞或乳母病且死則不能為害或以勢要二人又不更為己子而殺人子要之只是有所費若不幸致誤其子害孰大焉釋此亦仁術今人居覆載中却不知天地在照臨之内却不理㑹得日月此㝠然而行者也釋知我則知天地日月凡人有斗筲之量有鍾鼎之量有釡斛之量江海亦大矣然尚有限惟聖人之量與天地並故至多不盈至少不虚凡人為器量所拘到滿後自然形見本朝向敏中號有度量至作相却與張齊賢爭取一妻為其有十萬囊槖也王隨亦有徳行仁宗嘗稱王隨徳行李淑文章至作相蕭端公欲得作三路運使及退隨語室中人曰何不以溺自照靣㸔做得三路運使無皆量所動也今人何嘗不動只得綾寫一卷與便動又干他身分甚事釋量要先有識問古人所謂衣冠不正無容止為身之恥今學佛者反以為幻妄此誠為理否曰只如一株樹春華秋枯乃是常理若是常華則無此理却是妄也今佛氏以死為無常有死則有常無死却是無常釋死生順有不願偷生者矣周茂叔謂一部法華經只消一箇艮卦可了釋艮卦尤廣而切時紫芝集微言第二十八或問老子言天地不仁聖人不仁如何曰謂天地不仁以萬物為芻狗是也謂聖人不仁以百姓為芻狗非也聖人豈有不仁所患者不仁也天地何意於仁鼔舞萬物而不與聖人同憂聖人則仁此其為能𢎞道也釋言天地不仁亦恐未安或問記曰康誥曰若保赤子心誠求之雖不中不遠矣未有學養子而後嫁者也先生曰今母保養赤子其始何嘗學來當保養之時自然中所欲若推此心保民設不中其所欲亦不遠因說昔楊軾為宣州僉都一日差王某為杖直當日晚有同姓名者來陳狀乞分産軾疑其杖直便决替了赤子不能言尚能中其欲民能言却不知其情大抵只是少察釋少察處便是少仁學者今日無可添唯有可减减盡便無事釋懲忿窒欲是减或問忠恕之別曰猶形影也無忠則不能為恕矣釋言忠恕不可祈也尹子曰伊川先生嘗言中庸乃孔門傳授心法釋大學亦是心法范文甫問四象子曰左右前後楊中立問四象子言四方釋皆以其近而告之雋不疑說春秋則非處事應機則不異於古人董仲舒論事先引春秋論事則是引春秋則非釋漢儒多借經生義王道與儒道同皆通貫天地學純則純王純儒也釋儒所學者王道或問劉蕡曰浚恒之凶始求深也曰然則宜如何曰尺蠖之屈以求伸也疎遠小臣一旦欲以新間舊難矣釋當蕡之時而又無蕡言乾坤毁矣待致位高得君深而言則已共化矣或問貞觀之治不幾三代之盛乎曰關睢麟趾之意安在釋文末也李朴字先之請教先生曰當養浩然之氣又問曰觀張子厚所作西銘能養浩然之氣者也釋能仁則能集義子謂尹焞魯張繹俊俊恐他日過之魯者終有守也釋尹張其後也驗尹子張子見先生曰二子於某言如何尹子對曰聞先生之言言下領意焞不如繹能終守先生之學繹亦不如焞先生欣然曰各中其病釋觀此程門師弟子言甚真實王信伯問學於伊川曰願聞一言先生曰勿信吾言但信取理釋程子以理自處矣先生過成都坐于所館之堂讀易有造桶者前視之指未濟卦問先生曰何也曰三陽皆失位先生異之問其姓與居則失之矣易傳曰聞之成都隱者酉室所聞云田夫釋耒者誤朝廷議授㳺定夫以正言蘇右丞沮止毁及伊川宰相蘇子容曰公未可如此頌觀過其門者無不肅也釋起人敬亦非細事朱公掞以諫官召過洛見伊川顯道在坐公掞不語伊川指顯道謂之曰此人爲切問近思之學釋程子不止稱顯道亦以覺公掞耳張思叔請問其論或大高伊川不答良久曰累高必自下釋此抑揚進退人物之方有死而復蘇者故禮三日而斂然趙簡子七日猶蘇雖蛆食其舌鼻猶不害唯伏地甚者遂致并股踵皆冷故未三日而斂皆有殺之之理釋據此則三日小斂非宜學者要先㑹疑釋疑便可明元經天子之史也書帝正月非也釋帝正月擬王正月乎未必然章氏之子與明道之子王氏婿也明道子死章納其婦先生曰豈有生為親友死娶其婦者他日王氏來餽送一皆謝遣章來欲見其子先生曰母子無絶道然君乃其父之罪人也釋程子此處亦難矣范堯夫經筵坐睡先生語人曰堯夫胷中無事如此有朝吏入朝倒執手板先生曰此人胷中不是無事釋坐睡恐亦未善若倒執手板者亂矣陳經正問曰據貴一所見盈天地間皆我之性更不復知我身之為我伊川笑曰他人食飽公無餒乎釋陳言蕩矣或問涵養曰若造得到更說甚涵養釋始造亦要涵養心定者其言重以舒不定者其言輕以疾釋定心只有知止一方楊子曰觀乎天地則見聖人伊川曰不然觀乎聖人則見天地釋須㑹觀自已方能見天地聖人朱公琰為御史端笏正立嚴毅不可犯班列肅然蘇子瞻語人曰何時打破這敬字釋此便見子瞻害道尹子曰馮理自號東臯居士曰二十年聞先生教誨今有一竒特事先生曰何如理曰夜間宴坐室中有光先生曰頥亦有竒特事理請聞之先生曰毎食必飽釋此豈惟可解馮理乎崇寧初范致虚言程頥以邪說詖行惑亂衆聽尹焞張繹為之羽翼遂下河南府體䆒學者往別因言世故先生曰三代之治不可復也有賢君作能致小康則有之釋此雖有感而言自是實事尹子曰邵堯夫家以墓誌屬明道許之太中伊川不欲因步月於庭明道曰顥已得堯夫墓誌矣堯夫之學可謂安且成太中乃許釋步庭中月而始誌堯夫堯夫亦可謂有所得乎吕與叔作横渠行狀有見二程盡棄其學之語尹子言之先生曰表叔平生議論謂頥兄弟有同處則可釋與叔此言太過葢從遊程門後發不若伊川言平溫公薨朝廷命伊川先生主其喪事是日也祀明堂禮成而二蘇往哭温公道遇朱公琰問之公琰曰往哭溫公而程先生以為慶弔不同二蘇悵然而反曰鏖糟陂裏叔孫通也言其山野自是時時謔伊川他日國忌禱于相國寺伊川令供素饌子瞻語之曰正叔不好佛胡為食素正叔曰禮居喪不飲酒食肉忌日喪之餘也子瞻令具肉食曰為劉氏者左袒於是范淳夫輩食素秦黄輩食肉吕申公為相凡事有疑必質于伊川進退人才二蘇疑伊川有力故極口詆之云釋蘇氏學成文章何用乎伊川主溫公喪事子瞻周視無闕禮乃曰正叔喪禮何其熟也又曰軾聞居喪未葬讀喪禮太中康寧何為讀喪禮乎伊川不答鄒至完聞之曰伊川之母先亡獨不可以治喪禮乎釋伊川不答者知其譎也或問科舉事業奪人之功是不然且一月之中以十日為舉業餘日足可為學然人不志此必至於彼故科舉之事不患妨功惟患奪志釋即科舉亦有學明道先生毎與門人講論有不合者則曰更有商量伊川則直曰不然釋此見二子之和介謝顯道崇寧間上殿不稱㫖先生聞之喜已而就監門之職陳貴一問謝顯道如何人先生曰由求之徒或云建中間其釋謝能信師矣司馬溫公辭副樞名冠一時天下無賢不肖浩然歸重吕申公亦以論新法不合罷歸熈寧末申公起知河陽明道以詩送行復為詩與溫公葢恐其以不出為高也及申公自河陽乞在京宫祠神宗大喜召登樞府人以二公出處為優劣二先生曰吕公世臣不得不歸見上司馬公諍臣不得不退處釋此明道仁義並有存處陳經邦問詩說言唐魏已變先代之風又言先聖流風遺俗盡故次以陳兩意似不異何以分先後先生曰聖人之都風化所厚聖人之國典法所存唐魏聖人之都其風雖變而典法尚在陳舜之後聖人之國亦被夷狄之風則典法隨而亡矣三代之後有志之士欲復先王之治而不能者皆由典法不備故典法尚存有人舉而行之無難矣釋此齊一變至魯之意范溫譏張思叔曰買取錦屏三畝地蒲輪未至且躬耕先生聞之曰於張繹有何加損也釋程子可謂知思叔矣范淳夫之葬先生為之經理掘地深數丈不置一物葬之日招在近父老犒以酒食示之其後發塜者相繼而淳夫獨完釋此可謂厚淳夫矣横渠學堂雙牖右書訂頑左書砭愚伊川曰是起爭端改之曰東銘西銘釋亦以自訂二程子抄釋卷七
