body:
  text: 二程子抄釋卷四明呂柟編劉安節手編第十一伊川語問仁曰此在諸公自思之將聖賢所言仁處類聚觀之體認出來孟子曰惻隱之心仁也後人遂以愛爲仁惻隱固是愛也愛自是情仁自是性豈可專以愛爲仁孟子言惻隱爲仁葢爲前已言惻隱之心仁之端也既曰仁之端則不可便謂之仁退之言博愛之謂仁非也仁者固博愛然便以博愛爲仁則不可釋此於仁字儘窮究人多說某不教人習舉業某何嘗不敎人習舉業也人若不習舉業而望及第却是責天理而不修人事但舉業既可以及第即已若更去上面盡力求必得之道是惑也釋舉業亦不害學人注擬差遣欲主簿者問其故則曰責輕於尉某曰却是尉責輕尉只是捕盜不能使民不爲盜簿佐令以治一邑使民不爲盗簿之責也豈得爲輕或問簿佐令者也簿所欲爲令或不從奈何曰當以誠意動之今令與簿不和只是爭私意令是邑之長若能以事父兄之道事之過則歸已善則惟恐不歸於令積此誠意豈有不動得人問授司理如何曰甚善若能充其職可使一郡無寃民也幙官言事不合如之何曰必不得已有去而已須權量事之大小事大於去則當去事小於去亦不須去也事大於爭則當爭事小於爭則須不爭也今人只被以官爲業如何去得釋去就如此雖於卿相可也人有實無學而氣葢人者其氣一作禀有剛柔也故强猛者當抑之畏縮者當充養之古人佩韋絃之戒正爲此耳然剛者易抑如子路初雖聖人亦被他陵後來既知學便却移其剛來克己甚易畏縮者氣本柔須索勉强也釋故孔子進退由求藻鑑人物自是人才有通悟處學不得也張子厚善鑑裁其弟天祺學之便錯釋此亦係自得問學何以至覺悟處曰莫先致知能致知則思一日愈明一日乆而後有覺也學而無覺則何益矣又奚學爲思曰睿睿作聖纔思便睿以至作聖亦是一箇思故曰勉强學問則聞見博而智益明又問莫先致知與力行兼否曰爲常人言纔知得非禮不可爲須用勉强至於知穿窬不可爲則不待勉强是知亦有淺深也古人言樂循禮之謂君子若勉强只是知循禮非是樂也纔到樂時便是循禮爲樂不循禮爲不樂何苦而不循禮自不須勉强也若夫聖人不勉而中不思而得此又上一等事釋學至熟便不知手舞足蹈問張旭學草書見擔夫與公主爭道又公孫大娘舞劒而後悟筆法莫是心常在思念至此而感否曰然須是思方有感悟處若不思怎生得如此然可惜張旭留心於書若移此心於道何所不至釋見梅兎而知畫八卦亦此乎與學者語正如扶醉人東邊扶起却倒向西邊西邊扶起却倒向東邊終不能得他卓立中途釋縁學者無志且病痛多也古之學者一今之學者三異端不與焉一曰文章之學二曰訓詁之學三曰儒者之學欲適道舎儒者之學不可釋二學之害與異端同或曰人問某以學者當先識道之大本道之大本如何求某告之以君臣父子夫婦兄弟朋友於此五者上行樂處便是曰此固是然怎生地樂勉强樂不得須是知得了方能樂得故人力行先須要知非特行難知亦難也書曰知之非艱行之惟艱此固是也然知之亦自艱譬如人欲徃京師必知是出那門行那路然後可徃如不知雖有欲徃之心其將何之自古非無美材能力行者鮮能明道以此知之亦難也釋眞知甚難若眞知行亦易也問忠信進德之事固可勉强然致知甚難曰子以誠敬爲可勉强且恁地說到底須是知了方行得若不知只是覷却堯學他待事無堯許多聰明睿知怎生得如他動容周旋中禮有諸中必形諸外德容安可妄學如子所言是篤信而固守之非固有之也且如中庸九經修身也尊賢也親親也堯典克明峻德以親九族親親本合在尊賢上何故却在下須是知所以親親之道方行得未致知怎生行得勉强行者安能持乆除非燭理明自然樂循理性本善循理而行是順理事本亦不難但爲人不知旋安排著便道難也知有多少般數然有深淺向見一人爲虎所傷因言及虎神色便變傍有數人見他說虎非不知虎之猛可畏然不如他說了有畏懼之色葢眞知虎者也學者深知亦如此且如膾炙貴公子與野人莫不皆知其美然貴人聞著便有欲嗜膾炙之色野人則不然學者須是眞知纔知得是便泰然行將去也某年二十時解釋經義與今無異然思今日覺得意味與少時自别釋此等發揮眞知行亦在其中矣問學者須志向大如何曰志無大小且莫說道將第一等讓與别人且做第二等才如此說便是自棄雖與不能居仁由義者差第不同其自小一也言學便以道爲志言人便以聖爲志自謂不能者自賊也謂其君不能者賊其君者也釋志道與聖亦分内事或問人有耻不能之事如何曰人恥其不能而爲之可也耻其不能而揜藏之不可也問技藝之事耻已之不能如何曰技藝不能安足耻爲士者當知道已不知道可耻也爲士者當博學已不博學一本知道已下本至此十九字但云博學守約已不能之可耻也耻之如何亦曰勉之而已又安可嫉人之能而諱已之不能也釋耻不能而掩者終不能學欲速不得然亦不可纔有欲速之心便不是學學是至廣大的事豈可以迫切之心爲之釋看如何様子迫切問敬還用意否曰其始安不用意若能不用意却是都無事了又問敬莫是静否曰纔說静便入於釋氏之說也不用静字只用敬字纔說著静字便是妄孟子曰必有事焉而勿正心勿忘勿助長也必有事焉便是心勿忘勿正便是勿助長釋看必有事焉可觀此心安住處或問獨處一室或行闇中多有驚懼何也曰只是燭理不明若能燭理則知所懼者妄又何懼焉有人雖知此然不免懼心者只是氣不充須是涵養乆則氣充自然物動不得然有懼心亦是敬不足釋亦須内省不疚自然明問世言鬼神之事雖知其然不能無疑懼何也曰此只是自疑爾曰如何可以曉悟其理曰理㑹得精氣爲物遊魂爲變與原始要終之說便能知也須是於原字上用工夫或曰遊魂爲變是變化之變否曰旣是變則存者亡堅者腐更無物也鬼神之道只恁說與賢雖㑹得亦信不透須是自得也或曰何以得無恐懼曰須是氣定自然不惑氣未充要强不得因說與長老游山事釋原字亦難用功人語言緊急莫是氣不充否曰此亦當習習到言語自然緩時便是氣質變也學至氣質變方是有功人只是一箇習今觀儒臣自有一般氣象武臣自有一般氣象貴戚自有一般氣象不成生來便如此只是習也某舊嘗進說於主上及太母欲令上於一日之中親賢士大夫之時多親宦官宮人之時少所以涵養氣質薫陶德性釋論語一部以學習二字爲首或問人或倦怠豈志不立乎曰若是氣體勞後須倦若是志怎生倦得人只爲氣勝志故多爲氣所使如人少而勇老而怯少而亷老而貪此爲氣所使者也若志勝氣時志既一定更不可易如曽子易簀之際其氣之㣲可知只爲他志已定故雖死生許大事亦動他不得葢有一絲髮氣在則志猶在也釋志帥天地則健問人之燕居形體怠惰心不慢可否曰安有箕踞而心不慢者昔呂與叔六月中來緱氏閒居中某甞窺之必見其儼然危坐可謂敦篤矣學者須㳟但不可令拘迫拘迫則難乆矣尹子曰嘗親聞此乃謂劉質夫也釋申申可不然難乆昔呂與叔嘗患思慮紛擾某答以但爲心無主若主於敬則自然不紛擾譬如以一壺水投於水中壺中既實雖江湖之水不能入矣曰若思慮果出於正亦無害否曰且如在宗廟則主敬朝廷主莊軍旅主嚴此是也如發不以時紛然無度雖正亦邪釋只是主一必有事焉問人有日誦萬言或妙絶技藝此可學否曰不可大凡所受之才難勉强止可少進而鈍者不可使利也惟理可進除是積學既久能變得氣質則愚必明柔必强葢大賢已下旣論才大賢以上更不論才聖人與天地合德日月合明六尺之軀能有多少技藝人有身須有才聖人忘已更不論此才也釋才有不同大者在道小者在藝問人於議論多欲已直無含容之氣是氣不平否曰固是氣不平亦是量狹人量隨識長亦有人識髙而量不長者是識實未至也凡别事人都强得惟識量不可强今人有斗筲之量有釜斛之量有鍾鼎之量有江河之量江河之量亦大矣然有涯有涯亦有時而滿惟天地之量則無滿故聖人者天地之量也聖人之量道也常人之有量者天資有量者須有限大抵六尺之軀力量只如此雖欲不滿不可得且如人有得一薦而滿者有一官而滿者有改京官而滿者有入兩府而滿者滿雖有先後然卒不免譬如器或物初滿時尚可以蔽䕶更滿則必出此天資之量非知道者也昔王隨甚有器量仁廟賜飛白書曰王隨德行李叔文章當時以德行稱名望甚重及爲相有一人求作三路轉運使王薄之出鄙言當時人皆驚怪到這裏位高後便動了人之量只如此古人亦有如此者多如鄧艾位三公年七十處得甚好及因下蜀有功便動了雖與驕傲者不同其爲位動一也然惟知道者量自然宏大不勉而成今人有所見卑下無他亦是識量不足也釋識量亦在學習充拓人纔有意於爲公便是私心昔有人典選其子弟係磨勘皆不爲理此乃是私心人多言古時用直不避嫌得後世用此不得自是無人豈是無時因言少師典舉明道薦才事釋只有一箇至誠便平問家貧親老應舉求仕不免有得失之累何脩可以免此曰此只是志不勝氣若志勝自無此累家貧親老須用祿仕然得之不得爲有命曰在已固可爲親奈何曰爲已爲親也只是一事若不得其如命何孔子曰不知命無以爲君子茍不知命見患難必避遇得䘮必動見利必趨其何以爲君子然聖人言命葢爲中人以上者設非爲上知者言也中人以上於得䘮之際不能不惑故有命之說然後能安昔上智之人更不言命爲安於義借使求則得之然非義則不求此樂天者之事也上智之人安於義中人以上安於命乃若聞命而不能安之者又其每下者也孟子曰求之有道得之有命求之雖有道如何得之須有命問某嘗讀華嚴經第一眞空絶相觀第二事理無碍觀第三事事無碍觀譬如鏡燈之類包含萬象無有窮盡此理如何曰只爲釋氏要周遮一言以蔽之不過曰萬理歸於一理也又問未知所以破他處亦未得道他不是曰百家諸子箇箇談仁談義只爲他歸宿處不是只是箇自私爲輪回生死却爲釋氏之辭善遁纔窮著他便道我不爲這箇到了冩在策子上怎生遁且指他淺近處只燒一文香便道我有無窮福利懷却這箇心怎生事神明釋說釋氏利心甚明白問西銘何如曰此横渠文之粹者也曰充得盡時如何曰聖人也横渠能充否曰言有多端有有德之言有造道之言有德之言說自已事如聖人言聖人事也横渠道儘高言儘醇自孟子後儒者都無他見識釋西銘亦庶乎有德者之言矣問横渠之書有廹切處曰子厚謹嚴纔謹嚴便有廹切氣象無寛舒之氣孟子却寛舒只是中間有些英氣纔有英氣便有圭角英氣甚害事如顔子便渾厚不同顔子去聖人只毫髪之間孟子大賢亞聖之次也或問氣象於甚處見曰但以孔子之言比之便見如氷與水精非不光比之玉自是有溫潤含蓄氣象無許多光耀也釋學到如玉處更言甚道邵堯夫臨終時只是諧謔須臾而去以聖人觀之則亦未是葢猶有意也比之常人甚懸絶矣他疾甚革某徃視之因警之曰堯夫平生所學今日無事否他氣㣲不能答次日見之却有聲如絲髮來大答云你道生姜樹上生我亦只得依你說是時諸公都在㕔上議後各欲遷葬城中堯夫已自爲塋他在房間便聞得令人喚大郎來云不得遷葬衆議始定又問公恐喧他盡出外說話他皆聞得一人云有新報云云堯夫問有甚事曰有某事堯夫曰我將爲此拾却幽州也以他人觀之便以爲怪此只是心虛而明故聽得問曰堯夫未病時不如此何也曰此只是病後氣將絶心無念慮不昏便如此又問釋氏臨終亦先知死何也曰只是一箇不動釋氏平生只學這箇事將這箇做件大事學者不必學他但燭理明自能之只如邵堯夫事他自如此亦豈甞學也孔子曰未知生焉知死人多言孔子不告子路此乃深告之也又曰原始要終故知死生之說人能原始知得生理一作所以生便能要終知得死理一作所以死若不明得便雖萬般安排著亦不知釋堯夫安且成者正如此然去易簀事不逺矣張子厚罷禮官歸過洛陽相見某問云在禮院有甚職事曰多爲禮房檢正所奪只定得數箇謚幷龍女衣冠問如何定龍女衣冠曰請依品秩曰若使某當是事必不如此處置曰如之何曰某當辯云天河之塞天地之靈宗廟之祐社稷之福與吏士之功不當歸功水獸龍獸也不可衣人衣冠子厚以爲然釋正叔據禮甚於子厚問荆公可謂得君乎曰後世謂之得君可也然荆公之智識亦自能知得如表云忠不足以信上故事必待於自明智不足以破姦故人與之爲敵智不破姦此則未然若君臣深相知何待事事使之辯明也舉此一事便可見曰荆公勿使上知之語信乎曰須看他當時問甚事說此話且如作此事當如何更須詳審未要令上知之只如說一事未甚切當更須如何商量體察今且勿令上知若此類不成是欺君也凡事未見始末更切子細反復推究方可釋正叔解勿令上知事聖人之量也李明問先生說喜怒哀樂未發謂之中是在中之義不識何意曰只喜怒哀樂不發便見中也曰中莫無形體只是箇言道之題目否曰非也中有甚形體然既謂之中也須有箇形象曰當中之時耳無聞目無見否曰雖耳無聞目無見然見聞之理在始得曰中是有時而中否曰何時而不中以事言之則有時而中以道言之何時而不中曰固是所爲皆中然而觀於四者未發之時静時自有一般氣象及至接事時又自别何也曰善觀者不如此却於喜怒哀樂已發之際觀之賢且說静時如何曰謂之無物則不可然自有知覺處曰既有知覺却是動也怎生言靜人說復其見天地之心皆以謂至靜能見天地之心非也復之卦下面一畫便是動也安得謂之靜自古儒者皆言靜見天地之心唯某言動而見天地之心或曰莫是於動上求靜否曰固是然最難釋氏多言定聖人便言止如物之好須道是好物之惡須道是惡物自好惡關我這裏甚事若說道我只是定更無所爲然物之好惡亦自在裏故聖人只言止所謂止如人君止於仁人臣止於敬之類是也易之艮言止之義曰艮其止止其所也言隨其所止而止之人多不能止葢人萬物皆偹遇事時各因其心之所重者更互而出纔見得這事重便有這事出若能物各付物便自不出來也或曰先生於喜怒哀樂未發之前下動字下靜字曰謂之靜則可然靜中須有物始得這便一作最是難處學者莫若且先理㑹得敬能敬則自知此矣或曰敬何以用功曰莫若主一季明曰昞甞患思慮不定或思一事未了他事如麻又生如何曰不可此不誠之本也須是習習能一時便思慮與應事皆要求一或曰當靜坐時物之過乎前者還見不見曰看事如何若是大事如祭祀前旒蔽明黈纊充耳凡物之過者不見不聞也若無事時目須見耳須聞或曰當敬時雖見聞莫過焉而不留否曰不說道非禮勿視勿聽勿者禁止之辭纔說弗字便不得也問雜說中以赤子之心爲已發是否曰已發而去道未遠也曰大人不失赤子之心若何曰取其純一近道也曰赤子之心與聖人之心若何曰聖人之心如明鏡如止水釋此即定而能靜也葢靜只是無雜念别慮耳非謂如槁木死灰也心體本動物動得當時便是靜問人心所繫著之事則夜見於夣所著事善夜夣見之者莫不害否曰雖是善事心亦是動凡事有联兆入夣却無捨此皆是妄動或曰孔子嘗夣見周公當如何曰此聖人存誠處也聖人欲行周公之道故雖一夣寐不忘周公及既衰知道之不可行故不復夣也然所謂夣見周公豈是夜夜與周公語也人心雖要定使他思時方思乃是今人都由心曰心誰使之曰以心使心則可人心自由便放去也釋此便是入道法問心有善惡否曰在天爲命在義爲理在人爲性主於身爲心其實一也心本善發於思慮則有善有不善若既發則可謂之情不可謂之心譬如水只謂之水至如流而爲𣲖或行於東或行於西知謂之流也釋流是何物須是云水流也問喜怒出於性否曰固是纔有生識便有性有性便有情無性安得情又問喜怒出於外如何曰非出於外感於外而發於中也問性之有喜怒猶水之有波否曰然湛然平靜如鏡者水之性也及遇沙石或地勢不平便有湍激或風行其上便爲波濤洶湧此豈水之性也哉人性中只有四端又豈有許多不善底事然無水安得波浪無性安得情也釋此言性情一理之意問人性本明因何有蔽曰此須索理㑹也孟子言人性善是也雖荀楊亦不知性孟子所以獨出諸儒者以能明性也性無不善而有不善者才也性即是理理則自堯舜至於途人一也才禀於氣氣有清濁禀其清者爲賢禀其濁者爲愚可變否曰可孔子謂上智與下愚不移然亦有可移之理惟自暴自棄者則不移也曰下愚所以自暴棄者才乎曰固是也然却道他不可移不得性只一般豈不可移却被他自暴自棄不肯去學故移不得使肯學時亦有可移之理釋不肯學處便是不移凡解文字但易其心自見理理只是人理甚分明如一條平坦底道路詩曰周道如砥其直如矢此之謂也且如隨卦言君子向晦入宴息解者多作遵養時晦之晦或問作甚晦字曰此只是隨時之大者向晦則宴息也更别有甚義或曰聖人之言恐不可以淺近看他曰聖人之言自有近處自有深遠處如近處怎生强要鑿教深遠得楊子曰聖人之言遠如天賢人之言近如地某與改之曰聖人之言其遠如天其近如地釋解文得義爲先茍得義遠近一也問聖人之經㫖如何能窮得曰以理義去推索可也學者先須讀論孟窮得論孟自有箇要約處以此觀他經甚省力論孟如丈尺權衡相似以此去量度事物自然見得長短輕重某嘗語學者必先看論語孟子今人雖善問未必如當時人借使問如當時人聖人所答不過如此今人看論孟之書亦如見孔孟何異釋只以心對事使經便多不錯孟子養氣一篇諸君望潜心玩索須是實識得方可勿忘勿助長只是養氣之法如不識怎生養有物始言養無物又養箇甚麽浩然之氣須見是一箇物如顔子言如有所立卓爾孟子言躍如也卓爾躍如分明見得方可釋只卓爾躍如是勿忘常接乎心目也性相近也習相遠也性一也何以言相近曰此只是言氣質之性如俗言性急性緩之類性安有緩急此言性者生之謂性也又問上智下愚不移是性否曰此是才須理㑹得性與才所以分處又問中人以上可以語上中人以下不可以語上是才否曰固是然此只是大綱說言中人以上可以與之說近上話中人以下不可以與說近上話也生之謂性凡言性處須看他立意如何且如言人性善性之本也生之謂性論其所禀也孔子言性相近若論其本豈可言相近只論其所禀也告子所云固是爲孟子問他他說便不是也釋此等分性才足知性原於資始之初才形於保合之後甚明白矣問顔子勇乎曰孰勇於顔子觀其言曰舜何人也予何人也有爲者亦若是孰勇於顔子如有若無實若虛犯而不校之類抑可謂大勇者矣釋有如此言有如此行方是勇曽子傳聖人道一作學只是一箇誠篤語曰參也魯如聖人之門子游子夏之言語子貢子張之才辯聰明者甚多卒傳聖人之道者乃質魯之人人只要一箇誠實聖人說忠信處甚多曽子孔子在時甚少後來所學不可測且易簀之事非大賢以上作不得曽子之後有子思便可見語云篤信好學守死善道其曽子乎問伐國不問仁人如何曰不知怎生地伐國如武王伐紂都是仁人如柳下惠之時則不可當時諸侯以土地之故糜爛其民皆不義之伐宜仁人不忍言也釋此可觀正叔之行權問宋襄公不鼓不成列如何曰此愚也既與他戰又却不鼔不成列必待成列圖箇甚釋仁人不如是之愚也問羊祜陸抗之事如何曰如送絹償禾之事甚好至抗飲祜藥則不可羊祜雖不是酖人底人然兩軍相向其所餉藥自不當飲釋程言甚正外肆戈㦸而内藏和合恐未眞乎問用兵掩其不偹出其不意之事使王者之師當知此否曰固是用兵須要勝不成要敗既要勝須識所以勝之之道但湯武之兵自不煩如此㒺有敵於我師自可見然湯亦嘗升自陑陑亦間道且如兩軍相向必擇地可攻處攻之右實則攻左左實則攻右不成道我不用計也且如漢楚旣約分鴻溝乃復還襲之此則不可如韓信嚢沙壅水之類何害他師衆非我敵决水使他一半不得渡自合如此有甚不得處又問間諜之事如何曰這箇不可也釋旣用兵伐不仁則雖百計千策皆爲智問行不由徑徑是小路否曰只是不正當處如履田疇之類不必不由小路昔有一人因送葬回不覺被僕者引自他道歸行數里方覺不是却須要回就大路上若此非中理若使小路便於徃來由之何害釋道在通變問古者何以不修墓曰所以不修墓者欲初爲墓時必使至堅固故須必誠必敬若不誠敬安能至久曰孔子爲墓何以速崩如此邪曰非孔子也孔子先反脩虞事使弟子治之弟子誠敬不至纔雨而墓崩其爲之不堅固可知然修之亦何害聖人言不脩者所以深責弟子也釋不脩墓者一築永固無後患也未知道者如醉人方其醉時無所不至及至醒也莫不愧恥人之未知學者自視以爲無缺及既知學反思前日所爲則駭且懼矣釋此須常醒醒法可聖人六經皆不得已而作如耒耜陶冶一不制則生人之用熄後世之言無之不爲缺有之徒爲費雖多何益也聖人言雖約無有包含不盡處釋必有德者方能立言言貴簡言愈多於道未必明杜元凱却有此語云言高則㫖遠辭約則義㣲大率言語須是含蓄而有餘意所謂書不盡言言不盡意也釋文至隋唐衰濫侈故也問天地明察神明彰矣曰事天地之義事天地之誠既明察昭著則神明自彰矣問神明感格否曰感格固在其中矣孝弟之至通於神明神明孝弟不是兩般事只孝弟便是神明之理又問王祥孝感事是通神明否曰此亦通神明一事此感格便是王祥誠中來非王祥孝於此而物來於彼也釋心舉動處便是誠明問窮神知化由通於禮樂何也曰此句須自家體認一作玩索人徃徃見禮壞樂崩便謂禮樂亡然不知禮樂未嘗亡也如國家一日存時尚有一日之禮樂葢由有上下尊卑之别也除是禮樂亡盡然後國家始亡雖盗賊至所爲不道者然亦有禮樂葢必有總屬必相聽順乃能爲盗不然則叛亂無統不能一日相聚而爲盗也禮樂無處無之學者須要識得問明則有禮樂幽則有鬼神何也曰鬼神只是一箇造化天尊地卑乾坤定矣鼔之以雷霆潤之以風雨是也釋盗賊之總屬聽順却是禮樂崩壞問詩如何學曰只在大序中求詩之大序分明是聖人作此以教學者後人徃徃不知是聖人作自仲尼後一作漢以來更無人理會得詩如言后妃之德皆以爲文王之后妃文王諸侯也豈有后妃又如樂得淑女以配君子憂在進賢不滛其色以爲后妃之德如此配惟后妃可稱后妃自是配了更何别求淑女以爲配滛其色乃男子事后妃怎生會滛其色此不難曉但將大序看數遍則可見矣或曰闗睢是后妃之德當如此否樂得淑女以配君子憂在進賢不滛其色哀窈窕思賢才而無傷善之心焉是關睢之義也只著箇是以字便自有意思曰如言又當輔佐君子則可以歸安父母言能逮下之類皆爲其德當如此否曰是也問詩小序何人作曰但看大序即可見矣曰莫是國史作否曰序中分明言國史明乎得失之迹葢國史得詩於採詩之官故知其得失之迹如非國史則何以知其所美所刺之人使當時無小序雖聖人亦辨不得曰聖人刪詩時曽刪改小序否曰有害義理處也須刪改今之詩序却煞錯亂有後人附之者曰關睢之詩是何人所作曰周公作周公作此以風敎天下故曰用之鄉人焉用之邦國焉上以風化下下以風刺上葢自天子至於庶人正家之道當如此也二南之詩多是周公所作如小雅六月所考之詩亦是周公作後人多言二南爲文王之詩葢其中有文王事也曰非也附文王詩於中者猶言古人有行之者文王是也釋說詩及序甚明白矣問周禮之書有訛缺否曰甚多周公致治之大法亦在其中須知道者觀之可决是非也又問司盟有詛萬民之不信者治世亦有此乎曰盛治之世固無此事然人情亦有此事爲政者因人情而用之釋觀此則周禮不可疑問王通曰隱德君子也當時有些言語後來被人傅會不可謂全書若論其粹處殆非荀揚所及也若續經之類皆非其作釋續經亦不妨且後世也楊雄去就不足觀如言明哲煌煌旁燭無疆此甚悔恨不能先知遜於不虞以保天命則是只欲全身也若聖人先知必不至於此必不可奈何天命亦何足保耶問太𤣥之作如何曰是亦贅矣必欲撰𤣥不如明易邵堯夫之數似𤣥而不同數只是一般一作數無窮但看人如何用之雖作十𤣥亦可况一𤣥乎釋雄未能立德而先立言故文雖工無用也荀卿才高其過多揚雄才短其過少韓子稱其大醇非也若二子可謂大駁矣然韓子責人甚恕釋荀卿之過言多於行揚雄之過行多於言荀猶優乎退之晩來爲文所得處甚多學本是修德有德然後有言退之却倒學了因學文日求所未至遂有所得如曰軻之死不得其傳似此言語非是蹈襲前人又非鑿空撰得出必有所見若無所見不知言所傳者何事原性等文皆少時作乎釋韓亦志士退之言漢儒補綴千瘡百孔漢儒所壞者不少安能補也釋漢儒亦未必盡非乎凡讀史不徒要記事跡須要識治亂安危興廢存亡之理且如讀高帝一紀便須識得漢家四百年終始治亂當如何是亦學也釋此讀史要法問漢儒至有白首不能通一經者何也曰漢之經術安用只是以章句訓詁爲事且如解堯典二字至三萬餘言是不知要也東漢則又不足道也東漢士人尚名節只爲不明理若使明理却皆是大賢也自漢以來惟有三人近儒者氣象大毛公董仲舒揚雄若本朝經術最盛只近二三十年來議論專一使人更不致思釋漢儒如孔顔者固少如由求雍騫之徒亦多有之不但三人周勃入北軍問曰爲劉氏左袒爲呂氏右􅃝旣知爲劉氏又何必問若不知而問設或右􅃝當如之何已爲將乃問士卒豈不謬哉當誅諸呂時非陳平爲之謀亦不克成及迎文帝至覇橋曰願請間此豈請間時邪至於罷相就國毎河東守行縣至絳必令家人被甲執兵而見此欲何爲可謂至無能之人矣釋漢初謹愿人多類此故可任王通言諸葛無死禮樂其有興信乎曰諸葛近王佐才禮樂興不興則未可知問曰亮果王佐才何爲僻乎一蜀而不能有爲於天下曰孔明固言明年欲取魏幾年定天下其不及而死則命也某嘗謂孫覺曰諸葛武侯有儒者氣象孫覺曰不然聖賢行一不義殺一不辜雖得天下不爲武侯區區保完一國不知殺了多少人耶某謂之曰行一不義殺一不辜以利一已則不可若以天下之力誅天下之賊殺戮雖多亦何害陳恒弑君孔子請討孔子豈保得討陳恒時不殺一人耶葢誅天下之賊則有所不得顧爾曰三國之興孰爲正曰蜀志興復漢室則正也釋孔明以管樂自比其志逺乎漢文帝殺薄昭李德裕以爲殺之不當溫公以爲殺之當說皆未是據史不見他所以殺之之故須是權事勢輕重論之不知當時薄昭有罪漢使人治之因殺漢使也還是薄昭與漢使飲酒因忿怒而致殺之也漢文帝殺薄昭而太后不安奈何既殺之太后不食而死奈何若漢治其罪而殺漢使太后雖不食不可免也須權他那箇輕那箇重然後論他殺得當與不當也論事須著用權古今多錯用權字纔說權便是變詐或權術不知權只是經所不及者權量輕重使之合義纔合義便是經也釋若說在太后食不食則於薄昭不免有恩素問書出於戰國之末氣象可見若是三皇五帝典墳文章自别其氣運處絶淺近如將二十四氣移換名目便做千百様亦得釋素問辭則三代以後義則三代以前此作者亦有口傳乎隂符經非商末則周末人爲之若是先王之時聖道旣明人不敢爲異說及周室下衰道不明於天下才智之士甚衆旣不知道所趨向故各自以私智窺測天地盗竊天地之機分明是大盗故用此以簧鼓天下故云天有五賊見之者昌云云豈非盗天地乎釋自有聖人以來便有隂符諸說故堯舜言執中問老子書若何曰老子書其言自不相入處如氷炭其初意欲談道之極𤣥妙處後來却入做權詐者上去如將欲取之必固與之之類然老子之後有申韓看申韓與老子道甚懸絶然其原乃自老子來蘇秦張儀則更是取道遠初秦儀學於鬼谷其術先揣摩其如何然後捭闔捭闔旣動然後用鈎鉗鈎其端然後鉗制之其學旣成辭鬼谷去鬼谷試之爲張儀說所動如入庵中說令出之然其學甚不近道人不甚惑之孟子時已有置而不足論也釋老氏本非儀秦然才欲無已便欲有已終是術問東海殺孝婦而旱豈國人寃之所致耶曰國人寃固是然一人之意自足以感動得天地不可道殺孝婦不能致旱也或曰殺姑而雨是衆人寃釋否曰固是衆人寃釋然孝婦寃亦釋也其人雖亡然寃之之意自在不可道殺姑不能釋婦寃而致雨也釋天人一理至誠則通問人有不善霹􅆮震死莫是人懷不善之心聞霹􅆮震懼而死否曰不然是雷震之也如是雷震之還有使之者否曰不然人之作惡有惡氣與天地之惡氣相擊搏遂以震死霹􅆮天地之怒氣也如人之怒固自有正然怒時必爲之作惡是怒亦惡氣也怒氣與惡氣相感故爾且如今人種蕎麥自有畦隴霜降時殺麥或隔一畦麥有不殺者豈是此處無霜葢氣就相合處去也曰雷所擊處必有火何也曰雷自有火如鑚木取火如使木中有火豈不燒了木葢是動極則陽生自然之理不必木只如兩石相戞亦有火出惟鉄無然戞之久必熱此亦是陽生也釋自古未聞雷擊聖賢事可見天人一道雨木氷上溫而下冷隕霜不殺草上冷而下溫釋皆失候也問日月有定形還自氣散别自聚否曰此理甚難曉究其極則此二說歸於一也問月有定魄而日遠於月月受日光以人所見爲有盈虧然否曰日月一也豈有日高於月之理月若無盈虧何以成歲葢月一分光則是魄虧一分也釋交食法亦有理霜與露不同霜金氣星月之氣露亦星月之氣看感得甚氣卽爲露甚氣卽爲霜如言露結爲霜非也釋無星月時亦有露有星月時亦無霜雹是隂陽相搏之氣乃是沴氣聖人在上無雹雖不爲災沴氣自在釋雹者雨包也故災問作文害道否曰害也凡爲文不專意則不工若專意則志局於此又安能與天地同其大也書云玩物䘮志爲文亦玩物也呂與叔有詩云學如元凱方成癖文似相如殆類俳獨立孔門無一事只輸一作惟傳顏氏得心齋此詩甚好古之學者惟務養性情其他則不學今爲文者專務章句悅人耳目旣務悅人非俳優而何曰古者學爲文否曰人見六經便以爲聖人亦作文不知聖人亦一作只攄發胷中所蘊自成文耳一作章所謂有德者必有言也曰游夏稱文學何也曰游夏亦何嘗秉筆學爲詞章也且如觀乎天文以察時變觀乎人文以化成天下此豈詞章之文也釋此專爲辭章者說若言不脩說理亦不明或問詩可學否曰旣學時須是用功方合詩人格旣用功甚妨事古人詩云吟成五箇字用破一生心又謂可惜一生心用在五字上此言甚當先生嘗說王子眞曽寄藥來某無以答他某素不作詩亦非是禁止不作但不欲爲此閑言語且如今言能詩無如杜甫如云穿花蛺蝶深深見㸃水蜻蜓欵欵飛如此閑言語道出做甚某所以不常作詩今寄謝王子眞詩云至誠通化藥通神遠寄衰翁濟病身我亦有丹君信否用時還解壽斯民子眞所學只是獨善雖至誠潔行然大抵只是爲長生乆視之術止濟一身因有是句釋如國風雅頌意豈可無問先生曽定六禮今已成未曰舊日作此已及七分後來被召入朝旣在朝廷則當行之朝廷不當爲私書旣而遭憂又疾病數年今始無事更一二年可成也曰聞有五經解己成否曰惟易須親撰諸經則關中諸公分去以某說撰成之禮之名數陜西諸公刪定已送與呂與叔今死矣不知其書安在也然所定只禮之名數若禮之文亦非親作不可也禮記之文亦刪定未了葢其中有聖人格言亦有俗儒乖謬之說本不能混格言只爲學者不能辨别如珠玉之在泥沙泥沙豈能混珠玉只爲無人識則不知孰爲泥沙孰爲珠玉也聖人文章自深與學爲文者不同如繋辭之文後人决學不得譬之化工生物且如生出一枝花或有剪裁爲之者或有繪畫爲之者有時雖似相類然終不若化工所生自有一般生意釋文亦在有得後爲之乎冠婚䘮祭禮之大者今人都不以爲事某舊嘗修六禮冠婚䘮祭鄉相見將就後被召遂罷今更一二年可成家間多戀河北舊俗未能遽更易然大率漸使知義理一二年書成可皆如法禮從宜事從俗有大故害義理者須當去古者天子諸侯於孟月者爲首時也時祭之外更有三祭冬至祭始祖厥初生民之祖立春祭先祖季秋祭禰他則不祭冬至陽之始也立春者生物之始一作初也季秋者成物之始一作時也祭始祖無主用祝以妣配於廟中正位事之祭只一位者夫婦同享也祭先祖亦無主先祖者自始祖而下高祖而上非一人也故設二位祖妣異位一云二位異所者舅婦不同享也嘗祭止於高祖而下自父而推至於三而止者縁人情也旁親有後者自爲祭無後者祭之别位爲叔伯父之後也如殤亦各祭凡配止以正妻一人如諸侯用元妃是也或奉祀之人是再娶所生者卽以所生母配如葬亦惟元妃同穴後世或再娶皆同穴而葬甚凟禮經但於左右附葬可也忌日必遷主出祭於正寢今正寢正堂也葢廟中尊者所據又同室難以獨享也於正寢可以盡思慕之意家必有廟古者庶人祭於寢士大夫祭於廟庶人無廟可以影堂廟中異位祖居中左右以昭穆次序皆夫婦自祖配爲位舅姑不同坐也廟必有主既祧埋於所葬處如奉祀人之高祖而上旣當祧也其大略如此且如豺􅆩皆知報本今士大夫家多忽此厚於奉養而薄於祖先甚不可也凡事死之理當厚於奉生者至於嘗新必薦享後方可薦數則凟必因告朔而薦乃合宜人家能存得此等事數件雖㓜者漸可使知禮義凡物知母而不知父走獸是也知父而不知祖飛鳥是也惟人則能知祖若不嚴於祭祀殆與鳥獸無異矣釋此可通行於天下於情禮皆得也問祭酒用幾奠曰家中尋常用三奠祭法中却用九奠以禮有九獻樂有九奏也又問旣奠之酒何以置之曰古者灌以降神故以茅縮酌謂求神於隂陽有無之間故酒必灌於地若謂奠酒則安置在此今人以澆在地上甚非也旣獻則徹去可也傾在他器地釋若墓祭灌酒於亦可或問今拜掃之禮何據曰此禮古無但緣習俗然不害義理古人直是誠質專一也葬只是藏體魄而神則必歸於廟旣葬則設木主旣除几筵則木主安於廟故古人惟專精祀於廟今亦用拜掃之禮但簡於四時之祭也釋古有祭祊而况於墓乎今人多不知兄弟之愛且如閭閻小人得一食必先以食父母夫何故以父母之口重於己之口也得一衣必先以衣父母夫何故以父母之體重於己之體也至於犬馬亦然待父母之犬馬必異乎已之犬馬也獨愛父母之子却輕於己之子甚者至若讐敵舉世皆如此惑之甚矣釋小人利切身家則愈爭問士未仕而昏用命服禮乎曰昏姻重禮重其禮者當盛其服况古亦有是士乘墨車之類今律亦許假借曰無此服而服之亦僞曰不然今之命服乃古之下士之服古者有其德則仕士未仕者也服之其宜也若農商則不可非其類也或曰不必用可否曰不得不可以爲悅今得用而用之何害過期非也釋從時與宜耳問臣拜君必於堂下子拜父母如之何對曰君臣以義合有貴賤故拜於堂下父子主恩有尊卑無貴賤故拜於堂上若婦於舅姑亦是義合有貴賤故拜於堂下禮也釋恩義别親踈問人子事親學醫如何曰最是大事今有璞玉於此必使玉人彫琢之葢百工之事不可使一人兼之故使玉人彫琢之也若更有珍寳物須是自看却必不肯任其自爲也今人視父母疾乃一任醫者之手豈不害事必須識醫藥之道理别病是如何藥當如何顧可任醫者耶或曰己未能盡醫者之術或偏見不到適足害事柰何曰且如識圖畫人未必畫得如畫工然也却識别得工拙如自已曽學令醫者說道理便自見得或己有所見亦可說與他商量陳本止此以下八段别本所増釋學者治心之外此事要急二程子抄釋卷四
