body:
  text: 二程子抄釋卷一明呂柟編李籲傳第一伯淳先生嘗語韓持國曰如說妄說幻為不好底性則請别尋一箇好底性來換了此不好底性著道即性也若道外尋性性外尋道便不是聖賢論天德蓋謂自家元是天然完全自足之物若無所汚壞即當直而行之若小有汚壞即敬以治之使復如舊所以能使如舊者蓋為自家本質元是完足之物若合修治而修治之是義也若不消修治而不修治亦是義也故常簡易明白而易行禪學者總是强生事至如山河大地之說是他山河大地又干你何事至如孔子道如日星之明猶患門人未能盡曉故曰豫欲無言如顔子則便默識其他未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉可謂明白矣若能於此言上看得破便信是㑹襌也非是未尋得蓋實是無去處說此理本無二故也釋於此見人性之善與天同大故孔子之道欲以不言而見佛氏之幻妄則以山河大地為見病也王彥霖以為人之為善須是他自肯為時方有所得亦難强曰此言雖是人須是自為善然又不可為如此却都不管他蓋有教焉修道之謂教豈可不修釋雖中人之資有被明師指引而成者矣雖上智之資有被燕友蠱惑而廢者矣蘇季明嘗以治經為傳道居業之實居常講習只是空言無益質之兩先生伯淳先生曰修辭立其誠不可不仔細理㑹言能修省言辭便是要立誠若只是修飾言辭為心只是為僞也若修其言辭正為立己之誠意乃是體當自家敬以直內義以方外之實事道之浩浩何處下手惟立誠才一作方有可居之處有可居之處則可以修業也終日乾乾大事大事却只是忠信所以進德為實下手處修辭立其誠為實修業處正叔先生曰治經實學也譬諸草木區以别矣道之在經大小逺近高下精粗森列於其中譬諸日月在上有人不見者一人指之不如衆人指之自見也如中庸一卷書自至理便推之於事如國家有九經及歷代聖人之迹莫非實學也如登九層之臺自下而上者為是人患居常講貫空言無實者蓋不自得也為學治經最好茍不自得則盡治五經亦是空言今有人心得識達所得多矣有雖好讀書却患在空虛者未免此弊釋伯淳謂講習以誠體經非空言也正叔謂治經而不自得亦空言也天地生一世人自足了一世事但恨人不能盡用天下之才此其不能大治釋無一個臣也佛學一作氏只是以生死恐動人可怪二千年來無一人覺此是被他恐動也聖賢以生死為本分事無可懼故不論死生佛之學為怕死生故只管說不休下俗之人固多懼易以利動至如禪學者雖自曰異此然要之只是此箇意見皆利心也籲曰此學不知是本來以公心求之後有此弊或本只以利心上得之曰本是利心上得來故學者亦以利心信之莊生云不恆者意亦如此也如楊墨之害在今世則已無之如道家之說其害終小惟佛學今則人人談之瀰漫滔天其害無涯舊嘗問學佛者傳燈録幾人云千七百人某曰敢道此千七百人無一人達者果有一人見得聖人朝聞道夕死可矣與曽子易簀之理臨死須尋一尺布帛褁頭而死必不肯削髮胡服而終是誠無一箇達者禪者曰此迹也何不論其心曰心迹一也豈有迹非而心是者也正如兩腳方行指其心曰我本不欲行他兩腳自行豈有此理蓋上下本末內外都是一理也方是道莊子曰遊方之外者方何嘗有內外如此則是道有隔斷內面是一處外面又别是一處豈有此理學禪者曰草木鳥獸之生亦皆是幻曰子以為生息於春夏及至秋冬便却變壞便以為幻故亦以人生為幻何不付與他物生死成壞自有此理何者為幻釋此知天立命之意也佛氏不知天安能立命先王之世以道治天下後世只是以法把持天下釋用法只是有政者喜合己之人忠信所以進德終日乾乾君子當終日對越在天也蓋上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教孟子於其中又發揮出浩然之氣可謂盡矣一作性故說神如在其上如在其左右大小之事而只曰誠之不可掩如此夫徹上徹下不過如此形而上為道形而下為器須著如此說器亦道道亦器但得道不繫今與後己與人釋此君子所以自强不息以造至誠也富貴驕人固不善學問驕人害亦不細釋驕人非真學問也若不能存養只是說話釋此非欲其自得之也聖賢千言萬語只是欲人將己放之心約之使反復入身來自能尋向上去下學而上達也釋真知死生榮辱禍福貴賤之有定則心不外馳矣先生嘗語王介甫曰公之談道正如說十三級塔上相輪對望而談曰相輪者如此如此極是分明如某則戅直不能如此直入塔中上尋相輪辛勤登攀邐迤而上直至十三級時雖猶未見相輪能如公之言然某却實在塔中去相輪漸近要之須可以至也至相輪中坐時依舊見公對塔談說此相輪如此如此介甫只是說道云我知有箇道如此如此只他說道時己與道離他不知道只說道時便不是道也有道者亦一作言自分明只作尋常本分事說了孟子言堯舜性之舜由仁義行豈不是尋常說話至於易只道箇立人之道曰仁與義則知性字由字也不消道自已分明隂陽剛柔仁義只是此一箇道理釋相輪言厲不聞介甫有怒豈惟見有道者氣象足服其心而舜由仁義易立仁義之說言約理明實可折其私也嘉禮不野合野合則秕稗也故生不野合則死不墓祭蓋燕饗祭祀乃宮室中事後世習俗廢禮有踏青藉草飲食故墓亦有祭如禮望墓為壇井墓人為墓祭之尸亦有時為之非經禮也後世在上者未能制禮則隨俗未免墓祭既有墓祭則祠堂之類亦且為之可也釋此亦緣情而起之義也家祭凡拜皆當以兩拜為禮今人事生以四拜為再拜之禮者蓋中間有問安之事故也事死如事生誠意則當如是至如死而問安却是瀆神若祭祀有告謝神等事則自當有四拜六拜之禮釋此須從時制可也凡人家法須令每有族人逺來則為一㑹以合族雖無事亦當每月一為之古人有花樹韋家宗㑹法可取也然族人每有吉凶嫁娶之類更須相與為禮使骨肉之意常相通骨肉日疏者只為不相見情不相接爾釋此孝子順孫尊祖敬宗之志也籲問每常遇事即能知操存之意無事時如何存養得熟曰古之人耳之於樂目之於禮左右起居盤盂几杖有銘有戒動息皆有所養今皆廢此獨有理義之養心耳但存此涵養意久則自熟矣敬以直內是涵養意言不莊不敬則鄙詐之心生矣貌不莊不敬則怠慢之心生矣釋此君子之所以戒懼不覩不聞也漢儒如毛萇董仲舒最得聖賢之意然見道不甚分明下此即至楊雄規模狹道即性也言性已錯更何所得釋董仲舒似分明矣然仲舒遇驕王而化毛萇遇獻王而行楊雄當王莾而仕其說性若不錯亦難與毛董倫也漢策賢良猶是人舉之如公孫𢎞者猶强起之乃就對至如後世賢良乃自求舉耳若果有曰我心只望廷對欲直言天下事則亦可尚矣若心在富貴則得志便驕縱失志則放曠與悲愁而已釋此恥惡衣惡食夫子不與議也有人勞正叔先生曰先生謹於禮四五十年應甚勞苦先生曰吾日履安地何勞苦他人日踐危地此乃勞苦也釋君子不安於縱猶小人不安於禮蓋皆習與性成也憂子弟之輕俊者教以經學念書不得令作文字釋經學念書則輕俊者日威重解作文字便長傲飄蕩矣子弟凡百玩好皆奪志至於書札於儒者最近然一向好著亦自喪志如王虞顔柳輩誠為好人則有之曽見有善書者知道否平生精力一用於此非惟徒廢時日於道便有妨處足知喪志也釋子弟初有識若知先立乎其大則其後他好難換矣伯淳近與吳師禮談介甫之學錯處謂師禮曰為我盡達諸介甫我亦未敢自以為是如有說願往復此天下公理無彼我果能明辨不有益於介甫則必有益於我釋就與師禮之言亦可以化介甫之自是然而不化真下愚也籲言趙澤嘗云臨政事不合著心惟恕上合著心是否曰彼謂著心勉而行恕則可謂著心求恕則不可蓋恕自有之理舉斯心加諸彼而已不待求而後得然此人之論有心為恕終必恕矣釋臨政事亦有不宜用恕處持國曰道家有三住心心住則氣住氣住則神住此所謂存三守一伯淳先生曰此三者人終食之頃未有不離者其要只在收放心釋既收放心則神氣自在非謂住之以延年也持國常患在下者多欺伯淳先生曰欺有三有為利而欺則固可罪有畏罪而欺者在所恕事有類欺者在所察釋此三欺之處臨政之方也人於外物奉身者事事要好只有自家一箇身與心却不要好茍得外面物好時却不知道自家身與心却已先不好了也釋此不願文繡膏粱之意也必須實見得人患乎懾怯者蓋氣不充不素養故也釋只在集義忿􅓰怒也治怒為難治懼亦難克己可以治怒明理可以治懼明釋理茍明已亦可克呂大臨東見録第二居處恭執事敬與人忠此是徹上徹下語聖人元無二語正釋作則為學者熟則為聖人志道懇切固是誠意若迫切不中理則反為不誠蓋實理中自有緩急不容如是之迫觀天地之化乃可知正釋迫切猶是有為人意教人之術若童牛之牿當其未能觸時己先制之善之大者其次則豶豕之牙豕之有牙既已難制以百方制之終不能使之改惟豶其勢則性自調伏雖有牙亦不能為害如有不率教之人却須置其檟楚别以道格其心則不須檟楚將自化矣釋近其正路則邪徑自不肯由開其可美則可耻自不肯為事君須體納約自牖之意人君有過以理開諭之既不肯聽雖當救止於此終不能回却須求人君開納處進說牖乃開明處如漢祖欲廢太子叔孫通言嫡庶根本彼皆知之既不肯聽矣縱使能言無以易此惟張良知四皓素為漢祖所敬之人使事太子漢祖知人心歸太子乃無廢立意及左師觸讋事亦相類釋仁之至者智必周天下善惡皆天理謂之惡者非本惡但或過或不及便如此如楊墨之類學者須敬守此心不可急迫當栽培深厚涵泳於其間然後可以自得但急迫求之只是私己終不足以達道釋栽培不深厚只是不為己也訂頑一篇意極完偹乃仁之體也學者其體此意令有諸己其地位已高到此地位自别有見處不可窮高極遠恐於道無補也明釋人若見得訂頑正如醉而醒後景象醫書言手足痿痺為不仁此言最善名狀仁者以天地萬物為一體莫非己也認得為已何所不至若不有諸已自不與己相干如手足不仁氣己不貫皆不屬己故博施濟衆乃聖人之功用仁至難言故止曰己欲立而立人已欲達而達人能近取譬可謂仁之方也己欲令如是觀仁可以得仁之體明釋此言可玩堯舜之心是故親而嚚訟不欲登庸踈而頑讒則欲並生也嘗喻以心知天猶居京師往長安但知出西門便可到長安此猶是言作兩處若要誠實只在京師便是到長安更不可别求長安只心便是天盡之便知性知性便知天一作性便是天當處便認取更不可外求釋此之謂易簡窮理盡性以至於命三事一時並了元無次序不可將窮理作知之事若窮得理即性命亦可了釋此知行並進之㫖故不行即不知若曰先知而後行等到幾時行也則其知殆後世博洽之類矣學者識得仁體實有諸己只要義理栽培如求經義皆栽培之意釋親正人亦是昔受學於周茂叔每令尋顔子仲尼樂處所樂何事釋要見孔顔所樂只看常人所憂真知與常知異常見一田夫曽被虎傷有人說虎傷人衆莫驚獨田夫色動畏於衆若虎能傷人雖三尺童子莫不知之然未嘗真知真知須如田夫乃是故人知不善而猶為不善是亦未嘗真知若真知决不為矣釋格物者至於物也嘗言鄭戬作縣定民陳氏為里正既暮有姓陳人乞分居戬立笞之曰安有朝定里正而夕乞分居既而察之乞分居者非定里正也今夫赤子未能言其志意嗜欲人所未知其母必不能知之然不至誤認其意者何也誠心愛敬而已若使愛敬其民如其赤子何錯繆之有故心誠求之雖不中不遠矣釋鄭戩知求義而不知求仁欲知得與不得於心氣上驗之思慮有得中心悅豫沛然有裕者實得也思慮有得心氣勞耗者實未得也强揣度耳嘗有人言比因學道思慮心虛曰人之血氣固有虛實疾病之來聖賢所不免然未聞自古聖賢因學而致心疾者釋勞耗之病猶有牽係學者須先識仁仁者渾然與物同體義禮知信皆仁也識得此理以誠敬存之而已不須防檢不須窮索若心懈則有防心茍不懈何防之有理有未得故須窮索存久自明安待窮索此道與物無對大不足以名之天地之用皆我之用孟子言萬物皆備於我須反身而誠乃為大樂若反身未誠則猶是二物有對以己合彼終未有之一本下更有未有之三字又安得樂訂頑意思乃備言此體以此意存之更有何事必有事焉而勿正心勿忘勿助長未嘗致纎毫之力此其存之之道若存得便合有得蓋良知良能元不喪失以昔日習心未除却須存習此心久則可必奪舊習此理至約惟患不能守既能體之而樂亦不患不能守也釋學者課燕識此當日就到顔子欲罷不能之境昔見稱介甫之學對曰王安石之學不是王愕然問曰何故對曰臣不敢遠引止以近事明之臣嘗讀詩言周公之德云公孫碩膚赤舄几几周公盛德形容如是之盛如王安石其身猶不能自治何足以及此明一本此云又嘗稱介甫皓對曰王安石博學多文斯其有之守約則未也釋安石只是博辨驚動主上其實非真博學也使有人只以當時事問之彼便不知手足無措聖人即天地也天地中何物不有天地豈嘗有心揀别善惡一切涵容覆載但處之有道若善者親之不善者遠也則物不與者多矣安得為天地故聖人之志止欲老者安之朋友信之少者懷之釋學到無私處始可語此初學而然易喪所守胡安定在湖州置治道齊學者有欲明治道者講之於中如治兵治民水利算數之類嘗言劉彛善治水利後果為政皆興水利有功釋此必先有本以主之始可大學乃孔氏遺書須從此學則不差明釋學到能平天下出不過誠意居今之時不安今之法非義也若論為治不為則已如復為之須於今之法度內處得其當方為合義若須更改而後為則何義之有釋此中有夏時殷輅周冕韶舞意克己則私心去自然能復禮雖不學文而禮意已得明釋人只有一箇己私既克矣便與天相似文在其中矣今之監司多不與州縣一體監司專欲伺察州縣專欲掩蔽不若推誠心與之共治有所不逮可教者教之可督者督之至於不聽擇其甚者去一二使足以警衆可也釋必實有為國為民之心始能如此此事在君相鼓舞之耳孟子才高學之無可依據學者當學顔子入聖人為近有用力處明釋收放心及集義亦可據談經論道則有之少有及治體者如有用我者正心以正身正身以正家正家以正朝廷百官至于天下此其序也其間則又繫用之淺深臨時裁酌而應之難執一意釋若不及治體亦非談經論道者也經道又有權凡立言欲涵蓄意思不使知德者厭無德者惑釋此便見是有德者之言且省外事但明乎善惟進誠心其文章雖不中不遠所守不約泛濫無功明釋此修身知本之說學者須學文知道者進德而已有德則不習無不利未有學養子而後嫁蓋先得是道矣學文之功學得一事是一事二事是二事觸類至于百千至於無窮盡亦只是學不是德有德者不如是此言可為知道者言不可為學者言如心得之則施於四體四體不言而喻譬如學書若未得者須心手相應而學茍得矣下筆便能書不必積學釋存乎默識不言而信有有德之言有造道之言有述事之言有德者正言己分事造道之言顔子言孔子孟子言堯舜止是造道之深所見如是釋言心聲也所見所期不可不遠且大然行之亦須量力有漸志大心勞力小任重恐終敗事釋量力有漸從克己處作某接人多矣不雜者三人張子厚邵堯夫司馬君實釋皆取其誠也致知在格物格至也窮理而至於物則物理盡釋此亦用心苦而力行切乎正叔言不當以體㑹為非心以故有心小性大之說聖人之心與天一有地字為一安得有二至于不勉而中不思而得莫不在此此心即與天地無異不可小于他不可一作若或將心滯在知識上故反以心為小時本注云橫渠云心禦見聞不𢎞於性體釋體即心也能㑹即心大矣行禮不可全泥古須視當時之風氣自不同故所處不得不與古異如今人面貌自與古人不同若全用古物亦不相稱雖聖人作須有損益釋此便是一貫之道伯淳言學者須守下學上達之語乃學之要釋下學處便是上達更别無上也嫂叔無服先王之權後聖有作雖復制服可矣釋嫂叔無服是踈兄弟也師不立服不可立也當以情之厚薄事之大小處之如顔閔於孔子雖斬衰三年可也其成己之功與君父並其次各有淺深稱其情而已下至曲藝莫不有師豈可一概制服釋此以恩義斷也子厚以禮教學者最善使學者先有所據守釋禮行處敬自生朋友講習更莫如相觀而善工夫多釋此以友輔仁之義君實常患思慮紛亂有時中夜而作達旦不寐可謂良自苦人都來多少血氣若此則幾何而不摧殘以盡也其後告人曰近得一術常以中為念則又是為中所亂中又何形如何念得他只是於名言之中揀得一箇好字與其為中所亂却不如與一串數珠及與他數珠他又不受殊不知中之無益於治心不如數珠之愈也夜以安身睡則合眼不知苦苦思量箇甚只是不與心為主三更常有人喚也諸本無此八字之釋此知止而後有定意學者於釋氏之說直須如淫聲美色以遠之不爾則駸駸然入於其中矣顔淵問為邦孔子既告之以五帝三王之事而復戒以放鄭聲遠佞人曰鄭聲淫佞人殆彼佞人是他一邊佞耳然而於己則危只是能使人移故危也至於禹之言曰何畏乎巧言令色巧言令色直消言畏只是須著如此戒愼猶恐不免釋氏之學更不消言常戒到自家自信後便不能亂得釋心無所定見者易惑以書傳道與口相傳煞不相干見而言因事發明則並意思一時傳了書雖言多其實不盡釋此經師不及人師之意觀秦中氣焰衰邊事所困纍歲不稔昨來餽邊喪亡今日事未可知大有可憂者以至士人相繼淪喪為足粧㸃關中者則遂化去吁可怪也凡言王氣者實有此理生一物須有此氣不論美惡須有許大氣焰故生是人至闕里有許多氣焰故此道之流以至今日昔橫渠說出此道理至此幾乎衰矣只介甫一箇氣焰大小夫伯淳嘗與子厚在興國寺曽講論終日而曰不知舊日曽有甚人於此處講此事釋此聖賢之生將亦氣化乎伯淳自謂只得他人待做惡人敬而遠之嘗有一朝士久不見謂伯淳曰以伯淳如此聰明因何許多時終不肯回頭來伯淳答以蓋恐回頭後錯也釋回頭後錯者便陷流俗也今語道則須待要寂滅湛靜形便如槁木心便如死灰豈有直做墻壁木石而謂之道所貴乎智周天地萬物而不遺又幾時要如死灰所貴乎動容周旋中禮又幾時要如槁木論心術無如孟子也只謂必有事焉一本有而勿正心字今既如槁木死灰則却於何處有事釋若無所事便曰是失心人君實之能忠孝誠實只是天資學則元不知學堯夫之坦夷無思慮紛擾之患亦只是天資自美爾皆非學之功也釋謂君實堯夫非學恐大過但學非聖人耳持國嘗論克已復禮以謂克却不是道伯淳言克便是克之道持國又言道則不須克伯淳言道則不消克却不是持國事在聖人則無事可克今日持國須克得已便然後復禮釋一日克己復禮顔子也日日克己以求復禮韓持國也游酢楊時是學得靈利高才也楊時於新學極精今日一有所問能盡知其短而持之介甫之學大抵支離伯淳嘗與楊時讀了數篇其後盡能推類以通之釋學不先立乎其大者終有差也新政之改亦是吾黨爭之有大過成就今日之事塗炭天下亦須兩分其罪可也當時天下岌岌乎殆哉介甫欲去數矣其時介甫直以數事上前卜去就若青苗之議不行則决去伯淳於上前與孫莘老同得上意要了當此事大抵上意不欲抑介甫要得人擔當了而介甫之意尚亦無必伯淳嘗言管仲猶能言出令當如流水以順人心今參政須要做順人心事何故介甫之意只恐始為人所沮其後行不得伯淳却道但做順人心事人誰不願從也介甫道此則感賢誠意却為天祺其日於中書大悖緣是介甫大怒遂以死力爭於上前上為之一以聽用從此黨分矣莘老受約束而不肯行遂坐貶而伯淳遂待罪既而除以京西提刑伯淳復求對遂見上上言有甚文字伯淳云今咫尺天顔尚不能少回天意文字更復何用欲去而上問者數四伯淳每以陛下不宜輕用兵為言朝廷群臣無能任陛下事者以今日之患觀之猶是自家不善從容至如青苗且放過又且何妨伯淳當言職苦不曽使文字大綱只是於上前說了其他些小文字只是偹禮而已大抵自仁祖朝優容諌臣當言職者必以詆訐而去為賢習以成風惟恐人言不稱職以去為落便宜昨來諸君蓋未免此茍如是為則是為己尚有私意在却不在朝廷不干事理釋伯淳論介甫事可以觀仁智矣今日朝廷所以特惡忌伯淳者以其可理會事只是理㑹學這裏動則於他輩是所不便也故特惡之深釋此謂一薛居州也以吾自處猶是自家當初學未至意未誠其德尚薄無以感動他天意此自思則如此然據今日許大氣焰當時欲一二人動之誠如河濱之人捧土以塞孟津復可笑也據當時事勢又至於今日豈不是命釋小人能亂人國家亦天意乎人能放這一箇身公共放在天地萬物中一般看則有甚妨礙雖萬身曽何傷乃知釋氏苦根塵者皆是自私者也釋孔氏無我佛氏有我故其道不相為謀要修持他這天理則在德須有不言而信者言難為形狀養之則須直不愧屋漏與愼獨這是箇持養底氣象也釋不言而信雖鬼神可通况於人乎養心者且須是教他寡欲又差有功釋理欲不並立此少則彼多大凡利害禍福亦須致命須得致之為言直如人以力自致之謂也得之不得命固己定君子須知他命方得不知命無以為君子蓋命茍不知無所不至故君子於困窮之時須致命便遂得志其得禍得福皆已自致只要申其志而已釋志立處便是命也堯夫豪傑之士根本不帖帖地伯淳嘗戲以亂世之姦雄中道學之有所得者然無禮不恭極甚又嘗戒以不仁己猶不認以為人不曽來學伯淳言堯夫自是悠悠釋堯夫狂也須是大其心使開闢譬如為九層之臺須大做腳須得釋人須思如何能大其心方得元亨者只是始而亨者也此通人物而言謂始初發生大概一例亨通也及到利貞便是各正性命後屬人而言也利貞者分在性與情只性為本情是性之動處情又幾時惡故者以利為本只是順利處為性若情則須是正也釋性情一理識情者識性識性者識情醫家以不認痛癢謂之不仁人以不知覺不認義理為不仁譬最近釋醫言不仁其氣血滯人言不仁其心死橫渠教人本只是謂世學膠固故說一箇清虛一大只圖得人稍損得沒去就道理來而人又更别處走今日且只道敬釋敬則清虛自存聖人之德行固不可得而名狀若顔子底一箇氣象吾曹亦心知之欲學聖人且須學顔子釋顔子是學孔子的樣子今學者敬而不見得又不安者只是心生亦是太以敬來做事得重此恭而無禮則勞也恭者私為恭之恭也禮者非體之禮是自然底道理也只恭而不為自然底道理故不自在也須是恭而安今容貌必端言語必正者非是道獨善其身要人道如何只是天理合如此本無私意只是箇循理而已釋安在定靜之後公琰昨在洛有書室兩旁各一牖牖各三十六隔一書天道之要一書仁義之道中以一榜書毋不敬思無邪中處之此意亦好釋此亦是分天人為二又分已為三也人多言天地外不知天地如何說內外外面畢竟是箇甚若言著外則須似有箇規模釋惟無我者能知無外學者用了許多工夫下頭須落道了是入異教只為自家這下元未曽得箇安泊處那下說得成熟世人所惑者鬼神轉化他總有說又費力說道理又打入箇無底之壑故一生出不得今日須是自家這下照得理分明則不走作形而下形而上者亦須更分明須得雖則心有默識有難名狀處然須說盡心知性知天亦須於此留意釋學至知天則不惑孟子論王道便實徒善不足為政徒法不能自行便先從養生日說將去既庶既富然後以飽食暖衣而無教為不可故教之也孟子而後却只有原道一篇其間語固多病然要之大意儘近理若西銘明是原道之祖宗也原道却只說到道元未到得西銘意思據子厚之文醇然無出此文也自孟子後蓋未見此書釋西銘之意教在養中聖君賢相之業也聖人之教以所貴率人釋氏以所賤率人初本無此十六字卷末注云又學佛者難吾言章一本首有云下同餘見昨日之㑹章學佛者難吾言謂人皆可以為堯舜則無僕𨽻正叔言人皆可以為堯舜聖人所願也其不為堯舜是所自賤也故以為僕𨽻釋雖僕𨽻亦有堯舜之道小德川流也游酢楊時先知學禪已知向裏沒安泊處故來此却恐丕變也暢大隱許多時學乃方學禪是於此蓋未有所得也呂進伯可愛老而好學理㑹直是到底天祺自然有德氣似箇貴人氣象只是却有氣短處規規太以事為重傷於周至却是氣局小景庸則只是敏須是天祺與景庸相濟乃為得中也釋切磋琢磨之意故君子無友則佩弦韋人之於患難只有一箇處置盡人謀之後却須泰然處之有人遇一事則心心念念不肯捨畢竟何益若不會處置了放下便是無義無命也釋義命是處伯淳言西銘其得此意只是須得他子厚有如此筆力他人無緣做得孟子已後未有人及此得此文字省多少言語且教他人讀書要之仁孝之理偹於此須臾而不於此則便不仁不孝也釋西銘是大心之方詩前序必是當時人所傳國史明乎得失之迹者是也不得此則何緣知得此篇是甚意思大序則是仲尼所作其餘則未必然要之皆得大意只是後之觀詩者亦添入釋由是知小序不可改也堯與舜更無優劣及至湯武便别孟子言性之反之自古無人如此說只孟子分别出來便知堯舜是生而知之湯武是學而能之文王之德則似堯舜禹之德則似湯武要之皆是聖人釋孟子幾乎聖矣今志於義理而心不安樂者何也此則正是剩一箇助之長雖則心操之則存舍之則亡然而持之太甚便是必有事焉而正之也亦須且恁去如此者只是德孤德不孤必有鄰到德盛後自無窒礙左右逢其原也釋此猶有牽引處得此義理在此甚事不盡更有甚事出得視世之功名事業甚譬如間視之仁義者甚煦煦孑孑如匹夫匹婦之為諒也自是天來大事處以此理又曽何足論若得這箇義理便有進處若不得則何緣仰高鑽堅在前在後也竭吾才則又見其卓爾釋天下惟義理耳德者得也須是實到這裏才得釋要在默識不言而信耳人於天理昏者是只為嗜欲亂著他莊子言其嗜欲深者其天機淺此言却最是釋理欲不並立今天下之士人在朝者又不能言退者遂亡之又不肯言此非朝廷吉祥雖未見從又不曽有大橫見加便豈可自絶也君臣父子也父子之義不可絶豈有身為侍從尚食其祿視其危亡曽不論列君臣之義固如是乎釋此豈惟是義亦是仁所務於窮理非道須盡窮了天下萬物之理又不道是窮得一理到只是要積纍多後自然見去釋此亦存久自熟之意當春秋戰國之際天下小國介於大國奔命不暇然足以自維持數百年此勢却似稻塍各有界分約束後世遂有土崩之勢道壞便一時壞陳涉一叛天下遂不支吾今日堂堂天下只四方一敗朝廷遂震何也蓋天下之勢正如稻塍各有限隔則卒不能壞今天下却是一箇萬頃波要起卒起不得及一起則洶湧遂奈何不得以祖宗德澤仁厚涵養百餘年間一時柔了人心雖有豪傑無箇端倪起得便只要安靜不宜使搖動雖夷狄亦散兵却鬬特一本無特字此中國之福也一本此字下有非字釋封建郡縣要在得人耳不愧屋漏便是爽特氣象釋勤亦愼也孔孟之分只是要别箇聖人賢人如孟子若為孔子事業則儘做得只是難似聖人譬如剪綵以為花花則無不似處只是無他造化功綏斯來動斯和此是不可及處釋孔孟之所以分亦其學力乎和叔常言及相見則不復有疑既相别則不能無疑然亦未知果能終不疑不知他既已不疑而終復有疑何故伯淳言何不問他疑甚不如劇論釋疑即是心不定也和叔任道擔當其風力甚徑然深潜縝密有所不逮於與叔蔡州謝良佐雖時學中因議州舉學試得失便不復計較建州游酢非昔日之游酢也固是頴然資質溫厚南劒州楊時雖不逮酢然煞頴悟林大節雖差魯然所問便能躬行劉質夫久於其事自小來便在此李端伯相聚雖不久未見他操履然才識頴悟自是不能已也釋於數子獨許與叔介甫當初只是要行己志恐天下有異同故只去上心上把得定他人不能搖以是拒絶言路進用柔佞之人使之奉行新法今則是他已去不知今日却留下害事釋才要行己志便是私才私便害事新進游楊輩數人入太學不惟議論須異且動作亦必異故為學中以異類待之又皆學春秋愈駭俗矣釋拔乎流俗亦有見矣堯夫詩雪月風花未品題他便把這些事便與堯舜三代一般此等語自孟子後無人曽敢如此言來直是無端又如言文字呈上堯夫皆不恭之甚須信畫前元有易自從删後更無詩這箇意思古元未有人道來釋堯夫近乎生知語多精行已須行誠盡處正叔謂意則善矣然言誠盡則誠之為道非能盡也堯夫戲謂且就平側釋此堯夫微諷正叔之泥耳司馬子微嘗作坐忘論是所謂坐馳也微一作綦忘釋心不在則伯淳昔在長安倉中間坐後見長廊柱以意數之已尚不疑再數之不合不免令人一一聲言而數之乃與初數者無差則知越著心把捉越不定釋用意太過反差呂與叔以氣不足而養之此猶只是自養求無疾如道家修養亦何傷若須要存想飛升此則不可釋氣不足而不自養是自賊也徐禧奴才也善兵者有二萬人未必死彼雖十萬人亦未必能勝二萬人古者以少擊衆而取勝者多蓋兵多亦不足恃昔者袁紹以十萬阻官渡而曹操只以萬卒取之王莾百萬之衆而光武昆陽之衆有八千仍有在城者然則只是數千人取之苻堅下淮百萬而謝𤣥才二萬人一麾而亂以此觀之兵衆則易老適足以資敵人一敗不支則自相揉踐至如聞風聲鶴唳皆以為普軍之至則是自相殘也譬之一人軀幹極大一人輕捷兩人相當則擁腫者遲鈍為輕捷者出入左右之則必困矣自古師旅勝敗不能無之然今日邊事至號疏曠前古未之聞也其源在不任將帥不愼任人閫外之事將軍處之一一中覆皆受廟算上下相徇安得不如此元豐元年永洛城事釋用兵惟在得士心楊定鬼神之說只是道人心有感通如有人平生不識一字一日病作却念得一部杜甫詩却有此事天地間事只是一箇有一箇無既有即有無即無如杜甫詩者是世界上實有杜甫詩故人之心病及至精一有箇道理自相感通以至人心在此託夢在彼亦有是理只是心之感通也死者託夢亦容有此理有人過江其妻墮水意其為必死矣故過金山寺為作佛事方追薦次忽其婢子通傳墮水之妻意度在某處作甚事是誠死也及三二日有漁人撑舟以其妻還之乃未嘗死蓋旋於急流中救活之然則其婢子之通傳是何也亦是心相感通既說有感通更說甚生死古今之别釋理起處即心動動即理應天祺自然有德氣望之有貴人之象只是氣局小太規規於事為重也昔在司竹常愛用一卒長及將代自見其人盜筍皮遂治之無少貸罪己正待之復如初略不介意觀其德量如此釋天祺亦其認理而行者乎正叔謂子厚越獄以謂卿監以上不追攝之者以其貴朝廷有㫖追攝可也又請枷項非也不已太辱矣貴貴以其於近君子厚謂若終不伏則將奈何正叔謂寧使公事勘不成則休朝廷大義不可虧也子厚以為然釋義成即事成闕西事須有議論如苻堅壽春之役其朝廷宗室固多有言者以至宮女張夫人者猶上書諫西晋平吳當取也主之者惟張華一人而已然當時雖羊叔子建議而朝廷亦不能無言又唐師取蔡州此則在中國容其數十年恣睢然當時以為不宜取者固無義理然亦是有議論今則廟堂之上無一人言者幾何不一言而喪邦也釋程子窺見宋室後來削弱之患矣胎息之說謂之愈疾則可謂之道則與聖人之學不干事聖人未嘗說著若言神住則氣住則是浮屠入定之法雖謂養氣猶是第二節事亦須以心為主其心欲慈惠安一作虛靜故於道為有助亦不然孟子說浩然之氣又不如此今若言存心養氣只是專為此氣又所為者捨大務小捨本趨末有濟甚事今言有助於道者只為奈過何心不下故要得寂湛而已又不似釋氏攝心之術論學若如是則大假雜也亦不須得道只閉目靜坐為可以養心坐如尸立如齊只是要養其志豈知待為養這些氣來又不如是也釋佛孟養氣之說一名而二義浮屠之術最善化誘故人多向之然其術所以化衆人也故人亦有向有不向者如介甫之學他便只是去人主心術處加功故今日靡然而同無有異者所謂一正君而國定也此學極有害以介甫才辨遽施之學者誰能出其右始則且以利而從其說久而遂安其學今天下之新法害事處但只消一日除了便沒事其學化革了人心為害最甚其如之何故天下只是一箇風風如是則靡然無不向也釋孟子正人心息邪說意正如此關中學者以今日觀之師死而遂倍之却未見其人只是更不復講釋子厚之徒寡也饋運之術雖自古亦無不煩民不動搖而足者然於古則有兵車其中載糗糧百人破二十五人然古者行兵在中國又不遠敵若是深入遠處則决無省力且如秦運海隅之粟以饋邊率三十鍾而致一石是二百倍以來今日師行一兵行一夫饋只可供七日其餘日必俱乏食也且計之須三夫而助一兵仍須十五日便回一日不回則一日乏食以此校之無善術故兵也者古人必不得已而後用者知此耳釋古人所以去兵食而貴信也目畏尖物此事不得放過便與克下室中率置尖物須以理勝他尖必不刺人也何畏之有釋欲豈便能誘人在自窒耳自古治亂相承亦常事君子多而小人少則治小人多君子少則亂然在古亦須朝廷之中君子小人雜進不似今日剪截得直是齊整不惟不得進用更直憔悴善類略去近道則須憔悴舊日交遊只改節者便於世事差遂此道理不知為甚正叔近病人有言之曰在他人則有追駁斥放正叔無此等事故只有病耳釋此便不可謂之數乎介甫今日亦不必誅殺人人靡然自從蓋只消除盡在朝異己者在古雖大惡在上一面誅殺亦斷不得人議論今便都無異者釋才欲同已便非今日雜信鬼怪異說只是不先燭理若於事上一一理㑹則有甚盡期須只於學上理㑹釋學明則百事不差師巫在此降言在彼只是拋得遠决無此理又言留下藥尤知其不然人氣盡則死死則謂之鬼可也但不知世俗所謂鬼神何也聰明如邵堯夫猶不免致疑在此嘗言有人家若虛空中聞人馬之聲某謂既是人馬須有鞍韉之類皆全這箇是何處得來堯夫言天地之間亦有一般不有不無底物某謂如此說則須有不有不無底人馬凡百皆爾深不然也釋此足破惑人心作主不定正如一箇翻車流轉動搖無須臾停所感萬端又如懸鏡空中無物不入其中有甚定形不學則却都不察及有所學便覺察得是為害著一箇意思則與人成就得箇甚好見識一作無意於學則皆不之察暨用心自觀即覺其為害存此紛雜竟與人成何見識心若不做一箇主怎生奈何張天祺昔常言自約數年自上著牀便不得思量事不思量事後須强把他這心來制縳亦須寄寓在一箇形象皆非自然君實自謂吾得術矣只管念箇中字此則又為中繫縛且中字亦何形象若愚夫不思慮冥然無知此又過與不及之分也有人胸中常若有兩人焉欲為善如有惡以為之間欲為不善又若有羞惡之心者本無二人此正交戰之驗也持其志便氣不能亂此大可驗要之聖賢必不害心疾其他疾却未可知他藏府只為元不曽養養之却在修養家一作持其志使氣不能亂此大可驗要之聖賢必不病心疾他藏府有患則未嘗專志於養焉釋必定而后能靜也仁祖時北使進言高麗自來臣屬北朝近來職貢全缺殊失臣禮今欲加兵又聞臣屬南朝今來報知仁祖不答及將去也召而前語之曰適議高麗事朕思之只是王子罪不干百姓事今既加兵王子未必能誅得且是屠戮百姓北使遂屈無答不覺汗流浹背俯伏於地歸而寢兵他都不言彼兵事勢只看這一箇天地之量亦至誠有以格他也釋此亦宋仁祖之智乎問古者百畝今四十一畝餘若以土地計之所收似不足以供九人之食田百畝九人固不足以天下計之則亦可家有九人只十六已别受田其餘皆老少也故可供有不足者又有補助之政又有鄉黨賙救之義故亦可足釋古人之用亦有節使人謂之啞御史猶可且只是格君心釋此與孟子同耳若孔子更有法正叔嘗為葬說有五事相地須使異日决不為路不置城郭不為溝渠不為貴人所奪不致耕犂所及此大要也其穴之次設如尊穴南向北首陪葬者前為兩列亦須北首各於其穴安夫婦之位坐於堂上則男東而女西卧於室中則男外而女內也推此為法觀之葬須為坎室為安若直下便以土實之則許大一塊虛土壓底四向流水必趨土虛處大不便也且棺椁雖堅恐不能勝許多土頭有失比化者無使土親膚之義釋論葬法惟此為的禮言惟天地之祭為越紼而行事此事難行而言越紼則是猶在殯宮於時無由致得齊又安能脫喪服衣祭服此皆難行縱天地之祀為不可廢則消使冢宰攝爾昔者英宗初即位有人以此問先生答曰古人居喪百事皆如常特於祭祀廢之則不若無廢為愈也子厚正之曰父在為母喪則不敢見其父不敢以非禮見也今天子為父之喪以此見上帝是以非禮見上帝也故不如無祭釋廢喪祭天地天地為至尊也勿謂小兒無記性所歷事皆能不忘故善養子者當其嬰孩鞠之使得所養全其和氣乃至長而性美教之示以好惡有常至如養犬者不欲其升堂則時其升堂而朴之若既朴其升堂又復食之於堂則使孰從雖日撻而求其不升不可得也養異類且爾况人乎故養正者聖人也釋此若生子罔不在初之意極須為天下之中天地之中理必相直今人所定天體只是且以眼定視所極處不見遂以為盡然向曽有於海上見南極下有大星十則今所見天體蓋未定雖似不可窮然以土圭之法驗之日月升降不過三萬里中故以尺五之表測之每一寸當一千里然而中國之到鄯善莎車已是一萬五千里若就彼觀日尚只是三萬里中也天下之或寒或暖只緣地形髙下如屋隂則寒屋陽則燠不可言於此所寒矣屋之西北又益寒伯淳在澤州嘗三次食韭黃始食懷州韭次食澤州又次食並州則知數百里間氣候爭三月矣若都以此差之則須爭半歲如是則有在此冬至在彼夏至者雖然又沒此事只是一般為冬為夏而已釋以地勢辨寒暑見大雅貴姓子弟於飲食玩好之物之類直是一生將身伏事不懈如管城之陳醋瓶洛中之史畫匣是也更有甚事伯淳與君實嘗問觀史畫猶能題品奈煩伯淳問君實能如此與他畫否君實曰自家一箇身猶不能事持得更有甚工夫到此釋君實言亦不可謂不知道神農作本草古傳一日食藥七十死非也若小毒亦不當嘗若大毒一嘗而死矣安得生其所以得知者自然視色嗅味知得是甚氣作此藥便可攻此病須是學至此則知自至此釋此與伏羲仰觀俯察同功英宗欲改葬西陵當是時潞公對以禍福遂止其語雖若詭對要之却濟事釋事有可用智者此也父子異宮者為命士以上愈貴則愈嚴故父子異宮猶今有逐位非如異居也釋貴能生尊與分二程子抄釋卷之一
